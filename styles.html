<style>
/* =============================================
   CSS 設計變數（Design Tokens）
   集中管理顏色、字型、間距，方便未來主題替換
   ============================================= */
:root {
  /* 主色調 */
  --color-primary:       #1a73e8;
  --color-primary-dark:  #1557b0;
  --color-primary-light: #e8f0fe;

  /* 語意色 */
  --color-success: #1e8e3e;
  --color-warning: #f9ab00;
  --color-danger:  #d93025;
  --color-info:    #1a73e8;

  /* 中性色 */
  --color-surface:  #ffffff;
  --color-bg:       #f8f9fa;
  --color-border:   #dadce0;
  --color-text:     #202124;
  --color-text-sub: #5f6368;
  --color-disabled: #bdc1c6;

  /* 嚴重度色（稽核用） */
  --color-critical: #d93025;
  --color-critical-bg: #fce8e6;
  --color-warn-bg: #fef7e0;

  /* 尺寸 */
  --nav-width:    240px;
  --top-nav-h:    60px;
  --radius:       8px;
  --radius-sm:    4px;
  --radius-full:  999px;

  /* 字型 */
  --font-base: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
  --font-mono: 'Roboto Mono', 'Courier New', monospace;

  /* 陰影 */
  --shadow-sm: 0 1px 3px rgba(0,0,0,.12);
  --shadow-md: 0 2px 8px rgba(0,0,0,.15);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.18);

  /* 動畫 */
  --transition: 200ms ease;
}

/* =============================================
   重置與基礎
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: var(--font-base);
  color: var(--color-text);
  background: var(--color-bg);
  line-height: 1.6;
  min-height: 100vh;
}

a { color: var(--color-primary); text-decoration: none; }
a:hover { text-decoration: underline; }

ul, ol { list-style: none; }

/* =============================================
   頂部導覽列
   ============================================= */
.top-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--top-nav-h);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  display: flex;
  align-items: center;
  padding: 0 1rem;
  gap: 1rem;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

.top-nav__brand {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex: 1;
}

.top-nav__logo { width: 28px; height: 28px; color: var(--color-primary); }

.top-nav__title {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--color-text);
  white-space: nowrap;
}

.top-nav__user {
  display: flex;
  align-items: center;
  gap: .75rem;
}

.user-name { font-size: .9rem; color: var(--color-text-sub); }

/* 漢堡選單按鈕（手機版） */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  border-radius: var(--radius-sm);
}
.hamburger span {
  display: block;
  width: 22px; height: 2px;
  background: var(--color-text);
  transition: var(--transition);
}

/* =============================================
   應用佈局（主體）
   ============================================= */
.app-layout {
  display: flex;
  margin-top: var(--top-nav-h);
  min-height: calc(100vh - var(--top-nav-h));
}

/* 左側選單 */
.side-nav {
  position: fixed;
  top: var(--top-nav-h);
  left: 0;
  width: var(--nav-width);
  height: calc(100vh - var(--top-nav-h));
  background: var(--color-surface);
  border-right: 1px solid var(--color-border);
  overflow-y: auto;
  transition: transform var(--transition);
  z-index: 90;
  padding: 1rem 0;
}

.nav-list { padding: 0 .5rem; }

.nav-item a {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .6rem .75rem;
  border-radius: var(--radius-sm);
  color: var(--color-text);
  font-size: .9rem;
  transition: background var(--transition), color var(--transition);
}
.nav-item a:hover { background: var(--color-primary-light); color: var(--color-primary); text-decoration: none; }
.nav-item a.active { background: var(--color-primary-light); color: var(--color-primary); font-weight: 600; }
.nav-item__icon { width: 18px; height: 18px; flex-shrink: 0; }

.nav-section-label {
  font-size: .72rem;
  font-weight: 600;
  color: var(--color-text-sub);
  text-transform: uppercase;
  letter-spacing: .05em;
  padding: 1rem .75rem .25rem;
}

/* 主要內容區 */
.main-content {
  flex: 1;
  margin-left: var(--nav-width);
  padding: 1.5rem;
  min-width: 0;
}

/* 遮罩（手機版點擊關閉選單） */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 85;
}

/* =============================================
   頁面通用元素
   ============================================= */

/* 頁面標題列 */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
  gap: .75rem;
}
.page-header h1 { font-size: 1.4rem; font-weight: 600; }

/* 卡片 */
.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: 1.25rem;
  box-shadow: var(--shadow-sm);
}
.card__header { margin-bottom: .75rem; }
.card__title { font-size: 1rem; font-weight: 600; color: var(--color-text); }

/* 統計卡格線 */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.stat-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: 1.25rem;
  box-shadow: var(--shadow-sm);
}
.stat-card__label { font-size: .8rem; color: var(--color-text-sub); margin-bottom: .25rem; }
.stat-card__value { font-size: 2rem; font-weight: 700; color: var(--color-primary); }
.stat-card--danger .stat-card__value { color: var(--color-danger); }

/* =============================================
   按鈕
   ============================================= */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: .4rem;
  padding: .5rem 1rem;
  font-size: .875rem;
  font-family: var(--font-base);
  font-weight: 500;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition), box-shadow var(--transition), color var(--transition);
  white-space: nowrap;
  user-select: none;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }

.btn--primary  { background: var(--color-primary); color: #fff; }
.btn--primary:hover  { background: var(--color-primary-dark); }

.btn--ghost    { background: transparent; border-color: var(--color-border); color: var(--color-text); }
.btn--ghost:hover    { background: var(--color-bg); }

.btn--danger   { background: var(--color-danger); color: #fff; }
.btn--danger:hover   { background: #b42417; }

.btn--sm { padding: .3rem .7rem; font-size: .8rem; }
.btn--icon { padding: .4rem; border-radius: var(--radius-sm); }

/* =============================================
   表單元素
   ============================================= */
.form-group { margin-bottom: 1rem; }
.form-label { display: block; font-size: .85rem; font-weight: 500; margin-bottom: .3rem; }
.form-label.required::after { content: ' *'; color: var(--color-danger); }

.form-control {
  width: 100%;
  padding: .5rem .75rem;
  font-size: .9rem;
  font-family: var(--font-base);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  background: var(--color-surface);
  color: var(--color-text);
  transition: border-color var(--transition), box-shadow var(--transition);
}
.form-control:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(26,115,232,.2);
}
.form-control:disabled { background: var(--color-bg); color: var(--color-text-sub); }
.form-control--error { border-color: var(--color-danger); }

.form-error { font-size: .78rem; color: var(--color-danger); margin-top: .25rem; }
.form-hint  { font-size: .78rem; color: var(--color-text-sub); margin-top: .25rem; }

/* 搜尋列 */
.search-bar {
  position: relative;
  display: inline-flex;
  align-items: center;
  width: 100%;
  max-width: 320px;
}
.search-bar__input {
  width: 100%;
  padding: .45rem 2.25rem .45rem .75rem;
  font-size: .875rem;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-full);
  background: var(--color-surface);
}
.search-bar__icon {
  position: absolute;
  right: .6rem;
  color: var(--color-text-sub);
  pointer-events: none;
  width: 16px; height: 16px;
}

.filter-card {
  display: grid;
  gap: 1rem;
  margin-bottom: 1rem;
}

.filter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: .875rem;
}

.filter-actions {
  display: flex;
  flex-wrap: wrap;
  gap: .75rem;
  align-items: center;
  justify-content: space-between;
}

.filter-actions__group {
  display: flex;
  flex-wrap: wrap;
  gap: .5rem;
}

.form-control[list]::-webkit-calendar-picker-indicator {
  display: none !important;
}

.multi-select {
  position: relative;
}

.multi-select__trigger {
  width: 100%;
  min-height: 40px;
  padding: .5rem .75rem;
  font-size: .9rem;
  font-family: var(--font-base);
  text-align: left;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  background: var(--color-surface);
  color: var(--color-text);
  cursor: pointer;
  transition: border-color var(--transition), box-shadow var(--transition);
}

.multi-select__trigger:hover,
.multi-select__trigger.has-selection,
.multi-select.is-open .multi-select__trigger {
  border-color: var(--color-primary);
}

.multi-select__trigger:focus {
  outline: none;
  box-shadow: 0 0 0 3px rgba(26,115,232,.2);
}

.multi-select__panel {
  position: absolute;
  top: calc(100% + .35rem);
  left: 0;
  right: 0;
  z-index: 30;
  display: grid;
  gap: .5rem;
  padding: .75rem;
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  background: var(--color-surface);
  box-shadow: var(--shadow-md);
}

.multi-select__panel[hidden] {
  display: none;
}

.multi-select__search-wrap {
  display: flex;
}

.multi-select__toolbar {
  display: flex;
  justify-content: flex-end;
}

.multi-select__options {
  display: grid;
  gap: .25rem;
  max-height: 240px;
  overflow-y: auto;
}

.multi-select__option {
  display: flex;
  align-items: flex-start;
  gap: .55rem;
  padding: .45rem .5rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
}

.multi-select__option:hover {
  background: var(--color-bg);
}

.multi-select__option input {
  margin-top: .15rem;
}

.multi-select__option span {
  font-size: .875rem;
  color: var(--color-text);
  word-break: break-word;
}

.multi-select__empty {
  padding: .6rem .25rem;
  color: var(--color-text-sub);
  font-size: .85rem;
  text-align: center;
}

.station-shell {
  display: grid;
  gap: 1rem;
}

.station-hero {
  display: grid;
  grid-template-columns: minmax(0, 1.5fr) minmax(280px, .8fr);
  gap: 1.25rem;
  align-items: end;
  padding: 1.25rem;
  border: 0;
  background:
    radial-gradient(circle at top left, rgba(26,115,232,.14), transparent 28%),
    linear-gradient(135deg, #f7fbff, #ffffff 55%, #eef5ff);
}

.station-hero h1 {
  font-size: 2rem;
  line-height: 1.2;
  margin-bottom: .45rem;
}

.station-hero p {
  color: var(--color-text-sub);
  max-width: 64ch;
}

.station-hero__eyebrow,
.station-drawer__eyebrow,
.station-card__code {
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--color-primary-dark);
}

.station-hero__meta {
  display: flex;
  justify-content: flex-end;
}

.station-search {
  width: 100%;
  display: grid;
  gap: .35rem;
}

.station-search span {
  font-size: .82rem;
  color: var(--color-text-sub);
}

.station-overview {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: .75rem;
}

.station-warning-board {
  border-color: #f0c36d;
  background: #fffaf0;
}

.station-warning-board__list {
  display: flex;
  flex-wrap: wrap;
  gap: .5rem;
}

.station-warning-pill {
  padding: .35rem .6rem;
  border-radius: var(--radius-full);
  background: #fff1cf;
  color: #8a5900;
  font-size: .82rem;
}

.station-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.15fr) minmax(360px, .85fr);
  gap: 1rem;
  align-items: start;
}

.station-list-pane {
  display: grid;
  gap: .85rem;
}

.station-list-pane__header {
  display: flex;
  justify-content: space-between;
  align-items: end;
  gap: 1rem;
}

.station-list-pane__header h2 {
  font-size: 1.1rem;
  margin-bottom: .2rem;
}

.station-list-pane__header p,
.station-list-pane__meta {
  color: var(--color-text-sub);
  font-size: .84rem;
}

.station-card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: .9rem;
}

.station-card {
  display: grid;
  gap: .9rem;
  padding: 1rem;
  border: 1px solid var(--color-border);
  border-radius: 14px;
  background: var(--color-surface);
  box-shadow: var(--shadow-sm);
}

.station-card.is-selected {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 2px rgba(26,115,232,.15), var(--shadow-md);
}

.station-card__top,
.station-card__stats,
.station-card__actions {
  display: flex;
  gap: .75rem;
  align-items: center;
  justify-content: space-between;
}

.station-card__top h3 {
  font-size: 1.12rem;
}

.station-card__manager {
  display: grid;
  gap: .15rem;
  padding: .85rem;
  border-radius: 12px;
  background: #f8fbff;
}

.station-card__manager span,
.station-card__stats span {
  color: var(--color-text-sub);
  font-size: .78rem;
}

.station-card__manager small {
  color: var(--color-text-sub);
  word-break: break-word;
}

.station-card__stats > div {
  display: grid;
  gap: .2rem;
}

.station-card__stats strong {
  font-size: 1rem;
}

.station-card__warnings {
  display: flex;
  flex-wrap: wrap;
  gap: .4rem;
}

.station-card__warnings--ok {
  color: var(--color-text-sub);
  font-size: .82rem;
}

.station-card__warning {
  padding: .3rem .55rem;
  border-radius: var(--radius-full);
  background: #fef1e8;
  color: #9c4100;
  font-size: .77rem;
}

.station-drawer {
  position: sticky;
  top: calc(var(--top-nav-h) + 1rem);
  min-height: 420px;
}

.station-drawer__empty,
.station-drawer.is-open {
  border: 1px solid var(--color-border);
  border-radius: 16px;
  background: var(--color-surface);
  box-shadow: var(--shadow-sm);
}

.station-drawer.is-open {
  display: grid;
  gap: 1rem;
  padding: 1rem;
}

.station-drawer__empty {
  display: grid;
  place-items: center;
  padding: 1.5rem;
}

.station-drawer__header,
.station-drawer__section-head,
.station-member-transfer,
.station-member-toolbar,
.station-member-toolbar__buttons,
.station-manager-panel__summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .75rem;
}

.station-drawer__header {
  align-items: start;
  border-bottom: 1px solid var(--color-border);
  padding-bottom: .9rem;
}

.station-drawer__header h2 {
  font-size: 1.3rem;
  line-height: 1.2;
}

.station-drawer__header p,
.station-drawer__section-head span {
  color: var(--color-text-sub);
  font-size: .82rem;
}

.station-drawer__section {
  display: grid;
  gap: .75rem;
}

.station-drawer__section-head {
  align-items: end;
}

.station-drawer__section h3 {
  font-size: 1rem;
}

.station-manager-panel,
.station-member-list {
  display: grid;
  gap: .75rem;
}

.station-manager-panel__summary {
  align-items: stretch;
}

.station-manager-panel__summary > div {
  flex: 1;
  display: grid;
  gap: .2rem;
  padding: .75rem;
  border-radius: 12px;
  background: #f7f9fc;
}

.station-manager-panel__summary span,
.station-member-row__meta {
  color: var(--color-text-sub);
  font-size: .8rem;
}

.station-member-toolbar {
  align-items: stretch;
}

.station-member-toolbar .form-control {
  flex: 1;
}

.station-member-toolbar__buttons,
.station-member-transfer {
  flex-wrap: wrap;
}

.station-member-transfer .form-control {
  flex: 1;
  min-width: 220px;
}

.station-member-row {
  display: flex;
  gap: .75rem;
  align-items: start;
  padding: .85rem;
  border: 1px solid var(--color-border);
  border-radius: 12px;
  background: #fff;
  cursor: pointer;
}

.station-member-row.is-selected {
  border-color: var(--color-primary);
  background: #eef5ff;
}

.station-member-row input {
  margin-top: .2rem;
}

.station-member-row__body,
.station-member-row__title {
  display: grid;
  gap: .2rem;
}

.station-member-row__title span {
  color: var(--color-text-sub);
  font-size: .84rem;
}

.station-empty {
  min-height: 180px;
  border: 1px dashed var(--color-border);
  border-radius: 14px;
  background: rgba(255,255,255,.75);
}

.station-empty--inner {
  min-height: 120px;
}

@media (max-width: 1100px) {
  .station-layout {
    grid-template-columns: 1fr;
  }

  .station-drawer {
    position: static;
  }
}

@media (max-width: 900px) {
  .station-hero,
  .station-overview {
    grid-template-columns: 1fr;
  }

  .station-member-toolbar,
  .station-drawer__section-head,
  .station-drawer__header {
    flex-direction: column;
    align-items: stretch;
  }
}

.assignment-summary {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: .75rem;
  margin-bottom: .75rem;
}

.assignment-summary__meta {
  color: var(--color-text-sub);
  font-size: .85rem;
}

.stacked-cell {
  display: flex;
  flex-direction: column;
  gap: .2rem;
}

.stacked-cell__primary {
  font-weight: 500;
  color: var(--color-text);
}

.stacked-cell__secondary {
  color: var(--color-text-sub);
  font-size: .8rem;
  word-break: break-word;
}

.pagination {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: flex-end;
  gap: .5rem;
  margin-top: 1rem;
}

.pagination__info {
  margin-right: auto;
  color: var(--color-text-sub);
  font-size: .82rem;
}

/* =============================================
   資料表格
   ============================================= */
.table-wrapper {
  width: 100%;
  overflow-x: auto;
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  background: var(--color-surface);
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: .875rem;
}
.data-table th {
  background: var(--color-bg);
  padding: .65rem 1rem;
  text-align: left;
  font-weight: 600;
  font-size: .8rem;
  color: var(--color-text-sub);
  border-bottom: 1px solid var(--color-border);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
.data-table th:hover { background: #ebebeb; }
.data-table th.sort-asc::after  { content: ' ↑'; }
.data-table th.sort-desc::after { content: ' ↓'; }
.data-table th.data-table__th--static { cursor: default; user-select: auto; }
.data-table th.data-table__th--static:hover { background: #f5f5f5; }

.data-table td {
  padding: .65rem 1rem;
  border-bottom: 1px solid var(--color-border);
  color: var(--color-text);
  vertical-align: middle;
}
.data-table tbody tr:last-child td { border-bottom: none; }
.data-table tbody tr:hover { background: var(--color-primary-light); }

/* RACI A 欄異常高亮 */
.data-table td.raci-a--multi {
  background: var(--color-critical-bg);
  color: var(--color-critical);
  font-weight: 600;
}

/* 空狀態 */
.empty-state {
  padding: 3rem;
  text-align: center;
  color: var(--color-text-sub);
}
.empty-state__icon { font-size: 2.5rem; margin-bottom: .5rem; }

/* =============================================
   徽章（Badge）
   ============================================= */
.badge {
