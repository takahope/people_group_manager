<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通行碼驗證 — 人員狀態查詢</title>
  <?!= include('styles'); ?>
  <style>
    .passcode-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: var(--color-bg);
    }
    .passcode-card {
      background: var(--color-surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 380px;
      padding: 2rem 1.75rem;
    }
    .passcode-card__title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 .5rem;
      color: var(--color-text);
    }
    .passcode-card__desc {
      font-size: .85rem;
      color: var(--color-text-sub);
      margin: 0 0 1.25rem;
      line-height: 1.6;
    }
    .passcode-card__desc code {
      font-family: var(--font-mono);
      background: var(--color-bg);
      padding: .1rem .35rem;
      border-radius: var(--radius-sm);
    }
    .passcode-card__actions .btn {
      width: 100%;
      justify-content: center;
      margin-top: .5rem;
    }
    /* 驗證成功後的 <a> 保底按鈕：蓋掉全域 a:hover 底線 */
    .passcode-card__actions a.btn,
    .passcode-card__actions a.btn:hover {
      text-decoration: none;
    }
    /* 點擊保底按鈕後的假進度條（沿用全域 .progress-bar / .progress-bar__fill） */
    .passcode-progress {
      margin-top: .9rem;
    }
    .passcode-progress__bar {
      margin-bottom: .4rem;
    }
    .passcode-progress__meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      color: var(--color-text-sub);
      font-size: .82rem;
    }
  </style>
</head>
<body>
  <div class="passcode-shell">
    <div class="passcode-card">
      <? if (mode === 'not_configured') { ?>
        <h1 class="passcode-card__title">🔒 系統尚未設定通行碼</h1>
        <p class="passcode-card__desc">
          本系統啟用了全站通行碼保護，但管理員尚未於 Script Properties 設定
          <code>SITE_PASSCODE</code>。請聯繫系統管理員完成設定後再嘗試登入。
        </p>
      <? } else { ?>
        <h1 class="passcode-card__title">🔑 請輸入系統通行碼</h1>
        <p class="passcode-card__desc">為保護人事資料，請先輸入通行碼；驗證通過後將依您的帳號角色進入系統（效期 8 小時）。</p>
        <div class="form-group">
          <label class="form-label" for="passcodeInput">通行碼</label>
          <input type="password" id="passcodeInput" class="form-control" autocomplete="off" autofocus>
          <p class="form-error" id="passcodeError" hidden></p>
        </div>
        <div class="passcode-card__actions">
          <button class="btn btn--primary" id="passcodeSubmitBtn">送出</button>
        </div>
        <div class="passcode-progress" id="passcodeProgress" hidden>
          <div class="progress-bar passcode-progress__bar">
            <div class="progress-bar__fill" id="passcodeProgressFill" style="width:0%"></div>
          </div>
          <div class="passcode-progress__meta">
            <span id="passcodeProgressMsg">正在準備頁面…</span>
            <span id="passcodeProgressPct">0%</span>
          </div>
        </div>
      <? } ?>
    </div>
  </div>

  <? if (mode !== 'not_configured') { ?>
  <script>
    (function () {
      const input = document.getElementById('passcodeInput');
      const btn = document.getElementById('passcodeSubmitBtn');
      const errorEl = document.getElementById('passcodeError');

      function setError(message) {
        errorEl.hidden = !message;
        errorEl.textContent = message || '';
        input.classList.toggle('form-control--error', !!message);
      }

      // 假進度條：點擊保底連結後，用 3 秒跑到 90% 掩蓋實際頁面轉跳的停滯感，
      // 訊息每秒輪播；因實際工作是「瀏覽器離開本頁、載入新頁」，沒有前端可監聽的完成事件，
      // 故不追 100%，維持在 90% 並持續輪播訊息，直到頁面轉跳（本頁被卸載）為止。
      function startTransitionProgress() {
        const wrap = document.getElementById('passcodeProgress');
        const fill = document.getElementById('passcodeProgressFill');
        const msgEl = document.getElementById('passcodeProgressMsg');
        const pctEl = document.getElementById('passcodeProgressPct');
        const messages = ['正在驗證使用者身分…', '正在載入系統模組…', '正在準備頁面資料…', '即將完成，請稍候…'];
        const durationSec = 3;
        const stepPct = 90 / durationSec;
        let pct = 0;
        let tickIndex = 0;

        wrap.hidden = false;
        msgEl.textContent = messages[0];
        fill.style.width = '0%';
        pctEl.textContent = '0%';

        setInterval(function () {
          tickIndex++;
          pct = Math.min(90, pct + stepPct);
          fill.style.width = pct + '%';
          pctEl.textContent = Math.round(pct) + '%';
          msgEl.textContent = messages[tickIndex % messages.length];
        }, 1000);
      }

      function submit() {
        const code = input.value;
        if (!code) { setError('請輸入通行碼'); input.focus(); return; }
        setError('');
        btn.disabled = true;
        btn.textContent = '驗證中...';

        google.script.run
          .withSuccessHandler(function (raw) {
            const result = (typeof raw === 'string') ? JSON.parse(raw) : raw;
            if (result && result.success) {
              // 以 Web App 網址整頁導向（_top），避免沙盒 iframe reload 白屏。
              // 注意：GAS 沙盒 iframe 只有 allow-top-navigation-by-user-activation，
              // 此處為非同步 callback，使用者手勢啟用權可能已過期（Safari/iOS 幾乎必擋、
              // Chrome 超過約 5 秒也擋），自動導向會被「靜默」阻擋。
              // 因此同時渲染真正的 <a target="_top"> 保底按鈕——使用者親手點擊帶新手勢，必定放行。
              const appUrl = result.data && result.data.appUrl;
              if (appUrl) {
                btn.hidden = true;
                const link = document.createElement('a');
                link.href = appUrl;
                link.target = '_top';
                link.className = 'btn btn--primary';
                link.textContent = '✅ 驗證成功，點此進入系統';
                link.addEventListener('click', function (e) {
                  // 攔截原生導航，改為：先顯示假進度條，再同步觸發導向。
                  // window.open 必須留在本次點擊事件的同步呼叫堆疊內才算數，
                  // 一旦被 setTimeout/Promise 等非同步延後，Safari/iOS 會判定手勢已過期而靜默擋下。
                  e.preventDefault();
                  link.style.pointerEvents = 'none';
                  link.textContent = '轉跳中…';
                  startTransitionProgress();
                  window.open(appUrl, '_top');
                });
                btn.parentNode.appendChild(link);
                // 快速路徑：手勢仍有效時（桌面 Chrome 回應快）直接無感轉跳
                window.open(appUrl, '_top');
              } else {
                btn.textContent = '驗證成功，載入中...';
                window.setTimeout(() => location.reload(), 300);
              }
            } else {
              btn.disabled = false;
              btn.textContent = '送出';
              setError((result && result.error) || '通行碼錯誤，請重新輸入');
              input.value = '';
              input.focus();
            }
          })
          .withFailureHandler(function (err) {
            btn.disabled = false;
            btn.textContent = '送出';
            setError((err && err.message) || '驗證失敗，請稍後再試');
          })
          .verifyPasscode(code);
      }

      btn.addEventListener('click', submit);
      input.addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
    })();
  </script>
  <? } ?>
</body>
</html>
