<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通行碼驗證 — 人員狀態查詢</title>
  <?!= include('styles'); ?>
  <style>
    .passcode-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: var(--color-bg);
    }
    .passcode-card {
      background: var(--color-surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 380px;
      padding: 2rem 1.75rem;
    }
    .passcode-card__title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 .5rem;
      color: var(--color-text);
    }
    .passcode-card__desc {
      font-size: .85rem;
      color: var(--color-text-sub);
      margin: 0 0 1.25rem;
      line-height: 1.6;
    }
    .passcode-card__desc code {
      font-family: var(--font-mono);
      background: var(--color-bg);
      padding: .1rem .35rem;
      border-radius: var(--radius-sm);
    }
    .passcode-card__actions .btn {
      width: 100%;
      justify-content: center;
      margin-top: .5rem;
    }
    /* 驗證成功後的 <a> 保底按鈕：蓋掉全域 a:hover 底線 */
    .passcode-card__actions a.btn,
    .passcode-card__actions a.btn:hover {
      text-decoration: none;
    }
    /* 點擊保底按鈕後的假進度條（沿用全域 .progress-bar / .progress-bar__fill）。
       改用 CSS @keyframes 驅動，不用 setInterval：因為此區塊會在「本頁即將被
       window.open(_top) 導離」的同一個同步呼叫堆疊內啟動，瀏覽器（尤其行動版
       Safari）會把即將卸載的文件視為背景頁而節流／暫停 JS 計時器，setInterval
       回呼可能永遠不會被排程執行；CSS 動畫由渲染/合成執行緒插補畫面，不依賴
       JS tick 存活，才能在導航期間持續播放。 */
    .passcode-progress {
      margin-top: .9rem;
    }
    .passcode-progress__bar {
      margin-bottom: .4rem;
    }
    .passcode-progress__fill {
      width: 0;
    }
    .passcode-progress.is-animating .passcode-progress__fill {
      animation: passcodeProgressFill 3s ease-out forwards;
    }
    @keyframes passcodeProgressFill {
      from { width: 0%; }
      to   { width: 90%; }
    }
    .passcode-progress__status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      color: var(--color-text-sub);
      font-size: .82rem;
    }
    .passcode-progress__msg-stack,
    .passcode-progress__pct-stack {
      position: relative;
      display: inline-block;
      height: 1.2em;
    }
    .passcode-progress__msg-stack span,
    .passcode-progress__pct-stack span {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      white-space: nowrap;
    }
    .passcode-progress__pct-stack {
      margin-left: .75rem;
    }
    /* 前三句：淡入後停留，輪到下一句前準時淡出（opacity 回 0），避免與下一句同時
       opacity:1 而重疊成亂碼——因為堆疊文字沒有底色，opacity:1 不會互相遮蔽。 */
    .passcode-progress.is-animating .passcode-progress__msg-stack span:nth-child(1),
    .passcode-progress.is-animating .passcode-progress__pct-stack span:nth-child(1) {
      animation: passcodeProgressPulse 1s steps(1) forwards;
      animation-delay: 0s;
    }
    .passcode-progress.is-animating .passcode-progress__msg-stack span:nth-child(2),
    .passcode-progress.is-animating .passcode-progress__pct-stack span:nth-child(2) {
      animation: passcodeProgressPulse 1s steps(1) forwards;
      animation-delay: 1s;
    }
    .passcode-progress.is-animating .passcode-progress__msg-stack span:nth-child(3),
    .passcode-progress.is-animating .passcode-progress__pct-stack span:nth-child(3) {
      animation: passcodeProgressPulse .8s steps(1) forwards;
      animation-delay: 2s;
    }
    /* 最後一句：淡入後停留在 opacity:1，直到頁面轉跳（不淡出）。 */
    .passcode-progress.is-animating .passcode-progress__msg-stack span:nth-child(4),
    .passcode-progress.is-animating .passcode-progress__pct-stack span:nth-child(4) {
      animation: passcodeProgressPulseFinal .2s steps(1) forwards;
      animation-delay: 2.8s;
    }
    @keyframes passcodeProgressPulse {
      0%   { opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes passcodeProgressPulseFinal {
      0%   { opacity: 0; }
      50%  { opacity: 1; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="passcode-shell">
    <div class="passcode-card">
      <? if (mode === 'not_configured') { ?>
        <h1 class="passcode-card__title">🔒 系統尚未設定通行碼</h1>
        <p class="passcode-card__desc">
          本系統啟用了全站通行碼保護，但管理員尚未於 Script Properties 設定
          <code>SITE_PASSCODE</code>。請聯繫系統管理員完成設定後再嘗試登入。
        </p>
      <? } else { ?>
        <h1 class="passcode-card__title">🔑 請輸入系統通行碼</h1>
        <p class="passcode-card__desc">為保護人事資料，請先輸入通行碼；驗證通過後將依您的帳號角色進入系統（效期 8 小時）。</p>
        <div class="form-group">
          <label class="form-label" for="passcodeInput">通行碼</label>
          <input type="password" id="passcodeInput" class="form-control" autocomplete="off" autofocus>
          <p class="form-error" id="passcodeError" hidden></p>
        </div>
        <div class="passcode-card__actions">
          <button class="btn btn--primary" id="passcodeSubmitBtn">送出</button>
        </div>
        <div class="passcode-progress" id="passcodeProgress" hidden>
          <div class="progress-bar passcode-progress__bar">
            <div class="progress-bar__fill passcode-progress__fill"></div>
          </div>
          <div class="passcode-progress__status">
            <span class="passcode-progress__msg-stack">
              <span>正在驗證使用者身分…</span>
              <span>正在載入系統模組…</span>
              <span>正在準備頁面資料…</span>
              <span>即將完成，請稍候…</span>
            </span>
            <span class="passcode-progress__pct-stack">
              <span>15%</span>
              <span>45%</span>
              <span>75%</span>
              <span>90%</span>
            </span>
          </div>
        </div>
      <? } ?>
    </div>
  </div>

  <? if (mode !== 'not_configured') { ?>
  <script>
    (function () {
      const input = document.getElementById('passcodeInput');
      const btn = document.getElementById('passcodeSubmitBtn');
      const errorEl = document.getElementById('passcodeError');

      function setError(message) {
        errorEl.hidden = !message;
        errorEl.textContent = message || '';
        input.classList.toggle('form-control--error', !!message);
      }

      // 假進度條：點擊保底連結後，用 3 秒跑到 90% 掩蓋實際頁面轉跳的停滯感，訊息每秒輪播。
      // 改用 CSS @keyframes 驅動（見 <style> 內 .passcode-progress.is-animating），
      // 不用 setInterval：本函式會在「即將呼叫 window.open(_top) 導離本頁」的同一個
      // 同步呼叫堆疊內執行，瀏覽器（尤其行動版 Safari）會把即將卸載的文件當背景頁
      // 節流／暫停 JS 計時器，導致 setInterval 回呼實測上完全不會被觸發（卡在 0%、
      // 卡在第一句訊息）；CSS 動畫由渲染/合成執行緒插補，不依賴 JS tick 存活。
      function startTransitionProgress() {
        const wrap = document.getElementById('passcodeProgress');
        wrap.hidden = false;
        // 強制 reflow：確保剛顯示（原本 display:none）就加動畫 class 時，
        // 瀏覽器不會把「顯示」與「加 class」合併成同一個樣式運算而跳過動畫起點。
        void wrap.offsetWidth;
        wrap.classList.add('is-animating');
      }

      function submit() {
        const code = input.value;
        if (!code) { setError('請輸入通行碼'); input.focus(); return; }
        setError('');
        btn.disabled = true;
        btn.textContent = '驗證中...';

        google.script.run
          .withSuccessHandler(function (raw) {
            const result = (typeof raw === 'string') ? JSON.parse(raw) : raw;
            if (result && result.success) {
              // 以 Web App 網址整頁導向（_top），避免沙盒 iframe reload 白屏。
              // 注意：GAS 沙盒 iframe 只有 allow-top-navigation-by-user-activation，
              // 此處為非同步 callback，使用者手勢啟用權可能已過期（Safari/iOS 幾乎必擋、
              // Chrome 超過約 5 秒也擋），自動導向會被「靜默」阻擋。
              // 因此同時渲染真正的 <a target="_top"> 保底按鈕——使用者親手點擊帶新手勢，必定放行。
              const appUrl = result.data && result.data.appUrl;
              if (appUrl) {
                btn.hidden = true;
                const link = document.createElement('a');
                link.href = appUrl;
                link.target = '_top';
                link.className = 'btn btn--primary';
                link.textContent = '✅ 驗證成功，點此進入系統';
                link.addEventListener('click', function (e) {
                  // 攔截原生導航，改為：先顯示假進度條，再同步觸發導向。
                  // window.open 必須留在本次點擊事件的同步呼叫堆疊內才算數，
                  // 一旦被 setTimeout/Promise 等非同步延後，Safari/iOS 會判定手勢已過期而靜默擋下。
                  e.preventDefault();
                  link.style.pointerEvents = 'none';
                  link.textContent = '轉跳中…';
                  startTransitionProgress();
                  window.open(appUrl, '_top');
                });
                btn.parentNode.appendChild(link);
                // 快速路徑：手勢仍有效時（桌面 Chrome 回應快）直接無感轉跳
                window.open(appUrl, '_top');
              } else {
                btn.textContent = '驗證成功，載入中...';
                window.setTimeout(() => location.reload(), 300);
              }
            } else {
              btn.disabled = false;
              btn.textContent = '送出';
              setError((result && result.error) || '通行碼錯誤，請重新輸入');
              input.value = '';
              input.focus();
            }
          })
          .withFailureHandler(function (err) {
            btn.disabled = false;
            btn.textContent = '送出';
            setError((err && err.message) || '驗證失敗，請稍後再試');
          })
          .verifyPasscode(code);
      }

      btn.addEventListener('click', submit);
      input.addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
    })();
  </script>
  <? } ?>
</body>
</html>
