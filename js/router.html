  // 匯出組織圖：選一個節點 → 把該節點以下子樹截成 PNG 下載（純前端 html2canvas）
  _showOrgExportModal(nodes, defaultStartCode = null, defaultDepth = 'all') {
    const roots = Array.isArray(nodes) ? nodes : [];
    if (roots.length === 0) {
      Components.showToast('無組織資料可匯出', 'warning');
      return;
    }

    // 把巢狀樹以 DFS 攤平成 { node, depth }，供下拉選單依層級縮排顯示
    const flat = [];
    const walk = (node, depth) => {
      flat.push({ node, depth });
      (node.children || []).forEach(child => walk(child, depth + 1));
    };
    roots.forEach(root => walk(root, 0));

    const byCode = new Map(flat.map(item => [item.node.code, item.node]));
    const options = flat.map((item, i) => {
      const indent = '　'.repeat(item.depth);
      const label = indent + item.node.code + ' ' + (item.node.name || '');
      const isSelected = defaultStartCode ? (item.node.code === defaultStartCode) : (i === 0);
      return `<option value="${Components.escapeHtml(item.node.code)}" ${isSelected ? 'selected' : ''}>${Components.escapeHtml(label)}</option>`;
    }).join('');

    const body = `
      <div style="display:flex;flex-direction:column;gap:.75rem">
        <div>
          <label for="orgExportNodeSel" style="display:block;margin-bottom:.25rem;font-size:.85rem;color:var(--color-text-sub)">匯出根節點</label>
          <select id="orgExportNodeSel" class="form-control" style="width:100%">${options}</select>
        </div>
        <div>
          <label for="orgExportDepthSel" style="display:block;margin-bottom:.25rem;font-size:.85rem;color:var(--color-text-sub)">向下延伸層數</label>
          <select id="orgExportDepthSel" class="form-control" style="width:100%">
            <option value="all" ${defaultDepth === 'all' ? 'selected' : ''}>全部（完整子樹）</option>
            <option value="1" ${defaultDepth === '1' ? 'selected' : ''}>1 層（僅直屬子節點）</option>
            <option value="2" ${defaultDepth === '2' ? 'selected' : ''}>2 層</option>
            <option value="3" ${defaultDepth === '3' ? 'selected' : ''}>3 層</option>
            <option value="4" ${defaultDepth === '4' ? 'selected' : ''}>4 層</option>
            <option value="5" ${defaultDepth === '5' ? 'selected' : ''}>5 層</option>
          </select>
        </div>
      </div>`;

    Components.showModal('⬇ 匯出組織圖', body, async () => {
      const nodeSel = document.querySelector('#orgExportNodeSel');
      const depthSel = document.querySelector('#orgExportDepthSel');
      const node = byCode.get(nodeSel && nodeSel.value);
      if (!node) return false;

      // 依選取的層數裁剪子樹
      const depthVal = depthSel ? depthSel.value : 'all';
      const maxDepth = depthVal === 'all' ? Infinity : Number(depthVal);
      const pruned = Components.pruneTreeByDepth(node, maxDepth);

      try {
        Components.showToast('正在產生圖片，請稍候…', 'info');
        const dateStr = new Date().toLocaleDateString('zh-TW');
        const depthLabel = depthVal === 'all' ? '' : '_' + depthVal + '層';
        await Components.exportOrgChartPng(pruned, '組織圖_' + (node.name || node.code) + depthLabel + '_' + dateStr + '.png');
        Components.showToast('組織圖已匯出', 'success');
      } catch (err) {
        API.handleError(err);
        return false; // 失敗時保留 Modal 供重試
      }
    }, '匯出', { closeBeforeConfirm: false });
  },

  async loadOrg(container, user, pageCtx) {
    const canPrint = user?.role === 'ROLE-APP-ADMIN' || user?.role === 'ROLE-APP-HR';
    container.innerHTML = `
      <div class="page-header"><h1>🌳 組織架構</h1></div>
      <div style="display:flex;gap:1rem;margin-bottom:.75rem;flex-wrap:wrap;align-items:center;justify-content:space-between">
        <div style="display:flex;gap:.5rem;flex-wrap:wrap" id="orgTypeTabs"></div>
        <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
          ${canPrint ? '<button class="btn btn--ghost btn--sm" id="orgPrintBtn">🖨 列印組織成員表</button>' : ''}
          <button class="btn btn--ghost btn--sm" id="orgExportBtn">⬇ 匯出組織圖</button>
          <div style="display:flex;gap:.25rem" id="orgViewToggle">
            <button class="btn btn--primary btn--sm" data-view="list">☰ 清單</button>
            <button class="btn btn--ghost btn--sm" data-view="chart">🗂️ 組織圖</button>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center;padding:.6rem .85rem;background:var(--color-bg-alt);border-radius:8px;border:1px solid var(--color-border)">
        <div style="display:flex;align-items:center;gap:.5rem;flex:1;min-width:220px">
          <label for="orgViewNodeSel" style="font-size:.85rem;color:var(--color-text-sub);white-space:nowrap">起始節點：</label>
          <select id="orgViewNodeSel" class="form-control" style="flex:1;max-width:320px;padding:.3rem .6rem;font-size:.85rem"></select>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <label for="orgViewDepthSel" style="font-size:.85rem;color:var(--color-text-sub);white-space:nowrap">向下顯示層數：</label>
          <select id="orgViewDepthSel" class="form-control" style="width:auto;padding:.3rem .6rem;font-size:.85rem">
            <option value="all" selected>全部層數（完整子樹）</option>
            <option value="1">1 層（僅直屬子節點）</option>
            <option value="2">2 層</option>
            <option value="3">3 層</option>
            <option value="4">4 層</option>
            <option value="5">5 層</option>
          </select>
        </div>
      </div>
      <div id="orgWarnings"></div>
      <div id="orgTreeContainer" class="card"></div>`;

    if (canPrint) {
      const printBtn = pageCtx.query('#orgPrintBtn');
      if (printBtn) printBtn.addEventListener('click', () => Pages._showOrgPrintModal());
    }

    const exportBtn = pageCtx.query('#orgExportBtn');
    if (exportBtn) {
      exportBtn.addEventListener('click', () =>
        Pages._showOrgExportModal(orgView.result?.nodes || [], orgView.startCode, orgView.depth));
    }

    // 檢視狀態：'list'（縮排清單）｜'chart'（圖形化組織圖）；快取目前型別的查詢結果
    const orgView = { mode: 'list', type: null, startCode: '', depth: 'all', result: null };

    let activeMemberRequestId = 0;
    const prefetchState = Pages._orgMemberPrefetchState = {
      navId: pageCtx.navId,
      byCode: new Map(),
      preloadPromise: null,
      status: 'idle',
      generatedAt: '',
    };

    const cacheOrgMemberPayload = (orgCode, payload) => {
      if (!orgCode || !payload || prefetchState.navId !== pageCtx.navId) return;
      prefetchState.byCode.set(orgCode, payload);
    };

    const getCachedOrgMemberPayload = (orgCode) => {
      if (!orgCode || prefetchState.navId !== pageCtx.navId) return null;
      return prefetchState.byCode.get(orgCode) || null;
    };

    const startOrgMemberPrefetch = () => {
      if (prefetchState.preloadPromise) return prefetchState.preloadPromise;

      prefetchState.status = 'loading';
      prefetchState.preloadPromise = API.getOrgMemberListPrefetchData()
        .then(result => {
          if (!pageCtx.isActive() || prefetchState.navId !== pageCtx.navId) return result;

          const payloadsByCode = result?.payloadsByCode || {};
          Object.keys(payloadsByCode).forEach(orgCode => {
            cacheOrgMemberPayload(orgCode, payloadsByCode[orgCode]);
          });

          prefetchState.status = 'ready';
          prefetchState.generatedAt = result?.generatedAt || '';
          return result;
        })
        .catch(err => {
          if (prefetchState.navId !== pageCtx.navId) return null;
          prefetchState.status = 'error';
          console.error('組織成員清單預載失敗：', err);
          return null;
        });

      return prefetchState.preloadPromise;
    };

    const openOrgMemberModal = async (node) => {
      if (!node || !node.code) return;
      const requestId = ++activeMemberRequestId;
      const cachedPayload = getCachedOrgMemberPayload(node.code);

      if (cachedPayload) {
        Components.showModal(
          `成員清單｜${cachedPayload?.org?.name || node.name || node.code}`,
          Components.renderOrgMemberListModal(cachedPayload),
          () => true,
          '關閉',
          {
            modalClassName: 'modal--wide',
            bodyClassName: 'modal__body--dense',
            hideConfirm: true,
            cancelText: '關閉',
          }
        );
        return;
      }

      Components.showModal(
        `成員清單｜${node.name || node.code}`,
        '<div class="page-loading"><div class="spinner"></div><p>載入成員資料…</p></div>',
        () => true,
        '關閉',
        {
          modalClassName: 'modal--wide',
          bodyClassName: 'modal__body--dense',
          hideConfirm: true,
          cancelText: '關閉',
        }
      );

      try {
        const result = await API.getOrgMemberList(node.code);
        if (!pageCtx.isActive() || requestId !== activeMemberRequestId) return;
        cacheOrgMemberPayload(node.code, result);
        const bodyEl = document.getElementById('modalBody');
        const titleEl = document.getElementById('modalTitle');
        if (!bodyEl || !titleEl) return;
        titleEl.textContent = `成員清單｜${result?.org?.name || node.name || node.code}`;
        bodyEl.innerHTML = Components.renderOrgMemberListModal(result);
        bodyEl.scrollTop = 0;
        bodyEl.scrollLeft = 0;
      } catch (err) {
        if (requestId !== activeMemberRequestId) return;
        API.handleError(err);
        const bodyEl = document.getElementById('modalBody');
        if (bodyEl) {
          bodyEl.innerHTML = `
            <div class="empty-state" style="margin:0">
              <p>無法取得組織成員清單</p>
              <p style="font-size:.85rem;color:var(--color-text-sub)">${Components.escapeHtml(err.message)}</p>
            </div>`;
          bodyEl.scrollTop = 0;
          bodyEl.scrollLeft = 0;
        }
      }
    };

    // 依實際資料動態渲染型別篩選分頁（第一顆固定為「全部」）
    const renderTypeTabs = (availableTypes) => {
      const tabsEl = pageCtx.query('#orgTypeTabs');
      if (!tabsEl) return;
      const types = Array.isArray(availableTypes) ? availableTypes : [];
      const tabs = [{ value: '', label: '全部' }, ...types.map(t => ({ value: t, label: t }))];
      tabsEl.innerHTML = tabs.map(tab =>
        `<button class="btn ${tab.value === (orgView.type || '') ? 'btn--primary' : 'btn--ghost'} btn--sm" data-type="${Components.escapeHtml(tab.value)}">${Components.escapeHtml(tab.label)}</button>`
      ).join('');
    };

    // 依目前類別與選取層級過濾更新下拉選單
    const renderNodeSelect = () => {
      const nodeSel = pageCtx.query('#orgViewNodeSel');
      if (!nodeSel) return;
      const rawNodes = Array.isArray(orgView.result?.nodes) ? orgView.result.nodes : [];
      const flat = [];
      const walk = (node, depth) => {
        flat.push({ node, depth });
        (node.children || []).forEach(child => walk(child, depth + 1));
      };
      rawNodes.forEach(root => walk(root, 0));

      const options = flat.map(item => {
        const indent = '　'.repeat(item.depth);
        const label = indent + item.node.code + ' ' + (item.node.name || '');
        const selected = item.node.code === orgView.startCode ? 'selected' : '';
        return `<option value="${Components.escapeHtml(item.node.code)}" ${selected}>${Components.escapeHtml(label)}</option>`;
      });
      nodeSel.innerHTML = `<option value="">全部（當前類別完整架構）</option>` + options.join('');
    };

    // 依目前檢視模式（清單／組織圖）渲染已快取的查詢結果，不重打 API
    const paintOrg = () => {
      if (!pageCtx.isActive()) return;
      const treeDiv = pageCtx.query('#orgTreeContainer');
      const warningDiv = pageCtx.query('#orgWarnings');
      if (!treeDiv) return;

      const result = orgView.result;
      const rawNodes = Array.isArray(result?.nodes) ? result.nodes : [];
      const warnings = Array.isArray(result?.warnings) ? result.warnings : [];

      if (warningDiv) {
        warningDiv.innerHTML = warnings.length > 0 ? `
          <div class="card" style="margin-bottom:1rem;border-color:#f0c36d;background:#fff8e6">
            <div class="card__header"><h3 class="card__title">組織資料警示</h3></div>
            <div style="color:var(--color-text-sub);font-size:.9rem;line-height:1.7">
              ${warnings.map(w => `<div>${Components.escapeHtml(w.message || '組織資料異常，已改以安全模式顯示')}</div>`).join('')}
            </div>
          </div>` : '';
      }

      treeDiv.innerHTML = '';
      if (rawNodes.length === 0) { treeDiv.innerHTML = '<div class="empty-state"><p>無組織資料</p></div>'; return; }

      // 1. 依起始節點過濾
      let baseNodes = rawNodes;
      if (orgView.startCode) {
        const findNode = (list, code) => {
          for (const item of list) {
            if (item.code === code) return item;
            if (item.children && item.children.length > 0) {
              const found = findNode(item.children, code);
              if (found) return found;
            }
          }
          return null;
        };
        const target = findNode(rawNodes, orgView.startCode);
        if (target) baseNodes = [target];
      }

      // 2. 依向下顯示層數裁剪子樹
      const maxDepth = orgView.depth === 'all' ? Infinity : Number(orgView.depth);
      const tree = maxDepth === Infinity ? baseNodes : baseNodes.map(node => Components.pruneTreeByDepth(node, maxDepth));

      const opts = { onNodeClick: openOrgMemberModal };
      if (orgView.mode === 'chart') {
        treeDiv.classList.add('card--flush');
        const viewer = Components.OrgPanZoom(Components.OrgChart(tree, opts));
        treeDiv.appendChild(viewer);
        requestAnimationFrame(() => { if (viewer.__fit) viewer.__fit(); }); // 初次自動適合畫面
      } else {
        treeDiv.classList.remove('card--flush');
        tree.forEach(node => treeDiv.appendChild(Components.OrgNode(node, 0, opts)));
      }
    };

    const renderTree = async (type) => {
      if (!pageCtx.isActive()) return;
      const treeDiv = pageCtx.query('#orgTreeContainer');
      if (!treeDiv) return;
      orgView.type = type || null;
      orgView.startCode = ''; // 切換組織類別時重置起始節點
      treeDiv.innerHTML = '<div class="page-loading"><div class="spinner"></div></div>';
      try {
        const result = await API.getOrgTree(type || null);
        if (!pageCtx.isActive()) return;
        orgView.result = result;
        renderTypeTabs(result?.availableTypes);
        renderNodeSelect();
        paintOrg();
      } catch (err) {
        if (!pageCtx.isActive()) return;
        console.error('loadOrg 失敗：', err);
        API.handleError(err);
        Components.renderLoadError('orgTreeContainer', {
          title: '組織架構載入失敗',
          message: '無法取得組織樹資料。',
          details: err.message,
          actionLabel: '重試',
          onAction: () => Router.navigateTo(pageCtx.hash),
        });
      }
    };

    startOrgMemberPrefetch();
    await renderTree(null);

    const orgTabs = pageCtx.query('#orgTypeTabs');
    if (orgTabs) {
      orgTabs.addEventListener('click', async e => {
        if (!pageCtx.isActive()) return;
        const btn = e.target.closest('button');
        if (!btn) return;
        await renderTree(btn.dataset.type || null);
      });
    }

    const viewNodeSel = pageCtx.query('#orgViewNodeSel');
    if (viewNodeSel) {
      viewNodeSel.addEventListener('change', () => {
        if (!pageCtx.isActive()) return;
        orgView.startCode = viewNodeSel.value;
        paintOrg();
      });
    }

    const viewDepthSel = pageCtx.query('#orgViewDepthSel');
    if (viewDepthSel) {
      viewDepthSel.addEventListener('change', () => {
        if (!pageCtx.isActive()) return;
        orgView.depth = viewDepthSel.value;
        paintOrg();
      });
    }

    const viewToggle = pageCtx.query('#orgViewToggle');
    if (viewToggle) {
      viewToggle.addEventListener('click', e => {
        if (!pageCtx.isActive()) return;
        const btn = e.target.closest('button');
        if (!btn || !btn.dataset.view || btn.dataset.view === orgView.mode) return;
        orgView.mode = btn.dataset.view;
        viewToggle.querySelectorAll('button').forEach(b =>
          b.className = `btn ${b.dataset.view === orgView.mode ? 'btn--primary' : 'btn--ghost'} btn--sm`);
        paintOrg();
      });
    }
  },

  // ========================
  // 駐站管理員
  // ========================
  async loadStations(container, user, pageCtx) {
    container.innerHTML = `
      <div class="station-shell">
        <div class="station-hero card">
          <div>
            <div class="station-hero__eyebrow">Station Workforce Control</div>

            <p>集中管理駐站負責人與收案人員配置。變更負責人時，系統會同步更新該站成員主管資訊；搬移成員時，會一併更新所在駐站與直屬主管。</p>
          </div>
          <div class="station-hero__meta">

            </label>

        <div id="stationWorkspace"><div class="page-loading"><div class="spinner"></div><p>載入駐站工作台…</p></div></div>
      </div>`;

    try {
      const dashboard = await API.getStationManagementDashboard();

      Pages._stationState = {
        pageCtx,
        canEdit: dashboard?.canEdit === true,
        managerOptions: Array.isArray(dashboard?.managerOptions) ? dashboard.managerOptions : [],
        stations: Array.isArray(dashboard?.stations) ? dashboard.stations : [],
        warnings: Array.isArray(dashboard?.warnings) ? dashboard.warnings : [],
        search: '',
        groupedStations: [],
        expandedManagerGroups: new Set(),
        activeStationModalCode: '',
        memberSearch: '',
        selectedRowIndices: new Set(),
        targetStationCode: '',
      };

      Pages._bindStationWorkspaceEvents();
      Pages._renderStationWorkspace();
    } catch (err) {
      if (!pageCtx.isActive()) return;
      console.error('loadStations 失敗：', err);
      API.handleError(err);
      Components.renderLoadError('stationWorkspace', {
        title: '駐站管理員載入失敗',
        message: '無法取得駐站管理員資料。',
        details: err.message,
        actionLabel: '重試',
        onAction: () => Router.navigateTo(pageCtx.hash),
      });
    }
  },

  _bindStationWorkspaceEvents() {
    const state = Pages._stationState;
    const pageCtx = state?.pageCtx;
    if (!state || !pageCtx || !pageCtx.isActive()) return;

    const container = pageCtx.container;
    if (!container) return;

    container.oninput = e => {
      if (!pageCtx.isActive()) return;
      const target = e.target;
      if (!(target instanceof HTMLElement)) return;

      if (target.id === 'stationWorkspaceSearch') {
        state.search = target.value || '';
        Pages._syncStationGroupState();
        Pages._renderStationWorkspace();
      }
    };

    container.onclick = async e => {
      if (!pageCtx.isActive()) return;
      const actionEl = e.target.closest('[data-action]');
      if (!actionEl) return;
      const action = actionEl.dataset.action;
      const stationCode = String(actionEl.dataset.stationCode || '');
      const groupKey = String(actionEl.dataset.groupKey || '');

      if (action === 'toggle-station-group' && groupKey) {
        Pages._toggleStationManagerGroup(groupKey);
        return;
      }
      if (action === 'open-station' && stationCode) {
        Pages._openStationWorkspaceModal(stationCode);
      }
    };
  },

  _renderStationWorkspace() {
    const state = Pages._stationState;
    const pageCtx = state?.pageCtx;
    if (!state || !pageCtx || !pageCtx.isActive()) return;

    const workspace = pageCtx.query('#stationWorkspace');
    if (!workspace) return;

    Pages._syncStationGroupState();
    const filteredGroups = Pages._getFilteredStationGroups();
    const totalMembers = state.stations.reduce((sum, station) => sum + (station.memberCount || 0), 0);
    const totalActiveMembers = state.stations.reduce((sum, station) => sum + (station.activeMemberCount || 0), 0);
    const flaggedStations = state.stations.filter(station => (station.warnings || []).length > 0).length;

    workspace.innerHTML = `
      <div class="station-overview">
        <div class="stat-card">
          <div class="stat-card__label">駐站總數</div>
          <div class="stat-card__value">${state.stations.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">收案人員</div>
          <div class="stat-card__value">${totalMembers}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">收案人員(在勤)</div>
          <div class="stat-card__value">${totalActiveMembers}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">可編輯權限</div>
          <div class="stat-card__value">${state.canEdit ? '可編輯' : '唯讀'}</div>
        </div>
        <div class="stat-card ${flaggedStations > 0 ? 'stat-card--danger' : ''}">
          <div class="stat-card__label">資料警示</div>
          <div class="stat-card__value">${flaggedStations}</div>
        </div>
      </div>
      ${Pages._renderStationWorkspaceWarnings()}
      <section class="station-list-pane">
        <div class="station-list-pane__header">
          <div>
            <h2>駐站總覽</h2>
            <p>依負責人分組查看駐站，展開後選擇單一站點進行管理。</p>
          </div>
          <div class="station-list-pane__meta">${filteredGroups.length} / ${state.groupedStations.length} 個負責人群組</div>
        </div>
        <div class="station-group-list">
          ${filteredGroups.length > 0 ? filteredGroups.map(group => Pages._renderStationManagerGroup(group)).join('') : `
            <div class="empty-state station-empty">
              <div class="empty-state__icon">🗂️</div>
              <p>查無符合條件的駐站群組</p>
            </div>`}
        </div>
      </section>`;
  },

  _renderStationWorkspaceWarnings() {
    const state = Pages._stationState;
    if (!state || !Array.isArray(state.warnings) || state.warnings.length === 0) return '';

    return `
      <div class="station-warning-board card">
        <div class="card__header"><h3 class="card__title">資料警示</h3></div>
        <div class="station-warning-board__list">
          ${state.warnings.map(item => `<div class="station-warning-pill">${Components.escapeHtml(item.message || '')}</div>`).join('')}
        </div>
      </div>`;
  },

  _renderStationWorkspaceCard(station) {
    const state = Pages._stationState;
    const warningBadges = (station.warnings || []).slice(0, 2).map(message =>
      `<span class="station-card__warning">${Components.escapeHtml(message)}</span>`
    ).join('');

    return `
      <article class="station-card">
        <div class="station-card__top">
          <div>
            <div class="station-card__code">${Components.escapeHtml(station.code)}</div>
            <h3>${Components.escapeHtml(station.name || station.code)}</h3>
          </div>
          <span class="badge ${station.isManagerConcurrent ? 'badge--warning' : 'badge--success'}">${station.isManagerConcurrent ? '兼任負責人' : '專任負責人'}</span>
        </div>
        <div class="station-card__manager">
          <span>目前負責人</span>
          <strong>${Components.escapeHtml(station.managerName || '未設定')}</strong>
          <small>${Components.escapeHtml(station.managerEmail || '請先指派負責人')}</small>
        </div>
        <div class="station-card__stats">
          <div><span>收案人員</span><strong>${station.memberCount || 0}</strong></div>
          <div><span>上層節點</span><strong>${Components.escapeHtml(station.parentCode || '未設定')}</strong></div>
          <div><span>資料狀態</span><strong>${(station.warnings || []).length > 0 ? '需處理' : '正常'}</strong></div>
        </div>
        ${warningBadges ? `<div class="station-card__warnings">${warningBadges}</div>` : '<div class="station-card__warnings station-card__warnings--ok">沒有待處理警示</div>'}
        <div class="station-card__actions">
          <button type="button" class="btn btn--primary btn--sm" data-action="open-station" data-station-code="${Components.escapeHtml(station.code)}">${state?.canEdit ? '管理駐站' : '查看詳情'}</button>
        </div>
      </article>`;
  },

  _renderStationManagerGroup(group) {
    const isExpanded = group.isExpanded === true;
    const groupWarnings = group.warningCount > 0
      ? `<span class="station-group__badge station-group__badge--warn">${group.warningCount} 項警示</span>`
      : '<span class="station-group__badge">無警示</span>';
    return `
      <section class="station-group ${isExpanded ? 'is-expanded' : ''}">
        <button type="button" class="station-group__header" data-action="toggle-station-group" data-group-key="${Components.escapeHtml(group.key)}">
          <div class="station-group__header-main">
            <span class="station-group__chevron">${isExpanded ? '▾' : '▸'}</span>
            <div>
              <div class="station-card__code">${Components.escapeHtml(group.label)}</div>
              <h3>${Components.escapeHtml(group.managerName)}</h3>
              <p>${Components.escapeHtml(group.managerEmail)}</p>
            </div>
          </div>
          <div class="station-group__summary">
            <span>${group.stationCount} 個駐站</span>
            <span>${group.memberCount} 位收案人員</span>
            <span>${group.isConcurrent ? '兼任' : '專責'}</span>
            ${groupWarnings}
          </div>
        </button>
        ${isExpanded ? `<div class="station-card-grid">${group.stations.map(station => Pages._renderStationWorkspaceCard(station)).join('')}</div>` : ''}
      </section>`;
  },

  _syncStationGroupState() {
    const state = Pages._stationState;
    if (!state) return;
    const previousExpanded = state.expandedManagerGroups || new Set();
    const keyword = String(state.search || '').trim().toLowerCase();
    const groups = Pages._groupStationsByManager();
    state.groupedStations = groups.map(group => {
      const matched = keyword && group.stations.some(station => Pages._stationMatchesKeyword(station, keyword));
      return {
        ...group,
        isExpanded: matched || previousExpanded.has(group.key),
      };
    });
  },

  _groupStationsByManager() {
    const state = Pages._stationState;
    if (!state) return [];
    const groups = new Map();

    state.stations.forEach(station => {
      const key = station.managerEmail || '__unassigned__';
      if (!groups.has(key)) {
        groups.set(key, {
          key,
          label: station.managerEmail ? `${station.managerName || station.managerEmail}` : '未指派負責人',
          managerName: station.managerName || '未指派負責人',
          managerEmail: station.managerEmail || '尚未設定負責人',
          stationCount: 0,
          memberCount: 0,
          warningCount: 0,
          isConcurrent: false,
          stations: [],
        });
      }

      const group = groups.get(key);
      group.stationCount += 1;
      group.memberCount += Number(station.memberCount || 0);
      group.warningCount += (station.warnings || []).length;
      group.isConcurrent = group.isConcurrent || station.isManagerConcurrent === true;
      group.stations.push(station);
    });

    return [...groups.values()].sort((a, b) => String(a.managerName).localeCompare(String(b.managerName), 'zh-Hant'));
  },

  _getFilteredStationGroups() {
    const state = Pages._stationState;
    if (!state) return [];
    const keyword = String(state.search || '').trim().toLowerCase();
    if (!keyword) return state.groupedStations;

    return state.groupedStations
      .map(group => ({
        ...group,
        stations: group.stations.filter(station => Pages._stationMatchesKeyword(station, keyword)),
        isExpanded: true,
      }))
      .filter(group =>
        String(group.managerName || '').toLowerCase().includes(keyword) ||
        String(group.managerEmail || '').toLowerCase().includes(keyword) ||
        group.stations.length > 0
      );
  },

  _stationMatchesKeyword(station, keyword) {
    const memberText = (station.members || [])
      .map(item => `${item.name || ''} ${item.email || ''} ${item.title || ''}`.toLowerCase())
      .join(' ');
    return [
      station.code,
      station.name,
      station.alias,
      station.managerName,
      station.managerEmail,
      station.parentCode,
      memberText,
    ].some(value => String(value || '').toLowerCase().includes(keyword));
  },

  _toggleStationManagerGroup(groupKey) {
    const state = Pages._stationState;
    if (!state) return;
    if (state.expandedManagerGroups.has(groupKey)) state.expandedManagerGroups.delete(groupKey);
    else state.expandedManagerGroups.add(groupKey);
    Pages._syncStationGroupState();
    Pages._renderStationWorkspace();
  },

  _getActiveStationWorkspace() {
    const state = Pages._stationState;
    if (!state || !state.activeStationModalCode) return null;
    return state.stations.find(station => station.code === state.activeStationModalCode) || null;
  },

  _getFilteredStationMembers(station) {
    const state = Pages._stationState;
    const keyword = String(state?.memberSearch || '').trim().toLowerCase();
    const members = Array.isArray(station?.members) ? station.members : [];
    if (!keyword) return members;

    return members.filter(member =>
      [
        member.name,
        member.email,
        member.title,
        member.managerName,
        member.managerEmail,
      ].some(value => String(value || '').toLowerCase().includes(keyword))
    );
  },

  _openStationWorkspaceModal(stationCode) {
    const state = Pages._stationState;
    const station = state?.stations?.find(item => item.code === stationCode);
    if (!state || !station) return;

    state.activeStationModalCode = stationCode;
    state.memberSearch = '';
    state.targetStationCode = '';
    state.selectedRowIndices = new Set();

    Components.showModal(
      `駐站管理｜${station.name || station.code}`,
      Pages._renderStationWorkspaceModal(station),
      () => true,
      '關閉',
      {
        modalClassName: 'modal--station-workspace',
        bodyClassName: 'modal__body--station-workspace',
        hideConfirm: true,
        cancelText: '關閉',
      }
    );
    Pages._bindStationWorkspaceModalEvents();
  },

  _renderStationWorkspaceModal(station) {
    const state = Pages._stationState;
    const members = Pages._getFilteredStationMembers(station);
    const selectedCount = state.selectedRowIndices.size;
    const canMoveMembers = state.canEdit && selectedCount > 0 && Boolean(state.targetStationCode);
    const targetOptions = state.stations
      .filter(item => item.code !== station.code)
      .map(item => `<option value="${Components.escapeHtml(item.code)}" ${item.code === state.targetStationCode ? 'selected' : ''}>${Components.escapeHtml(item.name)} (${Components.escapeHtml(item.code)})</option>`)
      .join('');

    return `
      <div class="station-modal">
        <div class="station-modal__header">
          <div>
            <div class="station-drawer__eyebrow">${Components.escapeHtml(station.code)}</div>
            <h2>${Components.escapeHtml(station.name)}</h2>
            <p>${Components.escapeHtml(station.parentCode || '未設定上層節點')}</p>
          </div>
          <div class="station-modal__meta">
            <span>${station.memberCount} 位成員</span>
            <span>${(station.warnings || []).length} 項警示</span>
          </div>
        </div>
        <div class="station-modal__content">
          <aside class="station-modal__sidebar">
            <section class="station-modal__section station-modal__section--sidebar">
              <div class="station-modal__section-head">
                <h3>負責人設定</h3>
                <span>${state.canEdit ? '儲存後同步成員主管欄位' : '唯讀模式'}</span>
              </div>
              <div class="station-manager-panel">
                <div class="station-manager-panel__summary">
                  <div><span>目前設定</span><strong>${Components.escapeHtml(station.managerLabel || '尚未設定')}</strong></div>
                  <div><span>同步影響</span><strong>${station.memberCount} 位成員主管資訊</strong></div>
                </div>
                <label class="form-group" style="margin-bottom:0">
                  <span class="form-label">負責駐站</span>
                  <select class="form-control" id="stationManagerSelect" ${state.canEdit ? '' : 'disabled'}>
                    <option value="">請選擇負責人</option>
                    ${state.managerOptions.map(item => `
                      <option value="${Components.escapeHtml(item.email)}" ${item.email === station.managerEmail ? 'selected' : ''}>
                        ${Components.escapeHtml(item.label)}
                      </option>`).join('')}
                  </select>
                </label>
                <div class="station-manager-panel__impact">
                  <span>管理說明</span>
                  <strong>變更負責人後，本站所有成員的主管欄位會一併更新。</strong>
                </div>
                ${state.canEdit ? `
                  <div class="station-manager-panel__actions">
                    <button type="button" class="btn btn--primary" data-action="save-station-manager" data-station-code="${Components.escapeHtml(station.code)}">儲存負責人變更</button>
                  </div>` : ''}
              </div>
            </section>
          </aside>
          <section class="station-modal__main">
            <div class="station-modal__section station-modal__section--main">
              <div class="station-modal__section-head">
                <h3>成員管理</h3>
                <span>批次移動收案人員到其他駐站</span>
              </div>
              <div class="station-member-toolbar">
                <input type="search" id="stationMemberSearch" class="form-control" placeholder="搜尋成員姓名、信箱或職稱" value="${Components.escapeHtml(state.memberSearch || '')}">
                <div class="station-member-toolbar__buttons">
                  <button type="button" class="btn btn--ghost btn--sm" data-action="select-all-members">全選目前列表</button>
                  <button type="button" class="btn btn--ghost btn--sm" data-action="clear-member-selection">清除選取</button>
                </div>
              </div>
              <div class="station-member-list">
                ${members.length > 0 ? members.map(member => `
                  <label class="station-member-row ${state.selectedRowIndices.has(member.rowIndex) ? 'is-selected' : ''}">
                    <input type="checkbox" data-role="station-member-checkbox" data-row-index="${member.rowIndex}" ${state.selectedRowIndices.has(member.rowIndex) ? 'checked' : ''} ${state.canEdit ? '' : 'disabled'}>
                    <div class="station-member-row__body">
                      <div class="station-member-row__inline">
                        <strong class="station-member-row__primary">${Components.escapeHtml(member.name || member.email)}</strong>
                        <span class="station-member-row__badge badge badge--neutral">${Components.escapeHtml(member.title || '未命名職務')}</span>
                        <span class="station-member-row__divider" aria-hidden="true"></span>
                        <span class="station-member-row__meta-inline">${Components.escapeHtml(member.email || '—')}</span>
                        <span class="station-member-row__divider" aria-hidden="true"></span>
                        <span class="station-member-row__meta-inline">主管：${Components.escapeHtml(member.managerName || member.managerEmail || '未設定')}</span>
                      </div>
                    </div>
                  </label>`).join('') : `
                  <div class="empty-state station-empty station-empty--inner">
                    <p>這個駐站目前沒有符合條件的成員</p>
                  </div>`}
              </div>
              <div class="station-member-transfer-bar">
                <div class="station-member-transfer-bar__meta">
                  <span>已選成員</span>
                  <strong>${selectedCount} 位</strong>
                </div>
                <div class="station-member-transfer">
                  <select class="form-control" id="stationTargetSelect" ${state.canEdit ? '' : 'disabled'}>
                    <option value="">選擇目標駐站</option>
                    ${targetOptions}
                  </select>
                  ${state.canEdit ? `<button type="button" class="btn btn--primary" data-action="move-station-members" data-station-code="${Components.escapeHtml(station.code)}" ${canMoveMembers ? '' : 'disabled'}>搬移 ${selectedCount} 位成員</button>` : ''}
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>`;
  },

  _bindStationWorkspaceModalEvents() {
    const state = Pages._stationState;
    const pageCtx = state?.pageCtx;
    const bodyEl = document.getElementById('modalBody');
    if (!state || !pageCtx || !pageCtx.isActive() || !bodyEl) return;

    bodyEl.oninput = e => {
      const target = e.target;
      if (!(target instanceof HTMLElement)) return;
      if (target.id === 'stationMemberSearch') {
        state.memberSearch = target.value || '';
        Pages._rerenderActiveStationWorkspaceModal();
      }
    };

    bodyEl.onchange = e => {
      const target = e.target;
      if (!(target instanceof HTMLElement)) return;
      if (target.id === 'stationTargetSelect') {
        state.targetStationCode = target.value || '';
        Pages._rerenderActiveStationWorkspaceModal();
        return;
      }
      if (target.matches('[data-role="station-member-checkbox"]')) {
        const rowIndex = Number(target.getAttribute('data-row-index'));
        if (!rowIndex) return;
        if (target.checked) state.selectedRowIndices.add(rowIndex);
        else state.selectedRowIndices.delete(rowIndex);
        Pages._rerenderActiveStationWorkspaceModal();
      }
    };

    bodyEl.onclick = async e => {
      const actionEl = e.target.closest('[data-action]');
      if (!actionEl) return;
      const action = actionEl.dataset.action;
      const stationCode = String(actionEl.dataset.stationCode || '');
      const station = Pages._getActiveStationWorkspace();

      if (action === 'select-all-members' && station) {
        Pages._getFilteredStationMembers(station).forEach(member => state.selectedRowIndices.add(member.rowIndex));
        Pages._rerenderActiveStationWorkspaceModal();
        return;
      }
      if (action === 'clear-member-selection') {
        state.selectedRowIndices = new Set();
        Pages._rerenderActiveStationWorkspaceModal();
        return;
      }
      if (action === 'save-station-manager' && stationCode) {
        await Pages._saveStationManager(stationCode);
        return;
      }
      if (action === 'move-station-members' && stationCode) {
        await Pages._moveSelectedStationMembers(stationCode);
      }
    };
  },

  _rerenderActiveStationWorkspaceModal() {
    const station = Pages._getActiveStationWorkspace();
    const bodyEl = document.getElementById('modalBody');
    if (!station || !bodyEl) return;
    bodyEl.innerHTML = Pages._renderStationWorkspaceModal(station);
    Pages._bindStationWorkspaceModalEvents();
  },

  async _saveStationManager(stationCode) {
    const state = Pages._stationState;
    const pageCtx = state?.pageCtx;
    if (!state || !pageCtx || !pageCtx.isActive()) return;

    const select = document.getElementById('stationManagerSelect');
    const managerEmail = String(select?.value || '').trim();
    if (!managerEmail) {
      Components.showToast('請先選擇負責人', 'warning');
      return;
    }

    try {
      const result = await API.updateStationManager(stationCode, managerEmail);
      if (!pageCtx.isActive()) return;
      Components.showToast(result?.message || '駐站負責人更新成功', 'success');
      await Pages._reloadStationWorkspace(stationCode);
    } catch (err) {
      if (!pageCtx.isActive()) return;
      API.handleError(err);
    }
  },

  async _moveSelectedStationMembers(stationCode) {
    const state = Pages._stationState;
    const pageCtx = state?.pageCtx;
    if (!state || !pageCtx || !pageCtx.isActive()) return;

    const rowIndices = [...state.selectedRowIndices];
    const targetStationCode = String(document.getElementById('stationTargetSelect')?.value || '').trim();
    if (rowIndices.length === 0) {
      Components.showToast('請先選擇至少一位成員', 'warning');
      return;
    }
    if (!targetStationCode) {
      Components.showToast('請先選擇目標駐站', 'warning');
      return;
    }

    const currentStation = Pages._getActiveStationWorkspace();
    const targetStation = state.stations.find(item => item.code === targetStationCode);
    if (!currentStation || !targetStation) return;
    const confirmed = window.confirm(
      `將 ${rowIndices.length} 位成員從「${currentStation.name}」搬移到「${targetStation.name}」？系統會同步更新駐站與直屬主管。`
    );
    if (!confirmed) return;

    try {
      const result = await API.reassignStationMembers(rowIndices, targetStationCode);
      if (!pageCtx.isActive()) return;
      Components.showToast(result?.message || '駐站成員調整成功', 'success');
      await Pages._reloadStationWorkspace(targetStationCode);
    } catch (err) {
      if (!pageCtx.isActive()) return;
      API.handleError(err);
    }
  },

  async _reloadStationWorkspace(activeStationCode) {
    const state = Pages._stationState;
    const pageCtx = state?.pageCtx;
    if (!state || !pageCtx || !pageCtx.isActive()) return;

    const dashboard = await API.getStationManagementDashboard();
    if (!pageCtx.isActive()) return;

    state.canEdit = dashboard?.canEdit === true;
    state.managerOptions = Array.isArray(dashboard?.managerOptions) ? dashboard.managerOptions : [];
    state.stations = Array.isArray(dashboard?.stations) ? dashboard.stations : [];
    state.warnings = Array.isArray(dashboard?.warnings) ? dashboard.warnings : [];
    state.activeStationModalCode = activeStationCode || state.activeStationModalCode || '';
    state.memberSearch = '';
    state.targetStationCode = '';
    state.selectedRowIndices = new Set();
    Pages._syncStationGroupState();
    Pages._renderStationWorkspace();

    if (state.activeStationModalCode && Pages._getActiveStationWorkspace()) {
      Pages._rerenderActiveStationWorkspaceModal();
    }
  },

  // ========================
  // RACI 查詢
  // ========================
  async loadRaci(container, user, pageCtx) {
    container.innerHTML = `
      <div class="page-header">
        <h1>📋 RACI 矩陣查詢</h1>
        <a href="#/raci/me" class="btn btn--ghost btn--sm">🙋 我的責任</a>
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem" id="raciTaskTabs">
        <button class="btn btn--primary btn--sm" data-task="">全部</button>
      </div>
      <div id="raciTable"><div class="page-loading"><div class="spinner"></div></div></div>`;

    // 一次抓全部 RACI 與角色對照表；任務分頁與表格皆由此資料推導／前端過濾
    let allRaci = [];
    const roleMap = new Map();
    try {
      const [raciData, roleData] = await Promise.all([
        API.getRaciByTask(null),
        API.getRoleMap().catch(() => []),
      ]);
      if (!pageCtx.isActive()) return;
      allRaci = Array.isArray(raciData) ? raciData : [];
      (roleData || []).forEach(r => roleMap.set(r.roleCode, r.roleName));
    } catch (err) {
      if (!pageCtx.isActive()) return;
      console.error('loadRaci 失敗：', err);
      API.handleError(err);
      Components.renderLoadError('raciTable', {
        title: 'RACI 載入失敗',
        message: '無法取得 RACI 清單。',
        details: err.message,
        actionLabel: '重試',
        onAction: () => Router.navigateTo(pageCtx.hash),
      });
      return;
    }

    // 由實際資料動態產生任務篩選分頁（維持工作表出現順序，標題帶任務名稱）
    const taskNameByCode = new Map();
    allRaci.forEach(r => {
      if (r.taskCode && !taskNameByCode.has(r.taskCode)) taskNameByCode.set(r.taskCode, r.taskName || '');
    });
    const tabsEl = pageCtx.query('#raciTaskTabs');
    if (tabsEl) {
      const tabs = ['', ...taskNameByCode.keys()];
      tabsEl.innerHTML = tabs.map((code, i) =>
        `<button class="btn ${i === 0 ? 'btn--primary' : 'btn--ghost'} btn--sm" data-task="${Components.escapeHtml(code)}" title="${Components.escapeHtml(taskNameByCode.get(code) || '')}">${i === 0 ? '全部' : Components.escapeHtml(code)}</button>`
      ).join('');
    }

    const renderRaciTable = (taskCode) => {
      if (!pageCtx.isActive()) return;
      const div = pageCtx.query('#raciTable');
      if (!div) return;
      const rows = taskCode ? allRaci.filter(r => r.taskCode === taskCode) : allRaci;
      div.innerHTML = `<div class="table-wrapper"><table class="data-table">
        <thead><tr><th>任務代碼</th><th>工作項目代碼</th><th>工作項目名稱</th><th>R 執行</th><th>A 當責</th><th>C 諮詢</th><th>I 告知</th><th>備註</th></tr></thead>
        <tbody>${rows.length ? rows.map(r => Components.RaciRow(r, roleMap)).join('') : '<tr><td colspan="8"><div class="empty-state"><p>無資料</p></div></td></tr>'}</tbody>
      </table></div>`;
    };

    renderRaciTable(null);

    if (!pageCtx.isActive()) return;
    container.querySelectorAll('button[data-task]').forEach(btn => {
      btn.onclick = () => {
        if (!pageCtx.isActive()) return;
        container.querySelectorAll('button[data-task]').forEach(b => b.className = 'btn btn--ghost btn--sm');
        btn.className = 'btn btn--primary btn--sm';
        renderRaciTable(btn.dataset.task || null);
      };
    });
  },

  // ========================
  // 我的 RACI 責任
  // ========================
  async loadMyRaci(container, user, pageCtx) {
    container.innerHTML = `
      <div class="page-header">
        <h1>🙋 我的 RACI 責任</h1>
        <button class="btn btn--ghost btn--sm" onclick="window.print()">🖨 列印</button>
      </div>
      <div id="myRaciContent"><div class="page-loading"><div class="spinner"></div></div></div>`;

    try {
      const data = await API.getMyRaciTasks();
      if (!pageCtx.isActive()) return;
      const div = pageCtx.query('#myRaciContent');
      if (!div) return;
      const sections = [
        { key: 'R', label: '🔴 R — 執行者（Responsible）', desc: '您負責實際執行的工作項目' },
        { key: 'A', label: '🟠 A — 當責者（Accountable）', desc: '您具有最終核准責任的工作項目（ISO 稽核重點）' },
        { key: 'C', label: '🟡 C — 諮詢對象（Consulted）', desc: '需要您提供意見的工作項目' },
        { key: 'I', label: '🔵 I — 知會對象（Informed）', desc: '執行結果需告知您的工作項目' },
      ];
      div.innerHTML = sections.map(sec => `
        <div class="card" style="margin-bottom:1rem">
          <div class="card__header">
            <h3 class="card__title">${sec.label}</h3>
            <p style="font-size:.8rem;color:var(--color-text-sub);margin-top:.25rem">${sec.desc}</p>
          </div>
          ${data[sec.key] && data[sec.key].length > 0 ? `
            <div class="table-wrapper"><table class="data-table">
              <thead><tr><th>任務代碼</th><th>工作項目代碼</th><th>工作項目名稱</th><th>備註</th></tr></thead>
              <tbody>${data[sec.key].map(item => `
                <tr>
                  <td>${Components.escapeHtml(item.taskCode)}</td>
                  <td>${Components.escapeHtml(item.itemCode)}</td>
                  <td>${Components.escapeHtml(item.itemName)}</td>
                  <td style="color:var(--color-text-sub);font-size:.8rem">${Components.escapeHtml(item.note || '')}</td>
                </tr>`).join('')}
              </tbody>
            </table></div>` : '<div class="empty-state"><p>無相關工作項目</p></div>'}
        </div>`).join('');
    } catch (err) {
      if (!pageCtx.isActive()) return;
      console.error('loadMyRaci 失敗：', err);
      API.handleError(err);
      Components.renderLoadError('myRaciContent', {
        title: '我的責任載入失敗',
        message: '無法取得個人 RACI 資料。',
        details: err.message,
        actionLabel: '重試',
        onAction: () => Router.navigateTo(pageCtx.hash),
      });
    }
  },

  // ========================
  // 稽核驗證
  // ========================
  async loadAudit(container, user, pageCtx) {
    container.innerHTML = `
      <div class="page-header">
        <h1>🔍 稽核驗證報告</h1>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn--primary" id="runAuditBtn">▶ 執行驗證</button>
          <button class="btn btn--ghost" id="exportAuditBtn">⬇ 匯出 CSV</button>
        </div>
      </div>
      <div id="auditProgress" hidden>
        <div class="card" style="margin-bottom:1rem">
          <p style="margin-bottom:.5rem">驗證中，請稍候...</p>
          <div class="progress-bar"><div class="progress-bar__fill" id="auditProgressBar" style="width:0%"></div></div>
        </div>
      </div>
      <div id="auditResult">
        <div class="empty-state" style="min-height:300px">
          <div class="empty-state__icon">🔍</div>
          <p>點擊「執行驗證」開始資料完整性檢查</p>
        </div>
      </div>`;

    const runAuditBtn = pageCtx.query('#runAuditBtn');
    const exportAuditBtn = pageCtx.query('#exportAuditBtn');
    if (!runAuditBtn || !exportAuditBtn) return;

    runAuditBtn.onclick = async () => {
      if (!pageCtx.isActive()) return;
      const btn = pageCtx.query('#runAuditBtn');
      const progressDiv = pageCtx.query('#auditProgress');
      const progressBar = pageCtx.query('#auditProgressBar');
      if (!btn || !progressDiv || !progressBar) return;
      btn.disabled = true;
      progressDiv.hidden = false;

      // 模擬進度（GAS 不支援串流，以動畫替代）
      let prog = 0;
      const interval = setInterval(() => {
        prog = Math.min(prog + 8, 90);
        progressBar.style.width = prog + '%';
      }, 300);

      try {
        const results = await API.runFullAudit();
        if (!pageCtx.isActive()) {
          clearInterval(interval);
          return;
        }
        clearInterval(interval);
        progressBar.style.width = '100%';
        setTimeout(() => { progressDiv.hidden = true; }, 500);
        Components.AuditResultPanel(results, 'auditResult');
      } catch (err) {
        clearInterval(interval);
        if (!pageCtx.isActive()) return;
        API.handleError(err);
      } finally {
        if (pageCtx.isActive() && btn) btn.disabled = false;
      }
    };

    exportAuditBtn.onclick = async () => {
      if (!pageCtx.isActive()) return;
      try {
        const result = await API.exportAudit();
        if (!pageCtx.isActive()) return;
        const blob = new Blob(['\uFEFF' + result.csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `稽核報告_${new Date().toLocaleDateString('zh-TW')}.csv`;
        a.click(); URL.revokeObjectURL(url);
        Components.showToast('稽核報告匯出成功', 'success');
      } catch (err) {
        if (!pageCtx.isActive()) return;
        API.handleError(err);
      }
    };
  },
};
