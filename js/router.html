<script>
/**
 * router.js — Hash-based SPA 路由系統
 * 
 * 設計原則：
 * - 路由設定集中管理（ROUTES 陣列），新增頁面只需新增一筆，無需修改其他邏輯
 * - 依角色動態過濾可見頁面，前端 UI 與後端權限兩層把關
 * - 不依賴任何框架，純 Vanilla JS
 */

const Router = (() => {

  // =============================================
  // 路由設定（新增頁面時只需在此新增一筆）
  // =============================================

  /**
   * @type {Array<{
    *   hash:     string,          // URL hash
    *   label:    string,          // 選單顯示名稱
    *   icon:     string,          // SVG path 或 emoji
    *   section:  string,          // 選單分區標題
    *   feature:  string,          // 權限檢查 key（對應 AuthService PERMISSION_MAP）
    *   loaderKey: string,         // 頁面載入函式名稱（對應 Pages）
    * }>}
   */
  const ROUTES = [
    {
      hash: '#/dashboard', label: '儀表板', icon: '📊', section: '總覽',
      feature: 'dashboard.full,dashboard.dept,dashboard.personal',
      loaderKey: 'loadDashboard',
    },
    {
      hash: '#/personnel', label: '人員管理', icon: '👥', section: '人事管理',
      feature: 'personnel.read.all,personnel.read.dept,personnel.read.self',
      loaderKey: 'loadPersonnel',
    },
    {
      hash: '#/assignments', label: '職務配置', icon: '🗂️', section: '人事管理',
      feature: 'assignment.read.all',
      loaderKey: 'loadAssignments',
    },
    {
      hash: '#/org', label: '組織架構', icon: '🌳', section: '人事管理',
      feature: 'org.read',
      loaderKey: 'loadOrg',
    },
    {
      hash: '#/stations', label: '駐站管理員', icon: '🏥', section: '人事管理',
      feature: 'station.read',
      loaderKey: 'loadStations',
    },
    {
      hash: '#/raci', label: 'RACI 查詢', icon: '📋', section: 'RACI 管理',
      feature: 'raci.read',
      loaderKey: 'loadRaci',
    },
    {
      hash: '#/raci/me', label: '我的責任', icon: '🙋', section: 'RACI 管理',
      feature: 'raci.read',
      loaderKey: 'loadMyRaci',
    },
    {
      hash: '#/audit', label: '稽核驗證', icon: '🔍', section: '稽核',
      feature: 'audit.run',
      loaderKey: 'loadAudit',
    },
  ];

  let currentUser = null;
  let visibleRoutes = [];
  let activeNavigationId = 0;
  let activePageContext = null;

  // =============================================
  // 初始化
  // =============================================

  /**
   * 初始化路由系統
   * 1. 讀取注入的使用者資訊
   * 2. 依角色過濾可見路由
   * 3. 渲染側邊選單
   * 4. 監聽 hashchange
   * 5. 導向當前 hash（或預設首頁）
   */
  async function init() {
    try {
      // 使用 GAS 注入的使用者資訊（避免額外 API 呼叫）
      currentUser = window.__USER_INFO__;
      updateUserDisplay(currentUser);

      // 過濾可見路由（依角色）
      visibleRoutes = await filterVisibleRoutes(ROUTES);
      renderSideNav(visibleRoutes);

      // 監聽 hash 變更
      window.addEventListener('hashchange', onHashChange);

      // 初始路由
      const hash = location.hash || '#/dashboard';
      navigateTo(hash);

      // 漢堡選單（手機版）
      initMobileMenu();

    } catch (error) {
      console.error('Router 初始化失敗：', error);
      Components.showToast('頁面初始化失敗，請重新整理', 'error');
      Components.renderLoadError('mainContent', {
        title: '頁面初始化失敗',
        message: '前端初始化未完成，請重新整理頁面。',
        details: error.message,
        actionLabel: '重新整理',
        onAction: () => location.reload(),
      });
    }
  }

  // =============================================
  // 路由邏輯
  // =============================================

  function onHashChange() {
    navigateTo(location.hash);
  }

  /**
   * 導向指定 hash 對應的頁面
   * Guard Clause：找不到路由 → 顯示 404 訊息
   * 
   * @param {string} hash
   */
  async function navigateTo(hash) {
    // 標準化：移除尾部斜線
    const normalizedHash = hash.replace(/\/$/, '') || '#/dashboard';

    // 找完全匹配，若無則找前綴匹配（用於子路由如 #/raci/me）
    const route = visibleRoutes.find(r => r.hash === normalizedHash)
                || visibleRoutes.find(r => normalizedHash.startsWith(r.hash + '/'));

    if (!route) {
      renderNotFound(normalizedHash);
      return;
    }

    // 更新 URL hash（不觸發 hashchange 事件）
    if (location.hash !== normalizedHash) {
      history.replaceState(null, '', normalizedHash);
    }

    // 標記當前選單項
    highlightNavItem(normalizedHash);

    // 載入頁面內容
    const mainContent = document.getElementById('mainContent');
    try {
      const navId = ++activeNavigationId;
      const pageContext = createPageContext(navId, normalizedHash, mainContent);
      activePageContext = pageContext;
      const loader = Pages[route.loaderKey];
      if (typeof loader !== 'function') {
        throw new Error(`找不到頁面載入函式：${route.loaderKey}`);
      }
      Components.showSpinner('mainContent');
      await loader.call(Pages, mainContent, currentUser, pageContext);
    } catch (error) {
      console.error('頁面載入失敗：', error);
      mainContent.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">⚠️</div>
          <p>頁面載入失敗：${Components.escapeHtml(error.message)}</p>
        </div>`;
    }
  }

  // =============================================
  // 側邊選單渲染
  // =============================================

  /**
   * 依可見路由渲染左側選單
   * 依 section 分組，每個 section 加上小標題
   * 
   * @param {Array} routes
   */
  function renderSideNav(routes) {
    const navList = document.getElementById('navList');
    if (!navList) return;

    navList.innerHTML = '';
    const sections = groupBySection(routes);

    sections.forEach(({ section, items }) => {
      // Section 標籤
      const sectionEl = document.createElement('li');
      sectionEl.className = 'nav-section-label';
      sectionEl.textContent = section;
      navList.appendChild(sectionEl);

      // 路由項目
      items.forEach(route => {
        const li = document.createElement('li');
        li.className = 'nav-item';
        li.innerHTML = `
          <a href="${route.hash}" data-hash="${route.hash}">
            <span class="nav-item__icon">${route.icon}</span>
            <span>${Components.escapeHtml(route.label)}</span>
          </a>`;
        navList.appendChild(li);
      });
    });
  }

  function groupBySection(routes) {
    const map = new Map();
    routes.forEach(r => {
      if (!map.has(r.section)) map.set(r.section, []);
      map.get(r.section).push(r);
    });
    return [...map.entries()].map(([section, items]) => ({ section, items }));
  }

  function highlightNavItem(hash) {
    document.querySelectorAll('.nav-item a').forEach(a => {
      a.classList.toggle('active', a.dataset.hash === hash);
    });
  }

  // =============================================
  // 權限過濾
  // =============================================

  /**
   * 依使用者角色過濾可見路由
   * feature 欄位支援逗號分隔（OR 邏輯：任一滿足即可見）
   * 
   * @param {Array} routes
   * @returns {Promise<Array>}
   */
  async function filterVisibleRoutes(routes) {
    const role = currentUser?.role;
    if (!role) return [];

    const permChecks = await Promise.all(
      routes.map(route =>
        checkAnyPermission(route.feature.split(',').map(f => f.trim()))
      )
    );
    return routes.filter((_, i) => permChecks[i]);
  }

  /**
   * 檢查是否有任一 feature 的權限（OR 邏輯）
   * 
   * @param {Array<string>} features
   * @returns {Promise<boolean>}
   */
  async function checkAnyPermission(features) {
    for (const feature of features) {
      try {
        const result = await API.checkPermission(feature);
        if (result === true) return true;
      } catch (e) { /* 繼續檢查下一個 */ }
    }
    return false;
  }

  // =============================================
  // 使用者顯示
  // =============================================

  function updateUserDisplay(user) {
    const nameEl  = document.getElementById('userName');
    const badgeEl = document.getElementById('roleBadge');
    if (!user) return;

    if (nameEl)  nameEl.textContent = user.name || user.email;
    if (badgeEl) {
      badgeEl.textContent = user.roleLabel || user.role;
      badgeEl.className = 'role-badge badge ' + roleBadgeClass(user.role);
    }
  }

  function roleBadgeClass(role) {
    const map = {
      'ROLE-APP-ADMIN':    'badge--danger',
      'ROLE-APP-HR':       'badge--primary',
      'ROLE-APP-AUDITOR':  'badge--warning',
      'ROLE-APP-MGR':      'badge--success',
      'ROLE-APP-STAFF':    'badge--neutral',
      'ROLE-APP-EXTERNAL': 'badge--neutral',
    };
    return map[role] || 'badge--neutral';
  }

  // =============================================
  // 手機版漢堡選單
  // =============================================

  function initMobileMenu() {
    const hamburger = document.getElementById('hamburgerBtn');
    const sideNav   = document.getElementById('sideNav');
    const overlay   = document.getElementById('overlay');
    if (!hamburger || !sideNav || !overlay) return;

    const open  = () => { sideNav.classList.add('is-open'); overlay.classList.add('is-visible'); hamburger.setAttribute('aria-expanded','true'); };
    const close = () => { sideNav.classList.remove('is-open'); overlay.classList.remove('is-visible'); hamburger.setAttribute('aria-expanded','false'); };

    hamburger.onclick = () => sideNav.classList.contains('is-open') ? close() : open();
    overlay.onclick   = close;

    // 點選選單項目後自動關閉
    sideNav.addEventListener('click', e => {
      if (e.target.closest('a')) close();
    });
  }

  // =============================================
  // 404 頁面
  // =============================================

  function renderNotFound(hash) {
    const main = document.getElementById('mainContent');
    if (main) {
      main.innerHTML = `
        <div class="empty-state" style="min-height:400px">
          <div class="empty-state__icon">🔍</div>
          <h2>找不到頁面</h2>
          <p>路由 <code>${Components.escapeHtml(hash)}</code> 不存在或您無權限存取。</p>
          <a href="#/dashboard" class="btn btn--primary" style="margin-top:1rem">返回儀表板</a>
        </div>`;
    }
  }

  function createPageContext(navId, hash, container) {
    return {
      navId,
      hash,
      container,
      isActive() {
        return activeNavigationId === navId
          && activePageContext
          && activePageContext.navId === navId
          && container
          && container.isConnected
          && location.hash.replace(/\/$/, '') === hash;
      },
      query(selector) {
        return container ? container.querySelector(selector) : null;
      },
    };
  }

  // =============================================
  // Public API
  // =============================================

  return {
    init,
    navigateTo,
    getActivePageContext: () => activePageContext,
  };

})();

// =============================================
// 頁面載入函式命名空間
// =============================================

/**
 * Pages — 每個路由對應的頁面載入函式
 * 
 * 職責：呼叫 API、渲染 HTML 到 container
 * 設計：每個 load* 函式獨立，互不依賴
 */
const Pages = {

  // ========================
  // 儀表板
  // ========================
  async loadDashboard(container, user, pageCtx) {
    container.innerHTML = `
      <section class="dashboard-hero">
        <div class="dashboard-hero__intro">
          <span class="dashboard-hero__eyebrow">Insight Overview</span>
          <div class="dashboard-hero__headline">
            <h1>📊 儀表板</h1>
            <p>掌握人員輪廓、稽核風險與近期異動，快速判讀目前管理狀態。</p>
          </div>
        </div>
        <div class="dashboard-hero__meta">
          <div class="dashboard-hero__meta-label">目前視角</div>
          <div class="dashboard-hero__meta-value" id="dashboardScopeLabel">載入中...</div>
        </div>
      </section>
      <div id="dashboardWarnings"></div>
      <div class="dashboard-kpi-grid" id="statGrid">
        ${Array.from({ length: 8 }).map(() => `
          <div class="dashboard-kpi-card">
            <div class="dashboard-kpi-card__label">載入中...</div>
            <div class="dashboard-kpi-card__value">—</div>
          </div>`).join('')}
      </div>
      <div id="dashboardLogs" class="dashboard-section card"><div class="card__title">近期異動紀錄</div><div class="page-loading"><div class="spinner"></div></div></div>
      <div id="dashboardDebug" style="margin-top:1rem"></div>
    `;

    try {
      const stats = await API.getDashboardStats();
      if (!pageCtx.isActive()) return;
      const warnings = Array.isArray(stats.warnings) ? stats.warnings : [];
      const logs = stats.recentLogs || [];
      const total = stats.personnel?.total ?? (stats.person?.email ? 1 : 0);
      const payrollTotal = stats.personnel?.actualPayrollTotal ?? stats.actualPayroll ?? 0;
      const concurrentCount = Array.isArray(stats.concurrentPersonnel)
        ? stats.concurrentPersonnel.length
        : (stats.concurrentCount || 0);
      const raciRate = stats.raciCoverage?.rate ?? '—';
      const auditAlertCount = stats.auditAlerts
        ? ((stats.auditAlerts.accountabilityIssues > 0 ? stats.auditAlerts.accountabilityIssues : 0)
          + (stats.auditAlerts.roleCodeIssues > 0 ? stats.auditAlerts.roleCodeIssues : 0))
        : '—';
      const scopeLabelEl = pageCtx.query('#dashboardScopeLabel');
      const scopeLabelMap = {
        full: '全域總覽',
        dept: '部門視角',
        personal: '個人視角',
      };
      if (scopeLabelEl) scopeLabelEl.textContent = scopeLabelMap[stats.scope] || '總覽';
      const statGrid = pageCtx.query('#statGrid');
      if (!statGrid) return;
      const warningDiv = pageCtx.query('#dashboardWarnings');
      if (warningDiv) {
        warningDiv.innerHTML = warnings.length > 0 ? `
          <section class="dashboard-alert">
            <div class="dashboard-alert__header">
              <h3>資料警示</h3>
              <span class="badge badge--warning">${warnings.length} 項</span>
            </div>
            <div class="dashboard-alert__body">
              ${warnings.map(w => `<div class="dashboard-alert__item">${Components.escapeHtml(w.message || '組織資料異常，已改以安全模式顯示')}</div>`).join('')}
            </div>
          </section>` : '';
      }
      const statusBreakdown = stats.personnel?.statusBreakdown || {};
      const coreCards = stats.scope === 'personal'
        ? [
            {
              label: '我的狀態',
              value: Components.escapeHtml(stats.status || stats.person?.status || '—'),
              tone: 'primary',
              meta: '目前人員主檔狀態',
              compact: true,
            },
            {
              label: '在職',
              value: payrollTotal > 0 ? '是' : '否',
              tone: payrollTotal > 0 ? 'success' : 'neutral',
              meta: '依既有排除口徑判定',
              compact: true,
            },
            {
              label: '我的職務數',
              value: String(stats.assignmentCount || 0),
              tone: 'primary',
              meta: concurrentCount > 1 ? `含 ${concurrentCount} 筆兼任` : '單一或未設定職務',
            },
            {
              label: '兼任狀態',
              value: concurrentCount > 1 ? '兼任中' : '單一職務',
              tone: concurrentCount > 1 ? 'warning' : 'neutral',
              meta: '依職務配置筆數判定',
              compact: true,
            },
          ]
        : [
            {
              label: '在勤總人數',
              value: String(total),
              tone: 'success',
              meta: `全人員 ${stats.personnel?.totalAll ?? total} 位`,
            },
            {
              label: '在職',
              value: String(payrollTotal),
              tone: 'primary',
              meta: '排除倫理委員會、合作單位、委外廠商',
            },
            {
              label: '兼任人員',
              value: String(concurrentCount),
              tone: concurrentCount > 0 ? 'warning' : 'neutral',
              meta: '同一人擁有多筆職務配置',
            },
            {
              label: 'RACI 覆蓋率',
              value: raciRate === '—' ? '—' : `${raciRate}%`,
              tone: raciRate !== '—' && Number(raciRate) >= 80 ? 'success' : 'primary',
              meta: stats.raciCoverage?.total ? `${stats.raciCoverage.covered}/${stats.raciCoverage.total} 已覆蓋` : '未提供覆蓋資料',
            },
          ];
      const secondaryCards = stats.scope === 'personal'
        ? [
            {
              label: '身份角色',
              value: Components.escapeHtml(user?.roleLabel || '—'),
              tone: 'neutral',
              meta: '目前登入角色',
              compact: true,
            },
            {
              label: '登入帳號',
              value: Components.escapeHtml(user?.email || '—'),
              tone: 'neutral',
              meta: '當前登入識別',
              compact: true,
            },
            {
              label: '統計範圍',
              value: Components.escapeHtml(scopeLabelMap[stats.scope] || stats.scope || '—'),
              tone: 'neutral',
              meta: '依權限回傳資料',
              compact: true,
            },
          ]
        : [
            {
              label: '稽核警示',
              value: String(auditAlertCount),
              tone: Number(auditAlertCount) > 0 ? 'danger' : 'neutral',
              meta: 'A 欄唯一性與角色代碼檢查',
            },
            {
              label: '身份角色',
              value: Components.escapeHtml(user?.roleLabel || '—'),
              tone: 'neutral',
              meta: '目前登入角色',
              compact: true,
            },
            {
              label: '登入帳號',
              value: Components.escapeHtml(user?.email || '—'),
              tone: 'neutral',
              meta: '當前登入識別',
              compact: true,
            },
            {
              label: '統計範圍',
              value: Components.escapeHtml(scopeLabelMap[stats.scope] || stats.scope || '—'),
              tone: 'neutral',
              meta: stats.scope === 'dept'
                ? `在勤 ${stats.personnel?.total ?? 0} / 在職 ${stats.personnel?.actualPayrollTotal ?? 0}`
                : `育嬰假 ${statusBreakdown['育嬰假'] || 0} / 外派 ${statusBreakdown['外派人員'] || 0}`,
              compact: true,
            },
          ];
      const renderKpiCard = (card, variant = 'core') => `
        <article class="dashboard-kpi-card dashboard-kpi-card--${variant} dashboard-kpi-card--${card.tone || 'neutral'}">
          <div class="dashboard-kpi-card__label">${card.label}</div>
          <div class="dashboard-kpi-card__value${card.compact ? ' dashboard-kpi-card__value--compact' : ''}">${card.value}</div>
          <div class="dashboard-kpi-card__meta">${card.meta || '&nbsp;'}</div>
        </article>`;
      statGrid.innerHTML = `
        ${coreCards.map(card => renderKpiCard(card, 'core')).join('')}
        ${secondaryCards.map(card => renderKpiCard(card, 'secondary')).join('')}
      `;

      const logsDiv = pageCtx.query('#dashboardLogs');
      if (!logsDiv) return;
      if (logs.length === 0) {
        logsDiv.innerHTML = '<div class="dashboard-section__header"><div><div class="dashboard-section__eyebrow">Recent Activity</div><h3 class="card__title">近期異動紀錄</h3></div></div><div class="empty-state"><p>尚無操作記錄</p></div>';
        return;
      }
      const rows = logs.map(l => `
        <tr>
          <td>${Components.formatDateTime(l.timestamp)}</td>
          <td>${Components.escapeHtml(l.operator)}</td>
          <td><span class="badge badge--neutral">${Components.escapeHtml(l.action)}</span></td>
          <td>${Components.escapeHtml(l.target)}</td>
        </tr>`).join('');
      logsDiv.innerHTML = `
        <div class="dashboard-section__header">
          <div>
            <div class="dashboard-section__eyebrow">Recent Activity</div>
            <h3 class="card__title">近期異動紀錄</h3>
          </div>
          <div class="dashboard-section__meta">最近 ${logs.length} 筆</div>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead><tr><th>時間</th><th>操作者</th><th>類型</th><th>對象</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    } catch (err) {
      if (!pageCtx.isActive()) return;
      console.error('loadDashboard 失敗：', err);
      API.handleError(err);
      Components.renderLoadError('mainContent', {
        title: '儀表板載入失敗',
        message: '首頁資料未能完成初始化。',
        details: err.message,
        actionLabel: '重新載入首頁',
        onAction: () => Router.navigateTo(pageCtx.hash),
      });
      API.getAppDebugInfo()
        .then(info => {
          if (!pageCtx.isActive()) return;
          console.error('Dashboard debug info:', info);
          const debugContainer = pageCtx.container;
          if (!debugContainer) return;
          debugContainer.insertAdjacentHTML('beforeend', `
            <div class="card" style="margin-top:1rem">
              <div class="card__header"><h3 class="card__title">診斷資訊</h3></div>
              <div style="font-size:.85rem;color:var(--color-text-sub);line-height:1.7">
                <div>使用者：${Components.escapeHtml(info.user?.email || '—')}</div>
                <div>角色：${Components.escapeHtml(info.user?.roleLabel || info.user?.role || '—')}</div>
                <div>試算表：${Components.escapeHtml(info.spreadsheet?.name || '—')}</div>
                <div>資料筆數：人員 ${info.counts?.personnel ?? '—'} / 組織 ${info.counts?.org ?? '—'} / 職務 ${info.counts?.assignment ?? '—'} / RACI ${info.counts?.raci ?? '—'}</div>
              </div>
            </div>`);
        })
        .catch(debugErr => {
          console.error('Dashboard debug info failed:', debugErr);
        });
    }
  },

  // ========================
  // 人員管理
  // ========================
  async loadPersonnel(container, user, pageCtx) {
    const canWrite  = user?.role === 'ROLE-APP-ADMIN' || user?.role === 'ROLE-APP-HR';
    const canDelete = user?.role === 'ROLE-APP-ADMIN';
    const excludedPayrollStatuses = new Set(['倫理委員會', '合作單位', '委外廠商', '離職']);
    const statusOptions = [
      { key: '在職', label: '在職', type: 'derived' },
      { key: '在勤', label: '在勤', type: 'status' },

  // 將 'yyyy/MM/dd'（或可解析的日期字串）轉為 <input type="date"> 需要的 'yyyy-MM-dd'；無法解析回 ''。
  _toDateInputValue(raw) {
    const s = String(raw || '').trim();
    if (!s) return '';
    // 緊湊 yyyyMMdd（如 20260101）
    const compact = s.match(/^(\d{4})(\d{2})(\d{2})$/);
    if (compact && +compact[2] >= 1 && +compact[2] <= 12 && +compact[3] >= 1 && +compact[3] <= 31) {
      return `${compact[1]}-${compact[2]}-${compact[3]}`;
    }
    const m = s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);
    if (m) return `${m[1]}-${('0' + m[2]).slice(-2)}-${('0' + m[3]).slice(-2)}`;
    const d = new Date(s);
    if (!isNaN(d.getTime())) {
      return `${d.getFullYear()}-${('0' + (d.getMonth() + 1)).slice(-2)}-${('0' + d.getDate()).slice(-2)}`;
    }
    return '';
  },

  // <input type="date"> 的 'yyyy-MM-dd' 轉回專案儲存格式 'yyyy/MM/dd'；空回 ''。
  _fromDateInputValue(raw) {
    const s = String(raw || '').trim();
    if (!s) return '';
    return s.replace(/-/g, '/');
  },

  // 將已正規化的日期字串解析為 Date；無法解析回 null。
  // 附加 T00:00:00 避免 new Date('yyyy-MM-dd') 被當 UTC 午夜解析，在瀏覽器所在時區產生日期偏移。
  _parseStoredDate(raw) {
    const iso = Pages._toDateInputValue(raw);
    if (!iso) return null;
    const d = new Date(`${iso}T00:00:00`);
    return isNaN(d.getTime()) ? null : d;
  },

  // 計算在職時間，格式 "X年Y個月"。leaveDate 為空則以目前時間為終點（每次渲染即時計算）。
  _formatTenure(hireDate, leaveDate) {
    const start = Pages._parseStoredDate(hireDate);
    if (!start) return '—';
    const end = leaveDate ? Pages._parseStoredDate(leaveDate) : new Date();
    if (!end) return '—';
    if (end.getTime() < start.getTime()) return '—'; // 離職早於到職（壞資料）或到職日期在未來

    let years = end.getFullYear() - start.getFullYear();
    let months = end.getMonth() - start.getMonth();
    if (end.getDate() < start.getDate()) months -= 1;
    if (months < 0) { years -= 1; months += 12; }

    return `${years}年${months}個月`;
  },

  // 假進度控制器。
  // - 預設（不傳 durationMs）：300ms tick、每次 +10% 到 90%，沿用既有行為。
  // - 傳 durationMs（如 10000）：改 1000ms tick、平均爬升到 90%（10 秒約 90%），
  //   並每秒輪播 options.messages 內的文案，營造資料處理中的即時感。
  _createProgressController(options = {}) {
    const bodyEl = document.getElementById('modalBody');
    const confirmBtn = document.getElementById('modalConfirmBtn');
    const cancelBtn = document.getElementById('modalCancelBtn');
    const closeBtn = document.getElementById('modalClose');
    const originalConfirmDisplay = confirmBtn ? confirmBtn.style.display : '';
    const originalCancelText = cancelBtn ? cancelBtn.textContent : '取消';
    const messages = (Array.isArray(options.messages) && options.messages.length)
      ? options.messages.slice()
      : [options.message || '處理中...'];
    const hint = options.hint || '請稍候';
    const durationMs = Number(options.durationMs) > 0 ? Number(options.durationMs) : 0;
    const tickMs = durationMs ? 1000 : 300;
    const stepPct = durationMs ? (90 / (durationMs / 1000)) : 10;
    let progress = 0;
    let tickIndex = 0;
    let currentMessage = messages[0];
    let intervalId = null;

    const render = () => {
      if (!bodyEl) return;
      bodyEl.innerHTML = Components.renderModalProgress({
        message: currentMessage,
        percent: progress,
        percentText: `${Math.round(progress)}%`,
        hint,
      });
    };

    return {
      start() {
        progress = 0;
        tickIndex = 0;
        currentMessage = messages[0];
        render();
        if (confirmBtn) confirmBtn.style.display = 'none';
        if (cancelBtn) cancelBtn.textContent = '處理中';
        intervalId = setInterval(() => {
          tickIndex++;
          progress = Math.min(progress + stepPct, 90);
          currentMessage = messages[tickIndex % messages.length];
          render();
        }, tickMs);
      },
      async complete() {
        if (intervalId) clearInterval(intervalId);
        intervalId = null;
        progress = 100;
        currentMessage = messages[messages.length - 1];
        render();
        await new Promise(resolve => setTimeout(resolve, 180));
      },
      stop() {
        if (intervalId) clearInterval(intervalId);
        intervalId = null;
        if (confirmBtn) confirmBtn.style.display = originalConfirmDisplay;
        if (cancelBtn) cancelBtn.textContent = originalCancelText;
        if (closeBtn) closeBtn.disabled = false;
      },
    };
  },

  _upsertPersonnelState(person, mode = 'update') {
    const state = Pages._personnelState;
    if (!state || !person) return;
    const { originalName, ...personData } = person;
    const normalizedEmail = String(personData.email || '').trim().toLowerCase();
    let existingIndex = normalizedEmail
      ? state.data.findIndex(item => String(item.email || '').trim().toLowerCase() === normalizedEmail)
      : -1;
    // 無信箱人員（或編輯時補上信箱）：以「信箱空白＋原姓名」定位既有列
    if (existingIndex < 0 && (!normalizedEmail || originalName)) {
      const matchName = String(originalName || personData.name || '').trim();
      if (matchName) {
        existingIndex = state.data.findIndex(item => !String(item.email || '').trim() && String(item.name || '').trim() === matchName);
      }
    }
    if (existingIndex >= 0) {
      state.data.splice(existingIndex, 1, { ...state.data[existingIndex], ...personData });
    } else if (mode === 'add') {
      state.data.unshift({ ...personData });
    }
    state.refreshView();
  },

  _syncPersonnelAssignmentCache(person) {
    const prefetchState = Pages._personnelAssignmentPrefetchState;
    if (!prefetchState || !person || !prefetchState.byEmail) return;
    const normalizedEmail = String(person.email || '').trim().toLowerCase();
    if (!normalizedEmail) return; // 無信箱人員不會有職務快取
    const cachedPayload = prefetchState.byEmail.get(normalizedEmail);
    if (!cachedPayload || !cachedPayload.person) return;
    cachedPayload.person = {
      ...cachedPayload.person,
      email: person.email,
      name: person.name,
      status: person.status,
      phone: person.phone,
      mobile: person.mobile,
      hireDate: person.hireDate,
      leaveDate: person.leaveDate,
    };
    prefetchState.byEmail.set(normalizedEmail, cachedPayload);
  },

  // 人員表單（新增/編輯）
  _showPersonForm(existingPerson) {
    const isEdit = !!existingPerson;
    let formDraft = {
      email: existingPerson?.email || '',
      name: existingPerson?.name || '',
      status: existingPerson?.status || '在勤',
      phone: existingPerson?.phone || '',
      mobile: existingPerson?.mobile || '',
      hireDate: existingPerson?.hireDate || '',
      leaveDate: existingPerson?.leaveDate || '',
    };

    Components.showModal(isEdit ? '編輯人員' : '新增人員', Pages._renderPersonFormBody(formDraft, isEdit), async () => {
      formDraft = {
        email:  document.getElementById('pEmail').value.trim(),
        name:   document.getElementById('pName').value.trim(),
        status: document.getElementById('pStatus').value,
        phone:  document.getElementById('pPhone').value.trim(),
        mobile: document.getElementById('pMobile').value.trim(),
        hireDate:  Pages._fromDateInputValue(document.getElementById('pHireDate').value),
        leaveDate: Pages._fromDateInputValue(document.getElementById('pLeaveDate').value),
      };
      // 離職日期一旦有值，狀態強制為離職，與後端 personnelRowFromObj_ 的規則同步，
      // 避免存檔後樂觀更新（_upsertPersonnelState/_syncPersonnelAssignmentCache）顯示舊狀態
      if (formDraft.leaveDate) formDraft.status = '離職';
      const progress = Pages._createProgressController({
        message: isEdit ? '儲存人員資料中...' : '新增人員資料中...',
        hint: '系統正在同步資料',
      });
      // 編輯時帶 originalName：無信箱人員（email 空）後端與本地皆以原姓名定位資料列
      const payload = isEdit ? { ...formDraft, originalName: existingPerson.name } : formDraft;
      try {
        progress.start();
        if (isEdit) { await API.updatePerson(existingPerson.email, payload); }
        else        { await API.addPerson(formDraft); }
        await progress.complete();
        Pages._upsertPersonnelState(payload, isEdit ? 'update' : 'add');
        Pages._syncPersonnelAssignmentCache(formDraft);
        Components.showToast(isEdit ? '人員更新成功' : '人員新增成功', 'success');
        return true;
      } catch (err) {
        progress.stop();
        API.handleError(err);
        const bodyEl = document.getElementById('modalBody');
        if (bodyEl) {
          bodyEl.innerHTML = Pages._renderPersonFormBody(formDraft, isEdit);
        }
        return false;
      }
    }, isEdit ? '儲存' : '新增', {
      closeBeforeConfirm: false,
    });
  },

  // 「在職」衍生定義：與人員清單頁篩選 tab（loadPersonnel 的 excludedPayrollStatuses）、
  // DashboardAPI.js 的 isActualPayrollPersonnel_ 維持同一套「在職」概念，避免各處定義不一致。
  _activePersonnelStatuses() {

  // Components.showModal 為同步渲染（見 js/components.html bodyEl.innerHTML = body），
  // 故呼叫 showModal 後立即綁定即可取得剛渲染好的 DOM。
  _bindPersonnelExportStatusControls() {
    const groupEl = document.getElementById('exportStatusActiveGroup');
    const childEls = Array.from(document.querySelectorAll('.export-status-child'));
    if (!groupEl || !childEls.length) return;

    const syncGroupFromChildren = () => {
      const checkedCount = childEls.filter(el => el.checked).length;
      groupEl.checked = checkedCount === childEls.length;
      groupEl.indeterminate = checkedCount > 0 && checkedCount < childEls.length;
    };

    groupEl.onchange = () => {
      childEls.forEach(el => { el.checked = groupEl.checked; });
      groupEl.indeterminate = false;
    };
    childEls.forEach(el => { el.onchange = syncGroupFromChildren; });

    syncGroupFromChildren();
  },

  _downloadPersonnelFile(headers, rows, format) {
    const now = new Date();
    const stamp = `${now.getFullYear()}${('0' + (now.getMonth() + 1)).slice(-2)}${('0' + now.getDate()).slice(-2)}`;
    if (format === 'xlsx' && window.XLSX) {
      const ws = XLSX.utils.aoa_to_sheet([headers].concat(rows));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '人員名單');
      XLSX.writeFile(wb, `人員名單_${stamp}.xlsx`);
      return;
    }
    const csv = [headers].concat(rows).map(r => r.map(Pages._csvCell).join(',')).join('\r\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `人員名單_${stamp}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  },

  _csvCell(v) {
    const s = String(v == null ? '' : v);
    return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  },

  // ---------- 匯入 ----------
  _showPersonnelImport() {
    let parsedRecords = null;
    const body = `
      <div class="form-group">
        <label class="form-label required">選擇檔案（CSV 或 Excel）</label>
        <input type="file" id="personnelImportFile" class="form-control" accept=".csv,.xlsx,.xls">
        <p style="font-size:.82rem;color:#64748b;margin-top:.5rem;line-height:1.5">
          檔案第一列須為欄位標題，且必須包含「信箱」欄；離職人員歷史檔可無信箱欄，但每列須有「姓名」與「離職日期」。可包含欄位：信箱、姓名、員工狀態、電話、手機、到職日期、離職日期。<br>
          比對以信箱為單一事實來源（無信箱的離職人員改以姓名比對）；空白欄不會覆蓋既有資料。
        </p>
        <div id="personnelImportFileInfo" style="font-size:.85rem;color:#334155;margin-top:.5rem"></div>
      </div>`;

    Components.showModal('匯入人員 — 選擇檔案', body, async () => {
      if (!parsedRecords || !parsedRecords.length) {
        Components.showToast('請先選擇有效的檔案（每筆需含信箱，或姓名＋離職日期）', 'warning');
        return false;
      }
      const diff = await Pages._comparePersonnelImport(parsedRecords);
      Pages._showPersonnelImportPreview(diff);
      return false; // 預覽 modal 已接手畫面，勿讓 hideModal 關掉它
    }, '下一步：比對', { closeBeforeConfirm: false, modalClassName: 'modal--wide' });

    const fileInput = document.getElementById('personnelImportFile');
    if (fileInput) {
      fileInput.addEventListener('change', async (e) => {
        const file = e.target.files && e.target.files[0];
        const info = document.getElementById('personnelImportFileInfo');
        parsedRecords = null;
        if (!file) { if (info) info.textContent = ''; return; }
        try {
          parsedRecords = await Pages._parseImportFile(file);
          if (info) info.innerHTML = `已讀取 <strong>${parsedRecords.length}</strong> 筆資料（${Components.escapeHtml(file.name)}）`;
        } catch (err) {
          if (info) info.textContent = '檔案解析失敗：' + (err && err.message ? err.message : err);
          Components.showToast('檔案解析失敗', 'error');
        }
      });
    }
  },

  _parseImportFile(file) {
    return new Promise((resolve, reject) => {
      const name = String(file.name || '').toLowerCase();
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('讀取檔案失敗'));
      if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
        reader.onload = (e) => {
          try {
            if (!window.XLSX) throw new Error('Excel 解析元件未載入');
            const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: '' });
            resolve(Pages._rowsToImportRecords(aoa));
          } catch (err) { reject(err); }
        };
        reader.readAsArrayBuffer(file);
      } else {
        reader.onload = (e) => {
          try {
            resolve(Pages._rowsToImportRecords(Pages._parseCsv(String(e.target.result || ''))));
          } catch (err) { reject(err); }
        };
        reader.readAsText(file);
      }
    });
  },

  _parseCsv(text) {
    const clean = String(text || '').replace(/^﻿/, '');
    const rows = [];
    let row = [], field = '', inQuotes = false, hasContent = false;
    for (let i = 0; i < clean.length; i++) {
      const c = clean[i];
      if (inQuotes) {
        if (c === '"') {
          if (clean[i + 1] === '"') { field += '"'; i++; }
          else inQuotes = false;
        } else { field += c; }
      } else if (c === '"') {
        inQuotes = true; hasContent = true;
      } else if (c === ',') {
        row.push(field); field = ''; hasContent = true;
      } else if (c === '\n') {
        row.push(field); rows.push(row); row = []; field = ''; hasContent = false;
      } else if (c === '\r') {
        // 忽略，交由 \n 收尾
      } else {
        field += c; hasContent = true;
      }
    }
    if (hasContent || field !== '' || row.length) { row.push(field); rows.push(row); }
    return rows;
  },

  _personnelHeaderAlias(h) {
    const key = String(h == null ? '' : h).trim().toLowerCase();
    const map = {
      '信箱': 'email', 'email': 'email', '電子郵件': 'email', 'e-mail': 'email',
      '姓名': 'name', 'name': 'name',
      '員工狀態': 'status', '狀態': 'status', 'status': 'status',
      '電話': 'phone', 'phone': 'phone', '市話': 'phone',
      '手機': 'mobile', '行動電話': 'mobile', 'mobile': 'mobile',
      '到職日期': 'hireDate', '到職日': 'hireDate', 'hiredate': 'hireDate',
      '離職日期': 'leaveDate', '離職日': 'leaveDate', 'leavedate': 'leaveDate',
    };
    return map[key] || '';
  },

  _rowsToImportRecords(aoa) {
    const rows = (aoa || []).filter(r => Array.isArray(r) && r.some(c => String(c == null ? '' : c).trim() !== ''));
    if (rows.length < 2) return [];
    const header = rows[0].map(h => String(h == null ? '' : h).trim());
    const colIndex = {};
    header.forEach((h, idx) => {
      const key = Pages._personnelHeaderAlias(h);
      if (key && colIndex[key] === undefined) colIndex[key] = idx;
    });
    if (colIndex.email === undefined && colIndex.leaveDate === undefined) {
      throw new Error('找不到「信箱」欄，請確認第一列標題（離職人員歷史檔可無信箱欄，但須有「離職日期」欄）');
    }
    const cellAt = (row, field) => {
      const idx = colIndex[field];
      return idx === undefined ? '' : String(row[idx] == null ? '' : row[idx]).trim();
    };
    return rows.slice(1).map(r => ({
      email: cellAt(r, 'email'),
      name: cellAt(r, 'name'),
      status: cellAt(r, 'status'),
      phone: cellAt(r, 'phone'),
      mobile: cellAt(r, 'mobile'),
      hireDate: Pages._normalizeDateStr(cellAt(r, 'hireDate')),
      leaveDate: Pages._normalizeDateStr(cellAt(r, 'leaveDate')),
    })).filter(rec => rec.email || rec.name); // 無信箱但有姓名的列留給比對階段驗證（離職人員可無信箱）
  },

  _normalizeDateStr(s) {
    const raw = String(s == null ? '' : s).trim();
    if (!raw) return '';
    // 緊湊 yyyyMMdd（如 20260101）
    const compact = raw.match(/^(\d{4})(\d{2})(\d{2})$/);
    if (compact && +compact[2] >= 1 && +compact[2] <= 12 && +compact[3] >= 1 && +compact[3] <= 31) {
      return `${compact[1]}/${compact[2]}/${compact[3]}`;
    }
    const m = raw.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);
    if (m) return `${m[1]}/${('0' + m[2]).slice(-2)}/${('0' + m[3]).slice(-2)}`;
    const d = new Date(raw);
    if (!isNaN(d.getTime())) {
      return `${d.getFullYear()}/${('0' + (d.getMonth() + 1)).slice(-2)}/${('0' + d.getDate()).slice(-2)}`;
    }
    return raw;
  },

  async _comparePersonnelImport(imported) {
    const progress = Pages._createProgressController({
      durationMs: 10000, hint: '比對現有名單', messages: Pages._compareProgressMessages(),
    });
    progress.start();
    let existingList = [];
    try {
      existingList = await API.getAllPersonnel();
    } catch (err) {
      progress.stop();
      API.handleError(err);
      throw err;
    }
    await progress.complete();

    const byEmail = new Map();
    const byName = new Map(); // nameKey -> [persons]，供無信箱的離職人員以姓名比對
    (Array.isArray(existingList) ? existingList : []).forEach(p => {
      const emailKey = String(p.email || '').trim().toLowerCase();
      if (emailKey) byEmail.set(emailKey, p);
      const nameKey = String(p.name || '').trim().toLowerCase();
      if (!nameKey) return;
      if (!byName.has(nameKey)) byName.set(nameKey, []);
      byName.get(nameKey).push(p);
    });

    const statusSet = new Set(Pages._personnelStatusList());
    const fields = Pages._personnelImportFields;
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const result = { news: [], fills: [], conflicts: [], errors: [], unchanged: 0 };
    const seen = new Set();

    imported.forEach(rec => {
      let email = String(rec.email || '').trim();
      const name = String(rec.name || '').trim();
      const displayKey = () => email || `（無信箱）${name}`;

      // 身分解析：有信箱走信箱比對；無信箱（僅限離職人員）以姓名比對現有名單
      let existing = null;
      if (email) {
        if (!emailRe.test(email)) {
          result.errors.push({ email: displayKey(), reason: '信箱格式不正確' });
          return;
        }
        existing = byEmail.get(email.toLowerCase()) || null;
      } else {
        if (!name || !rec.leaveDate) {
          result.errors.push({ email: displayKey() || '(空白信箱)', reason: '無信箱人員僅限已離職者（需同時有姓名與離職日期）' });
          return;
        }
        const matches = byName.get(name.toLowerCase()) || [];
        if (matches.length > 1) {
          result.errors.push({ email: displayKey(), reason: `現有名單中有 ${matches.length} 位同名人員，請人工處理` });
          return;
        }
        if (matches.length === 1) {
          existing = matches[0];
          email = String(existing.email || '').trim(); // 沿用既有信箱（可能仍為空 → 後端以姓名定位更新）
        }
      }

      // 統一去重鍵：解析後的信箱，或（仍無信箱時）姓名
      const key = email ? email.toLowerCase() : 'name:' + name.toLowerCase();
      if (seen.has(key)) {
        result.errors.push({ email: displayKey(), reason: email ? '檔案內信箱重複' : '檔案內姓名重複（無信箱）' });
        return;
      }
      seen.add(key);

      if (!existing) {
        const problems = [];
        if (!name) problems.push('缺少姓名');
        if (rec.status && !statusSet.has(rec.status)) problems.push('員工狀態不合法');
        if (problems.length) { result.errors.push({ email: displayKey(), reason: problems.join('、') }); return; }
        result.news.push({
          email,
          displayKey: displayKey(),
          final: {
            email, name: name, status: rec.status || '在勤',
            phone: rec.phone, mobile: rec.mobile, hireDate: rec.hireDate, leaveDate: rec.leaveDate,
            action: 'add',
          },
        });
        return;
      }

      const finalBase = {
        email: existing.email, name: existing.name || '', status: existing.status || '在勤',
        phone: existing.phone || '', mobile: existing.mobile || '',
        hireDate: existing.hireDate || '', leaveDate: existing.leaveDate || '',
      };
      const fillFields = [];
      const conflictFields = [];
      let statusInvalid = false;
      fields.forEach(f => {
        const impVal = String(rec[f.key] || '').trim();
        const exVal = String(existing[f.key] || '').trim();
        if (!impVal) return;
        if (f.key === 'status' && !statusSet.has(impVal)) { statusInvalid = true; return; }
        if (!exVal) fillFields.push({ key: f.key, label: f.label, oldVal: exVal, newVal: impVal });
        else if (exVal !== impVal) conflictFields.push({ key: f.key, label: f.label, oldVal: exVal, newVal: impVal });
      });
      if (statusInvalid) { result.errors.push({ email, reason: '員工狀態不合法' }); return; }

      if (!fillFields.length && !conflictFields.length) { result.unchanged++; return; }

      if (conflictFields.length) {
        result.conflicts.push({ email, displayKey: displayKey(), name: existing.name || '', existing: finalBase, fillFields, conflictFields });
      } else {
        const final = Object.assign({}, finalBase, { action: 'update' });
        fillFields.forEach(f => { final[f.key] = f.newVal; });
        result.fills.push({ email, displayKey: displayKey(), name: existing.name || '', fillFields, final });
      }
    });
    return result;
  },

  _renderImportPreview(diff) {
    const esc = Components.escapeHtml;
    const c = { n: diff.news.length, u: diff.fills.length, k: diff.conflicts.length, e: diff.errors.length, s: diff.unchanged };
    const parts = [];
    parts.push(`<div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem">
      <span class="badge badge--success">新增 ${c.n}</span>
      <span class="badge badge--primary">自動更新 ${c.u}</span>
      <span class="badge badge--warning">衝突 ${c.k}</span>
      <span class="badge badge--danger">錯誤 ${c.e}</span>
      <span class="badge badge--neutral">無變更 ${c.s}</span>
    </div>`);

    if (c.n) {
      parts.push(`<h3 style="margin:.75rem 0 .35rem;font-size:.95rem">新增人員（${c.n}）</h3>`);
      parts.push('<ul style="margin:0 0 .5rem;padding-left:1.1rem;font-size:.85rem;line-height:1.7">' +
        diff.news.map(n => `<li>${esc(n.displayKey || n.final.email)}　${esc(n.final.name)}　<span class="badge badge--neutral">${esc(n.final.status)}</span></li>`).join('') + '</ul>');
    }
    if (c.u) {
      parts.push(`<h3 style="margin:.75rem 0 .35rem;font-size:.95rem">自動填補空欄（${c.u}）</h3>`);
      parts.push('<ul style="margin:0 0 .5rem;padding-left:1.1rem;font-size:.85rem;line-height:1.7">' +
        diff.fills.map(f => `<li>${esc(f.displayKey || f.email)}　${esc(f.name)}：${f.fillFields.map(x => `${esc(x.label)}→${esc(x.newVal)}`).join('、')}</li>`).join('') + '</ul>');
    }
    if (c.k) {
      parts.push(`<div style="display:flex;justify-content:space-between;align-items:center;margin:.75rem 0 .35rem">
        <h3 style="margin:0;font-size:.95rem">欄位衝突（${c.k}）</h3>
        <div style="display:flex;gap:.4rem">
          <button type="button" class="btn btn--ghost btn--sm" id="importConflictOverwriteAll">全部覆蓋</button>
          <button type="button" class="btn btn--ghost btn--sm" id="importConflictRejectAll">全部拒絕</button>
        </div>
      </div>`);
      parts.push(diff.conflicts.map((cf, i) => `
        <div style="border:1px solid #e2e8f0;border-radius:8px;padding:.6rem .75rem;margin-bottom:.5rem">
          <div style="font-weight:600;margin-bottom:.35rem;font-size:.9rem">${esc(cf.displayKey || cf.email)}　${esc(cf.name)}</div>
          ${cf.conflictFields.map(f => `<div style="font-size:.83rem;line-height:1.6">${esc(f.label)}：<span style="color:#b91c1c">${esc(f.oldVal || '(空白)')}</span> → <span style="color:#047857">${esc(f.newVal)}</span></div>`).join('')}
          ${cf.fillFields.length ? `<div style="font-size:.78rem;color:#64748b;margin-top:.25rem">另自動填補：${cf.fillFields.map(x => esc(x.label)).join('、')}</div>` : ''}
          <div style="margin-top:.5rem;display:flex;gap:1.2rem;font-size:.85rem">
            <label style="display:inline-flex;align-items:center;gap:.3rem"><input type="radio" name="conflict_${i}" value="overwrite"> 覆蓋</label>
            <label style="display:inline-flex;align-items:center;gap:.3rem"><input type="radio" name="conflict_${i}" value="reject" checked> 拒絕</label>
          </div>
        </div>`).join(''));
    }
    if (c.e) {
      parts.push(`<h3 style="margin:.75rem 0 .35rem;font-size:.95rem;color:#b91c1c">無法匯入（${c.e}）</h3>`);
      parts.push('<ul style="margin:0 0 .5rem;padding-left:1.1rem;font-size:.85rem;line-height:1.7;color:#b91c1c">' +
        diff.errors.map(er => `<li>${esc(er.email)}：${esc(er.reason)}</li>`).join('') + '</ul>');
    }
    if (!c.n && !c.u && !c.k) {
      parts.push('<p style="color:#64748b;font-size:.9rem">沒有需要寫入的變更。</p>');
    }
    return parts.join('');
  },

  _bindImportPreviewControls(diff) {
    const setAll = (val) => {
      diff.conflicts.forEach((_, i) => {
        const el = document.querySelector(`input[name="conflict_${i}"][value="${val}"]`);
        if (el) el.checked = true;
      });
    };
    const overBtn = document.getElementById('importConflictOverwriteAll');
    const rejectBtn = document.getElementById('importConflictRejectAll');
    if (overBtn) overBtn.onclick = () => setAll('overwrite');
    if (rejectBtn) rejectBtn.onclick = () => setAll('reject');
  },

  _showPersonnelImportPreview(diff) {
    // 離職日期一旦有值，狀態強制為離職，與後端 personnelRowFromObj_ 的規則同步；
    // 在渲染預覽前先套用，避免預覽畫面顯示的狀態跟實際存檔結果不一致
    diff.news.forEach(n => { if (n.final.leaveDate) n.final.status = '離職'; });
    diff.fills.forEach(f => { if (f.final.leaveDate) f.final.status = '離職'; });
    const hasWork = (diff.news.length + diff.fills.length + diff.conflicts.length) > 0;
    Components.showModal('匯入預覽', Pages._renderImportPreview(diff), async () => {
      const records = [];
      diff.news.forEach(n => records.push(n.final));
      diff.fills.forEach(f => records.push(f.final));
      diff.conflicts.forEach((cf, i) => {
        const sel = document.querySelector(`input[name="conflict_${i}"]:checked`);
        const decision = sel ? sel.value : 'reject';
        const final = Object.assign({}, cf.existing, { action: 'update' });
        cf.fillFields.forEach(f => { final[f.key] = f.newVal; });
        if (decision === 'overwrite') {
          cf.conflictFields.forEach(f => { final[f.key] = f.newVal; });
        }
        if (final.leaveDate) final.status = '離職';
        if (decision === 'overwrite' || cf.fillFields.length) {
          records.push(final);
        }
      });

      if (!records.length) { Components.showToast('沒有需要寫入的變更', 'warning'); return true; }

      const progress = Pages._createProgressController({
        durationMs: 10000, hint: '寫入人員主檔', messages: Pages._importProgressMessages(),
      });
      try {
        progress.start();
        const res = await API.importPersonnelBatch(records);
        await progress.complete();
        await Pages._reloadPersonnelAfterImport();
        Components.showToast(`匯入完成：新增 ${res.added}、更新 ${res.updated}、略過 ${res.skipped}`,
          res.skipped ? 'warning' : 'success');
        return true;
      } catch (err) {
        progress.stop();
        API.handleError(err);
        const bodyEl = document.getElementById('modalBody');
        if (bodyEl) bodyEl.innerHTML = Pages._renderImportPreview(diff);
        Pages._bindImportPreviewControls(diff);
        return false;
      }
    }, '確認匯入', {
      closeBeforeConfirm: false,
      modalClassName: 'modal--wide',
      bodyClassName: 'modal__body--dense',
      hideConfirm: !hasWork,
      cancelText: hasWork ? '取消' : '關閉',
    });
    Pages._bindImportPreviewControls(diff);
  },

  async _reloadPersonnelAfterImport() {
    const state = Pages._personnelState;
    const pageCtx = state && state.pageCtx;
    if (!state || !pageCtx || !pageCtx.isActive()) return;
    try {
      const data = await API.getAllPersonnel();
      if (state.navId !== pageCtx.navId) return;
      state.data = Array.isArray(data) ? data.slice() : [];
      state.refreshView();
    } catch (err) {
      console.error('匯入後重新載入人員失敗：', err);
    }
  },

  async _editPerson(email, name) {
    const pageCtx = Router.getActivePageContext();
    const state = Pages._personnelState;
    const backdrop = document.getElementById('modalBackdrop');
    if (!pageCtx || !pageCtx.isActive()) return;
    const person = state && state.navId === pageCtx.navId ? state.findByIdentity(email, name) : null;
    if (person) {
      Pages._showPersonForm(person);
      return;
    }

    Components.showModal(
      '編輯人員',
      Components.renderModalProgress({
        message: '載入人員資料中...',
        percent: 0,
        percentText: '0%',
        hint: '準備開啟編輯視窗',
      }),
      () => true,
      '關閉',
      {
        hideConfirm: true,
        cancelText: '關閉',
      }
    );

    const progress = Pages._createProgressController({
      message: '載入人員資料中...',
      hint: '正在同步最新資料',
    });
    progress.start();

    try {
      const data = await API.getAllPersonnel();
      if (!pageCtx.isActive()) return;
      const normalizedEmail = String(email || '').trim().toLowerCase();
      const latestPerson = normalizedEmail
        ? (data || []).find(item => String(item.email || '').trim().toLowerCase() === normalizedEmail)
        : (data || []).find(item => !String(item.email || '').trim() && String(item.name || '').trim() === String(name || '').trim());
      await progress.complete();
      if (backdrop?.hidden) return;
      progress.stop();
      if (!latestPerson) {
        Components.showToast('找不到指定人員資料', 'warning');
        Components.hideModal();
        return;
      }
      Pages._showPersonForm(latestPerson);
    } catch (err) {
      progress.stop();
      API.handleError(err);
      const bodyEl = document.getElementById('modalBody');
      if (!bodyEl) return;
      bodyEl.innerHTML = `
        <div class="empty-state" style="margin:0">
          <p>無法取得人員資料</p>
          <p style="font-size:.85rem;color:var(--color-text-sub)">${Components.escapeHtml(err.message)}</p>
        </div>`;
    }
  },

  _deletePerson(email, name) {
    Components.showModal('確認刪除人員',
      `<p>確認要刪除 <strong>${Components.escapeHtml(name)}</strong>（${Components.escapeHtml(email || '無信箱')}）嗎？</p>
       <p style="color:var(--color-danger);margin-top:.5rem">⚠ 此操作無法復原，請確認此人員無任何職務配置。</p>`,
      async () => {
        try {
          await API.deletePerson(email, name);
          Components.showToast('人員刪除成功', 'success');
          location.reload();
        } catch (err) { API.handleError(err); }
      }, '確認刪除');
  },

  async _showPersonnelAssignments(email) {
    if (!email) return;
    const pageCtx = Router.getActivePageContext();
    const prefetchState = Pages._personnelAssignmentPrefetchState;
    const normalizedEmail = String(email || '').trim().toLowerCase();
    const getCachedPayload = () => (prefetchState && prefetchState.navId === pageCtx?.navId
      ? prefetchState.byEmail.get(normalizedEmail) || null
      : null);
    let cachedPayload = getCachedPayload();

    if (cachedPayload) {
      Components.showModal(
        `職務查看｜${cachedPayload?.person?.name || email}`,
        Components.renderPersonnelAssignmentModal(cachedPayload),
        () => true,
        '關閉',
        {
          modalClassName: 'modal--wide',
          hideConfirm: true,
          cancelText: '關閉',
        }
      );
      return;
    }

    const shouldWaitForPrefetch = prefetchState
      && prefetchState.navId === pageCtx?.navId
      && prefetchState.status === 'loading'
      && prefetchState.preloadPromise;

    Components.showModal(
      '職務查看',
      '<div class="page-loading"><div class="spinner"></div><p>載入個人職務資料…</p></div>',
      () => true,
      '關閉',
      {
        modalClassName: 'modal--wide',
        hideConfirm: true,
        cancelText: '關閉',
      }
    );

    try {
      if (shouldWaitForPrefetch) {
        await prefetchState.preloadPromise;
        cachedPayload = getCachedPayload();
      }

      if (cachedPayload) {
        const bodyEl = document.getElementById('modalBody');
        const titleEl = document.getElementById('modalTitle');
        if (!bodyEl || !titleEl) return;

        titleEl.textContent = `職務查看｜${cachedPayload?.person?.name || email}`;
        bodyEl.innerHTML = Components.renderPersonnelAssignmentModal(cachedPayload);
        bodyEl.scrollTop = 0;
        bodyEl.scrollLeft = 0;
        return;
      }

      const result = await API.getPersonnelAssignmentDetails(email);
      if (prefetchState && prefetchState.navId === pageCtx?.navId) {
        prefetchState.byEmail.set(normalizedEmail, result);
      }
      const bodyEl = document.getElementById('modalBody');
      const titleEl = document.getElementById('modalTitle');
      if (!bodyEl || !titleEl) return;

      titleEl.textContent = `職務查看｜${result?.person?.name || email}`;
      bodyEl.innerHTML = Components.renderPersonnelAssignmentModal(result);
      bodyEl.scrollTop = 0;
      bodyEl.scrollLeft = 0;
    } catch (err) {
      API.handleError(err);
      const bodyEl = document.getElementById('modalBody');
      if (!bodyEl) return;
      bodyEl.innerHTML = `
        <div class="empty-state" style="margin:0">
          <p>無法取得個人職務資料</p>
          <p style="font-size:.85rem;color:var(--color-text-sub)">${Components.escapeHtml(err.message)}</p>
        </div>`;
      bodyEl.scrollTop = 0;
      bodyEl.scrollLeft = 0;
    }
  },

          <div class="form-group" style="margin-bottom:0">

            <div id="assignmentTitleFilter" class="multi-select"></div>
          </div>
        </div>
        <div class="filter-actions">
          <div class="filter-actions__group">
            <button class="btn btn--ghost" id="assignmentClearBtn">清除條件</button>
          </div>
        </div>
      </div>

  _bindAssignmentFilters() {
    const state = Pages._assignmentState;
    const pageCtx = state?.pageCtx;
    if (!state || !pageCtx || !pageCtx.isActive()) return;

    const keywordInput = pageCtx.query('#assignmentKeyword');
    const personFilter = pageCtx.query('#assignmentPersonFilter');
    const orgFilter = pageCtx.query('#assignmentOrgFilter');
    const titleFilter = pageCtx.query('#assignmentTitleFilter');
    const clearBtn = pageCtx.query('#assignmentClearBtn');
    const addBtn = pageCtx.query('#addAssignmentBtn');

    Pages._renderAssignmentMultiSelect('personEmails', personFilter, state.filterOptions?.people || [], '全部人員');
    Pages._renderAssignmentMultiSelect('orgCodes', orgFilter, state.filterOptions?.orgs || [], '全部組織');
    Pages._renderAssignmentMultiSelect('titles', titleFilter, state.filterOptions?.titles || [], '全部職務');

    if (keywordInput) {
      keywordInput.addEventListener('input', () => {
        clearTimeout(Pages._assignmentKeywordTimer);
        Pages._assignmentKeywordTimer = setTimeout(() => {
          Pages._applyAssignmentFilters();
        }, 300);
      });
    }

    [
      ['personEmails', personFilter, '全部人員'],
      ['orgCodes', orgFilter, '全部組織'],
      ['titles', titleFilter, '全部職務'],
    ].forEach(([filterKey, root, placeholder]) => {
      Pages._bindAssignmentMultiSelect(filterKey, root, placeholder);
    });

    if (clearBtn) {
      clearBtn.onclick = () => {
        if (keywordInput) keywordInput.value = '';
        state.filters.personEmails = [];
        state.filters.orgCodes = [];
        state.filters.titles = [];
        Pages._resetAssignmentMultiSelect(personFilter, 'personEmails', '全部人員');
        Pages._resetAssignmentMultiSelect(orgFilter, 'orgCodes', '全部組織');
        Pages._resetAssignmentMultiSelect(titleFilter, 'titles', '全部職務');
        Pages._applyAssignmentFilters();
      };
    }
    if (addBtn) addBtn.onclick = () => Pages._showAssignmentForm();
  },

  _applyAssignmentFilters(resetPage = true) {
    const state = Pages._assignmentState;
    const pageCtx = state?.pageCtx;
    if (!state || !pageCtx || !pageCtx.isActive()) return;

    const keyword = String(pageCtx.query('#assignmentKeyword')?.value || '').trim();
    const keywordLower = keyword.toLowerCase();
    const personEmails = new Set((state.filters.personEmails || []).map(v => String(v || '').trim().toLowerCase()).filter(Boolean));
    const orgCodes = new Set((state.filters.orgCodes || []).map(v => String(v || '').trim().toUpperCase()).filter(Boolean));
    const titles = new Set((state.filters.titles || []).map(v => String(v || '').trim()).filter(Boolean));

    state.filters.keyword = keyword;
    state.filteredItems = state.allItems.filter(item => {
      const matchesKeyword = !keywordLower ||
        String(item.name || '').toLowerCase().includes(keywordLower) ||
        String(item.email || '').toLowerCase().includes(keywordLower) ||
        String(item.orgName || '').toLowerCase().includes(keywordLower) ||
        String(item.orgCode || '').toLowerCase().includes(keywordLower) ||
        String(item.title || '').toLowerCase().includes(keywordLower);
      const matchesPerson = personEmails.size === 0 ||
        personEmails.has(String(item.email || '').trim().toLowerCase());
      const matchesOrg = orgCodes.size === 0 ||
        orgCodes.has(String(item.orgCode || '').trim().toUpperCase());
      const matchesTitle = titles.size === 0 ||
        titles.has(String(item.title || '').trim());
      return matchesKeyword && matchesPerson && matchesOrg && matchesTitle;
    });

    if (resetPage) state.currentPage = 1;
    Pages._renderAssignmentTable();
  },

  _renderAssignmentMultiSelect(filterKey, root, options, placeholder) {
    if (!root) return;
    root.innerHTML = `
      <button type="button" class="multi-select__trigger" data-role="trigger">${Components.escapeHtml(placeholder)}</button>
      <div class="multi-select__panel" data-role="panel" hidden>
        <div class="multi-select__search-wrap">
          <input type="search" class="form-control multi-select__search" data-role="search" placeholder="搜尋選項">
        </div>
        <div class="multi-select__toolbar">
          <button type="button" class="btn btn--ghost btn--sm" data-role="clear">清空</button>
        </div>
        <div class="multi-select__options" data-role="options"></div>
      </div>`;
    root.dataset.filterKey = filterKey;
    root.dataset.placeholder = placeholder;
    root._assignmentOptions = Array.isArray(options) ? options : [];
    Pages._refreshAssignmentMultiSelect(root);
  },

  _bindAssignmentMultiSelect(filterKey, root, placeholder) {
    if (!root) return;
    const state = Pages._assignmentState;
    const trigger = root.querySelector('[data-role="trigger"]');
    const panel = root.querySelector('[data-role="panel"]');
    const searchInput = root.querySelector('[data-role="search"]');
    const optionsEl = root.querySelector('[data-role="options"]');
    const clearBtn = root.querySelector('[data-role="clear"]');

    if (trigger) {
      trigger.onclick = e => {
        e.preventDefault();
        e.stopPropagation();
        Pages._toggleAssignmentMultiSelect(root);
      };
    }
    if (searchInput) {
      searchInput.addEventListener('click', e => e.stopPropagation());
      searchInput.addEventListener('input', () => Pages._refreshAssignmentMultiSelect(root));
    }
    if (panel) panel.addEventListener('click', e => e.stopPropagation());
    if (clearBtn) {
      clearBtn.onclick = e => {
        e.preventDefault();
        state.filters[filterKey] = [];
        if (searchInput) searchInput.value = '';
        Pages._refreshAssignmentMultiSelect(root);
        Pages._applyAssignmentFilters();
      };
    }
    if (optionsEl) {
      optionsEl.addEventListener('change', e => {
        const checkbox = e.target;
        if (!checkbox || checkbox.type !== 'checkbox') return;
        const selected = new Set(state.filters[filterKey] || []);
        if (checkbox.checked) selected.add(checkbox.value);
        else selected.delete(checkbox.value);
        state.filters[filterKey] = [...selected];
        Pages._refreshAssignmentMultiSelect(root);
        Pages._applyAssignmentFilters();
      });
    }

    if (!Pages._assignmentMultiSelectOutsideHandler) {
      Pages._assignmentMultiSelectOutsideHandler = event => {
        document.querySelectorAll('.multi-select.is-open').forEach(el => {
          if (el.contains(event.target)) return;
          el.classList.remove('is-open');
          const panelEl = el.querySelector('[data-role="panel"]');
          if (panelEl) panelEl.hidden = true;
        });
      };
      document.addEventListener('click', Pages._assignmentMultiSelectOutsideHandler);
    }

    Pages._updateAssignmentMultiSelectTrigger(root, state.filters[filterKey] || [], placeholder);
  },

  _toggleAssignmentMultiSelect(root) {
    if (!root) return;
    const panel = root.querySelector('[data-role="panel"]');
    const searchInput = root.querySelector('[data-role="search"]');
    const isOpen = root.classList.contains('is-open');

    document.querySelectorAll('.multi-select.is-open').forEach(el => {
      if (el === root) return;
      el.classList.remove('is-open');
      const otherPanel = el.querySelector('[data-role="panel"]');
      if (otherPanel) otherPanel.hidden = true;
    });

    root.classList.toggle('is-open', !isOpen);
    if (panel) panel.hidden = isOpen;
    if (!isOpen && searchInput) searchInput.focus();
  },

  _refreshAssignmentMultiSelect(root) {
    if (!root) return;
    const state = Pages._assignmentState;
    const filterKey = root.dataset.filterKey;
    const placeholder = root.dataset.placeholder || '全部';
    const searchValue = String(root.querySelector('[data-role="search"]')?.value || '').trim().toLowerCase();
    const options = root._assignmentOptions || [];
    const selectedValues = new Set((state?.filters?.[filterKey] || []).map(value => String(value)));
    const filteredOptions = options.filter(item =>
      !searchValue ||
      String(item.label || '').toLowerCase().includes(searchValue) ||
      String(item.value || '').toLowerCase().includes(searchValue)
    );
    const optionsEl = root.querySelector('[data-role="options"]');

    if (optionsEl) {
      optionsEl.innerHTML = filteredOptions.length > 0
        ? filteredOptions.map(item => `
          <label class="multi-select__option">
            <input type="checkbox" value="${Components.escapeHtml(item.value)}" ${selectedValues.has(String(item.value)) ? 'checked' : ''}>
            <span>${Components.escapeHtml(item.label)}</span>
          </label>`).join('')
        : '<div class="multi-select__empty">查無符合的選項</div>';
    }

    Pages._updateAssignmentMultiSelectTrigger(root, [...selectedValues], placeholder);
  },

  _updateAssignmentMultiSelectTrigger(root, selectedValues, placeholder) {
    if (!root) return;
    const trigger = root.querySelector('[data-role="trigger"]');
    if (!trigger) return;
    const options = root._assignmentOptions || [];
    const selected = options.filter(item => selectedValues.includes(String(item.value)));

    if (selected.length === 0) {
      trigger.textContent = placeholder;
      trigger.classList.remove('has-selection');
      return;
    }

    trigger.classList.add('has-selection');
    trigger.textContent = selected.length === 1
      ? selected[0].label
      : `已選 ${selected.length} 項`;
  },

  _resetAssignmentMultiSelect(root, filterKey, placeholder) {
    if (!root) return;
    const state = Pages._assignmentState;
    if (state?.filters) state.filters[filterKey] = [];
    const searchInput = root.querySelector('[data-role="search"]');
    if (searchInput) searchInput.value = '';
    Pages._refreshAssignmentMultiSelect(root);
    Pages._updateAssignmentMultiSelectTrigger(root, [], placeholder);
  },

  _buildAssignmentFilterOptions(items) {
    const peopleMap = new Map();
    const orgMap = new Map();
    const titleSet = new Set();

    (items || []).forEach(item => {
      const email = String(item.email || '').trim();
      const name = String(item.name || '').trim();
      const orgCode = String(item.orgCode || '').trim();
      const orgName = String(item.orgName || '').trim();
      const title = String(item.title || '').trim();

      if (email && !peopleMap.has(email.toLowerCase())) {
        peopleMap.set(email.toLowerCase(), {
          value: email,
          label: name ? `${name} (${email})` : email,
        });
      }
      if (orgCode && !orgMap.has(orgCode.toUpperCase())) {
        orgMap.set(orgCode.toUpperCase(), {
          value: orgCode,
          label: orgName ? `${orgName} (${orgCode})` : orgCode,
        });
      }
      if (title) titleSet.add(title);
    });

    return {
      people: [...peopleMap.values()].sort((a, b) => a.label.localeCompare(b.label, 'zh-Hant')),
      orgs: [...orgMap.values()].sort((a, b) => a.label.localeCompare(b.label, 'zh-Hant')),
      titles: [...titleSet].sort((a, b) => a.localeCompare(b, 'zh-Hant')).map(value => ({ value, label: value })),
    };
  },

  _renderAssignmentTable() {
    const state = Pages._assignmentState;
    const pageCtx = state?.pageCtx;
    if (!state || !pageCtx || !pageCtx.isActive()) return;

    const section = pageCtx.query('#assignmentTableSection');
    if (!section) return;

    const total = state.filteredItems.length;
    const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
    if (state.currentPage > totalPages) state.currentPage = totalPages;

    if (total === 0) {
      section.innerHTML = `
        <div class="card">
          <div class="assignment-summary">
            <div class="assignment-summary__meta">共 0 筆 / 第 1 頁，共 1 頁</div>
          </div>
          <div class="empty-state">
            <div class="empty-state__icon">📭</div>
            <p>查無符合條件的職務配置</p>
          </div>
        </div>`;
      return;
    }

    const start = (state.currentPage - 1) * state.pageSize;
    const end = start + state.pageSize;
    const pageItems = state.filteredItems.slice(start, end);

    section.innerHTML = `
      <div class="card">
        <div class="assignment-summary">
          <div class="assignment-summary__meta">共 ${total} 筆 / 第 ${state.currentPage} 頁，共 ${totalPages} 頁</div>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>人員</th>
                <th>組織單位</th>
                <th>職務名稱</th>
                <th>直屬主管</th>
                <th>兼任類型</th>
                ${state.canWrite ? '<th>操作</th>' : ''}
              </tr>
            </thead>
            <tbody>
              ${pageItems.map(item => Pages._renderAssignmentRow(item, state.canWrite)).join('')}
            </tbody>
          </table>
        </div>
        ${Pages._renderAssignmentPagination(totalPages)}
      </div>`;

    section.querySelectorAll('[data-page]').forEach(btn => {
      btn.onclick = () => {
        const page = Number(btn.dataset.page);
        if (!page || page === state.currentPage) return;
        state.currentPage = page;
        Pages._renderAssignmentTable();
      };
    });
  },

      '垂直兼任': 'badge--success',
    }[item.assignmentType] || 'badge--neutral');

    return `
      <tr>
        <td>
          <div class="stacked-cell">
            <span class="stacked-cell__primary">${Components.escapeHtml(item.name || '—')}</span>
            <span class="stacked-cell__secondary">${Components.escapeHtml(item.email || '—')}</span>
          </div>
        </td>
        <td>
          <div class="stacked-cell">
            <span class="stacked-cell__primary">${Components.escapeHtml(item.orgName || '—')}</span>
            <span class="stacked-cell__secondary">${Components.escapeHtml(item.orgCode || '—')}</span>
          </div>
        </td>
        <td>${Components.escapeHtml(item.title || '—')}</td>
        <td>
          <div class="stacked-cell">
            <span class="stacked-cell__primary">${Components.escapeHtml(managerPrimary)}</span>

  _renderAssignmentPagination(totalPages) {
    const state = Pages._assignmentState;
    if (!state || totalPages <= 1) return '';

    const prevDisabled = state.currentPage <= 1 ? 'disabled' : '';
    const nextDisabled = state.currentPage >= totalPages ? 'disabled' : '';
    return `
      <div class="pagination">
        <div class="pagination__info">每頁 ${state.pageSize} 筆</div>
        <button class="btn btn--ghost btn--sm" data-page="${state.currentPage - 1}" ${prevDisabled}>上一頁</button>
        <button class="btn btn--ghost btn--sm" data-page="${state.currentPage + 1}" ${nextDisabled}>下一頁</button>
      </div>`;
  },

    if (!state) return;

      `<option value="${Components.escapeHtml(item.label)}"></option>`
    ).join('');

    ).join('');

      </div>

        <div class="form-error" id="assignmentManagerError"></div>
      </div>`;

    Components.showModal('新增職務配置', body, async () => {
      const confirmBtn = document.getElementById('modalConfirmBtn');
      const originalText = confirmBtn ? confirmBtn.textContent : '儲存';

      if (!payload) return false;

      if (confirmBtn) confirmBtn.textContent = '儲存中...';
      try {
        const result = await API.addAssignment(payload);
        Components.showToast(result?.message || '職務配置已新增', 'success');
        if (result?.matrixConcurrencyWarning) {
          Components.showToast('此人員新增後形成矩陣兼任，請再確認主管配置。', 'warning');

        await Pages._reloadAssignmentData(true);

      } catch (err) {

      } finally {

    if (orgInput) orgInput.addEventListener('blur', () => Pages._validateAssignmentOrgField());
    if (titleInput) titleInput.addEventListener('blur', () => Pages._validateAssignmentTitleField());
    if (managerInput) managerInput.addEventListener('blur', () => Pages._validateAssignmentManagerField());
  },

  _collectAssignmentFormPayload() {
    const person = Pages._validateAssignmentPersonField();
    const org = Pages._validateAssignmentOrgField();
    const title = Pages._validateAssignmentTitleField();
    const manager = Pages._validateAssignmentManagerField();

    if (!person || !org || !title || manager === false) return null;

    return {
      email: person.email,
      orgCode: org.code,
      title,
      managerEmail: manager ? manager.email : '',
    };
  },

  _validateAssignmentPersonField() {
    const value = String(document.getElementById('assignmentPersonInput')?.value || '').trim();
    if (!value) {
      Pages._setAssignmentFieldError('assignmentPersonInput', 'assignmentPersonError', '請選擇人員');
      return null;
    }
    const person = Pages._findPersonnelOption(value);
    if (!person) {
      Pages._setAssignmentFieldError('assignmentPersonInput', 'assignmentPersonError', '指定的人員不存在於人員主檔');
      return null;
    }
    Pages._setAssignmentFieldError('assignmentPersonInput', 'assignmentPersonError', '');
    return person;
  },

  _validateAssignmentOrgField() {
    const value = String(document.getElementById('assignmentOrgInput')?.value || '').trim();
    if (!value) {
      Pages._setAssignmentFieldError('assignmentOrgInput', 'assignmentOrgError', '請選擇組織單位');
      return null;
    }
    const org = Pages._findOrgOption(value);
    if (!org) {
      Pages._setAssignmentFieldError('assignmentOrgInput', 'assignmentOrgError', '指定的組織不存在於組織主檔');
      return null;
    }
    Pages._setAssignmentFieldError('assignmentOrgInput', 'assignmentOrgError', '');
    return org;
  },

  _validateAssignmentTitleField() {
    const value = String(document.getElementById('assignmentTitleInput')?.value || '').trim();
    if (!value) {
      Pages._setAssignmentFieldError('assignmentTitleInput', 'assignmentTitleError', '職務名稱為必填');
      return null;
    }
    Pages._setAssignmentFieldError('assignmentTitleInput', 'assignmentTitleError', '');
    return value;
  },

  _validateAssignmentManagerField() {
    const value = String(document.getElementById('assignmentManagerInput')?.value || '').trim();
    if (!value) {
      Pages._setAssignmentFieldError('assignmentManagerInput', 'assignmentManagerError', '');
      return null;
    }
    const manager = Pages._findPersonnelOption(value);
    if (!manager) {
      Pages._setAssignmentFieldError('assignmentManagerInput', 'assignmentManagerError', '指定的人員不存在於人員主檔');
      return false;
    }
    Pages._setAssignmentFieldError('assignmentManagerInput', 'assignmentManagerError', '');
    return manager;
  },

  _findPersonnelOption(rawValue) {
    const value = String(rawValue || '').trim().toLowerCase();
    if (!value) return null;
    return (Pages._assignmentState?.options?.personnelOptions || []).find(item =>
      item.label.toLowerCase() === value || item.email.toLowerCase() === value
    ) || null;
  },

  _findOrgOption(rawValue) {
    const value = String(rawValue || '').trim().toLowerCase();
    if (!value) return null;
    return (Pages._assignmentState?.options?.orgOptions || []).find(item =>
      item.label.toLowerCase() === value || item.code.toLowerCase() === value
    ) || null;
  },

  _setAssignmentFieldError(inputId, errorId, message) {
    const input = document.getElementById(inputId);
    const error = document.getElementById(errorId);
    if (input) input.classList.toggle('form-control--error', !!message);
    if (error) error.textContent = message || '';
  },

  _confirmDeleteAssignment(rowIndex) {
    const state = Pages._assignmentState;
    if (!state) return;
    const assignment = state.allItems.find(item => item.rowIndex === rowIndex);
    if (!assignment) return;

    Components.showModal(
      '確認刪除職務配置',
      `<p>確定要刪除 <strong>${Components.escapeHtml(assignment.name || assignment.email)} - ${Components.escapeHtml(assignment.title || '未命名職務')}</strong> 嗎？此操作無法復原。</p>`,
      async () => {
        try {
          await API.deleteAssignment(rowIndex);
          Components.showToast('職務配置刪除成功', 'success');
          await Pages._reloadAssignmentData(false);
        } catch (err) {
          API.handleError(err);
        }
      },
      '確認刪除'
    );
  },

  async _reloadAssignmentData(resetPage) {
    const state = Pages._assignmentState;
    if (!state) return;
    const latest = await API.getAssignmentList();
    state.allItems = latest;
    if (resetPage) state.currentPage = 1;
    Pages._applyAssignmentFilters(false);
  },
