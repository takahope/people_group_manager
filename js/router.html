<script>
/**
 * router.js — Hash-based SPA 路由系統
 * 
 * 設計原則：
 * - 路由設定集中管理（ROUTES 陣列），新增頁面只需新增一筆，無需修改其他邏輯
 * - 依角色動態過濾可見頁面，前端 UI 與後端權限兩層把關
 * - 不依賴任何框架，純 Vanilla JS
 */

const Router = (() => {

  // =============================================
  // 路由設定（新增頁面時只需在此新增一筆）
  // =============================================

  /**
   * @type {Array<{
    *   hash:     string,          // URL hash
    *   label:    string,          // 選單顯示名稱
    *   icon:     string,          // SVG path 或 emoji
    *   section:  string,          // 選單分區標題
    *   feature:  string,          // 權限檢查 key（對應 AuthService PERMISSION_MAP）
    *   loaderKey: string,         // 頁面載入函式名稱（對應 Pages）
    * }>}
   */
  const ROUTES = [
    {
      hash: '#/dashboard', label: '儀表板', icon: '📊', section: '總覽',
      feature: 'dashboard.full,dashboard.dept,dashboard.personal',
      loaderKey: 'loadDashboard',
    },
    {
      hash: '#/personnel', label: '人員管理', icon: '👥', section: '人事管理',
      feature: 'personnel.read.all,personnel.read.dept,personnel.read.self',
      loaderKey: 'loadPersonnel',
    },
    {
      hash: '#/assignments', label: '職務配置', icon: '🗂️', section: '人事管理',
      feature: 'assignment.read.all',
      loaderKey: 'loadAssignments',
    },
    {
      hash: '#/org', label: '組織架構', icon: '🌳', section: '人事管理',
      feature: 'org.read',
      loaderKey: 'loadOrg',
    },
    {
      hash: '#/stations', label: '駐站管理員', icon: '🏥', section: '人事管理',
      feature: 'station.read',
      loaderKey: 'loadStations',
    },
    {
      hash: '#/raci', label: 'RACI 查詢', icon: '📋', section: '資安管理',
      feature: 'raci.read',
      loaderKey: 'loadRaci',
    },
    {
      hash: '#/raci/me', label: '我的責任', icon: '🙋', section: '資安管理',
      feature: 'raci.read',
      loaderKey: 'loadMyRaci',
    },
    {
      hash: '#/audit', label: '稽核驗證', icon: '🔍', section: '稽核',
      feature: 'audit.run',
      loaderKey: 'loadAudit',
    },
  ];

  let currentUser = null;
  let visibleRoutes = [];
  let activeNavigationId = 0;
  let activePageContext = null;

  // =============================================
  // 初始化
  // =============================================

  /**
   * 初始化路由系統
   * 1. 讀取注入的使用者資訊
   * 2. 依角色過濾可見路由
   * 3. 渲染側邊選單
   * 4. 監聽 hashchange
   * 5. 導向當前 hash（或預設首頁）
   */
  async function init() {
    try {
      // 使用 GAS 注入的使用者資訊（避免額外 API 呼叫）
      currentUser = window.__USER_INFO__;
      updateUserDisplay(currentUser);

      // 過濾可見路由（依角色）
      visibleRoutes = await filterVisibleRoutes(ROUTES);
      renderSideNav(visibleRoutes);

      // 監聽 hash 變更
      window.addEventListener('hashchange', onHashChange);

      // 初始路由
      const hash = location.hash || '#/dashboard';
      navigateTo(hash);

      // 漢堡選單（手機版）
      initMobileMenu();

    } catch (error) {
      console.error('Router 初始化失敗：', error);
      Components.showToast('頁面初始化失敗，請重新整理', 'error');
      Components.renderLoadError('mainContent', {
        title: '頁面初始化失敗',
        message: '前端初始化未完成，請重新整理頁面。',
        details: error.message,
        actionLabel: '重新整理',
        onAction: () => location.reload(),
      });
    }
  }

  // =============================================
  // 路由邏輯
  // =============================================

  function onHashChange() {
    navigateTo(location.hash);
  }

  /**
   * 導向指定 hash 對應的頁面
   * Guard Clause：找不到路由 → 顯示 404 訊息
   * 
   * @param {string} hash
   */
  async function navigateTo(hash) {
    // 標準化：移除尾部斜線
    const normalizedHash = hash.replace(/\/$/, '') || '#/dashboard';

    // 找完全匹配，若無則找前綴匹配（用於子路由如 #/raci/me）
    const route = visibleRoutes.find(r => r.hash === normalizedHash)
                || visibleRoutes.find(r => normalizedHash.startsWith(r.hash + '/'));

    if (!route) {
      renderNotFound(normalizedHash);
      return;
    }

    // 更新 URL hash（不觸發 hashchange 事件）
    if (location.hash !== normalizedHash) {
      history.replaceState(null, '', normalizedHash);
    }

    // 標記當前選單項
    highlightNavItem(normalizedHash);

    // 載入頁面內容
    const mainContent = document.getElementById('mainContent');
    try {
      const navId = ++activeNavigationId;
      const pageContext = createPageContext(navId, normalizedHash, mainContent);
      activePageContext = pageContext;
      const loader = Pages[route.loaderKey];
      if (typeof loader !== 'function') {
        throw new Error(`找不到頁面載入函式：${route.loaderKey}`);
      }
      Components.showSpinner('mainContent');
      await loader.call(Pages, mainContent, currentUser, pageContext);
    } catch (error) {
      console.error('頁面載入失敗：', error);
      mainContent.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">⚠️</div>
          <p>頁面載入失敗：${Components.escapeHtml(error.message)}</p>
        </div>`;
    }
  }

  // =============================================
  // 側邊選單渲染
  // =============================================

  /**
   * 依可見路由渲染左側選單
   * 依 section 分組，每個 section 加上小標題
   * 
   * @param {Array} routes
   */
  function renderSideNav(routes) {
    const navList = document.getElementById('navList');
    if (!navList) return;

    navList.innerHTML = '';
    const sections = groupBySection(routes);

    sections.forEach(({ section, items }) => {
      // Section 標籤
      const sectionEl = document.createElement('li');
      sectionEl.className = 'nav-section-label';
      sectionEl.textContent = section;
      navList.appendChild(sectionEl);

      // 路由項目
      items.forEach(route => {
        const li = document.createElement('li');
        li.className = 'nav-item';
        li.innerHTML = `
          <a href="${route.hash}" data-hash="${route.hash}">
            <span class="nav-item__icon">${route.icon}</span>
            <span>${Components.escapeHtml(route.label)}</span>
          </a>`;
        navList.appendChild(li);
      });
    });
  }

  function groupBySection(routes) {
    const map = new Map();
    routes.forEach(r => {
      if (!map.has(r.section)) map.set(r.section, []);
      map.get(r.section).push(r);
    });
    return [...map.entries()].map(([section, items]) => ({ section, items }));
  }

  function highlightNavItem(hash) {
    document.querySelectorAll('.nav-item a').forEach(a => {
      a.classList.toggle('active', a.dataset.hash === hash);
    });
  }

  // =============================================
  // 權限過濾
  // =============================================

  /**
   * 依使用者角色過濾可見路由
   * feature 欄位支援逗號分隔（OR 邏輯：任一滿足即可見）
   * 
   * @param {Array} routes
   * @returns {Promise<Array>}
   */
  async function filterVisibleRoutes(routes) {
    const role = currentUser?.role;
    if (!role) return [];

    const permChecks = await Promise.all(
      routes.map(route =>
        checkAnyPermission(route.feature.split(',').map(f => f.trim()))
      )
    );
    return routes.filter((_, i) => permChecks[i]);
  }

  /**
   * 檢查是否有任一 feature 的權限（OR 邏輯）
   * 
   * @param {Array<string>} features
   * @returns {Promise<boolean>}
   */
  async function checkAnyPermission(features) {
    for (const feature of features) {
      try {
        const result = await API.checkPermission(feature);
        if (result === true) return true;
      } catch (e) { /* 繼續檢查下一個 */ }
    }
    return false;
  }

  // =============================================
  // 使用者顯示
  // =============================================

  function updateUserDisplay(user) {
    const nameEl  = document.getElementById('userName');
    const badgeEl = document.getElementById('roleBadge');
    if (!user) return;

    if (nameEl)  nameEl.textContent = user.name || user.email;
    if (badgeEl) {
      badgeEl.textContent = user.roleLabel || user.role;
      badgeEl.className = 'role-badge badge ' + roleBadgeClass(user.role);
    }
  }

  function roleBadgeClass(role) {
    const map = {
      'ROLE-APP-ADMIN':    'badge--danger',
      'ROLE-APP-HR':       'badge--primary',
      'ROLE-APP-AUDITOR':  'badge--warning',
      'ROLE-APP-MGR':      'badge--success',
      'ROLE-APP-STAFF':    'badge--neutral',
      'ROLE-APP-EXTERNAL': 'badge--neutral',
    };
    return map[role] || 'badge--neutral';
  }

  // =============================================
  // 手機版漢堡選單
  // =============================================

  function initMobileMenu() {
    const hamburger = document.getElementById('hamburgerBtn');
    const sideNav   = document.getElementById('sideNav');
    const overlay   = document.getElementById('overlay');
    if (!hamburger || !sideNav || !overlay) return;

    const open  = () => { sideNav.classList.add('is-open'); overlay.classList.add('is-visible'); hamburger.setAttribute('aria-expanded','true'); };
    const close = () => { sideNav.classList.remove('is-open'); overlay.classList.remove('is-visible'); hamburger.setAttribute('aria-expanded','false'); };

    hamburger.onclick = () => sideNav.classList.contains('is-open') ? close() : open();
    overlay.onclick   = close;

    // 點選選單項目後自動關閉
    sideNav.addEventListener('click', e => {
      if (e.target.closest('a')) close();
    });
  }

  // =============================================
  // 404 頁面
  // =============================================

  function renderNotFound(hash) {
    const main = document.getElementById('mainContent');
    if (main) {
      main.innerHTML = `
        <div class="empty-state" style="min-height:400px">
          <div class="empty-state__icon">🔍</div>
          <h2>找不到頁面</h2>
          <p>路由 <code>${Components.escapeHtml(hash)}</code> 不存在或您無權限存取。</p>
          <a href="#/dashboard" class="btn btn--primary" style="margin-top:1rem">返回儀表板</a>
        </div>`;
    }
  }

  function createPageContext(navId, hash, container) {
    return {
      navId,
      hash,
      container,
      isActive() {
        return activeNavigationId === navId
          && activePageContext
          && activePageContext.navId === navId
          && container
          && container.isConnected
          && location.hash.replace(/\/$/, '') === hash;
      },
      query(selector) {
        return container ? container.querySelector(selector) : null;
      },
    };
  }

  // =============================================
  // Public API
  // =============================================

  return {
    init,
    navigateTo,
    getActivePageContext: () => activePageContext,
  };

})();

// =============================================
// 頁面載入函式命名空間
// =============================================

/**
 * Pages — 每個路由對應的頁面載入函式
 * 
 * 職責：呼叫 API、渲染 HTML 到 container
 * 設計：每個 load* 函式獨立，互不依賴
 */
const Pages = {

  // ========================
  // 儀表板
  // ========================
  async loadDashboard(container, user, pageCtx) {
    container.innerHTML = `
      <div class="page-header">
        <h1>📊 儀表板</h1>
      </div>
      <div class="stat-grid" id="statGrid">
        ${['人員統計','組織分佈','兼任人員','RACI 覆蓋率','稽核警示','近期異動']
          .map((_, i) => `<div class="stat-card"><div class="stat-card__label">載入中...</div><div class="stat-card__value">—</div></div>`).join('')}
      </div>
      <div id="dashboardLogs" class="card"><div class="card__title">近期異動紀錄</div><div class="page-loading"><div class="spinner"></div></div></div>
      <div id="dashboardDebug" style="margin-top:1rem"></div>
    `;

    try {
      const stats = await API.getDashboardStats();
      if (!pageCtx.isActive()) return;
      const logs = stats.recentLogs || [];
      const total = stats.personnel?.total ?? (stats.person?.email ? 1 : 0);
      const concurrentCount = Array.isArray(stats.concurrentPersonnel)
        ? stats.concurrentPersonnel.length
        : (stats.concurrentCount || 0);
      const raciRate = stats.raciCoverage?.rate ?? '—';
      const auditAlertCount = stats.auditAlerts
        ? ((stats.auditAlerts.accountabilityIssues > 0 ? stats.auditAlerts.accountabilityIssues : 0)
          + (stats.auditAlerts.roleCodeIssues > 0 ? stats.auditAlerts.roleCodeIssues : 0))
        : '—';
      const statGrid = pageCtx.query('#statGrid');
      if (!statGrid) return;
      statGrid.innerHTML = `
        <div class="stat-card"><div class="stat-card__label">在職總人數</div><div class="stat-card__value">${total}</div></div>
        <div class="stat-card"><div class="stat-card__label">兼任人員</div><div class="stat-card__value">${concurrentCount}</div></div>
        <div class="stat-card"><div class="stat-card__label">RACI 覆蓋率</div><div class="stat-card__value">${raciRate === '—' ? '—' : `${raciRate}%`}</div></div>
        <div class="stat-card"><div class="stat-card__label">稽核警示</div><div class="stat-card__value">${auditAlertCount}</div></div>
        <div class="stat-card"><div class="stat-card__label">身份角色</div><div class="stat-card__value" style="font-size:1rem">${Components.escapeHtml(user?.roleLabel || '—')}</div></div>
        <div class="stat-card"><div class="stat-card__label">登入帳號</div><div class="stat-card__value" style="font-size:.9rem">${Components.escapeHtml(user?.email || '—')}</div></div>
        <div class="stat-card"><div class="stat-card__label">統計範圍</div><div class="stat-card__value" style="font-size:1rem">${Components.escapeHtml(stats.scope || '—')}</div></div>
      `;

      const logsDiv = pageCtx.query('#dashboardLogs');
      if (!logsDiv) return;
      if (logs.length === 0) {
        logsDiv.innerHTML = '<div class="card__header"><h3 class="card__title">近期異動紀錄</h3></div><div class="empty-state"><p>尚無操作記錄</p></div>';
        return;
      }
      const rows = logs.map(l => `
        <tr>
          <td>${Components.formatDateTime(l.timestamp)}</td>
          <td>${Components.escapeHtml(l.operator)}</td>
          <td><span class="badge badge--neutral">${Components.escapeHtml(l.action)}</span></td>
          <td>${Components.escapeHtml(l.target)}</td>
        </tr>`).join('');
      logsDiv.innerHTML = `
        <div class="card__header"><h3 class="card__title">近期異動紀錄</h3></div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead><tr><th>時間</th><th>操作者</th><th>類型</th><th>對象</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    } catch (err) {
      if (!pageCtx.isActive()) return;
      console.error('loadDashboard 失敗：', err);
      API.handleError(err);
      Components.renderLoadError('mainContent', {
        title: '儀表板載入失敗',
        message: '首頁資料未能完成初始化。',
        details: err.message,
        actionLabel: '重新載入首頁',
        onAction: () => Router.navigateTo(pageCtx.hash),
      });
      API.getAppDebugInfo()
        .then(info => {
          if (!pageCtx.isActive()) return;
          console.error('Dashboard debug info:', info);
          const debugContainer = pageCtx.container;
          if (!debugContainer) return;
          debugContainer.insertAdjacentHTML('beforeend', `
            <div class="card" style="margin-top:1rem">
              <div class="card__header"><h3 class="card__title">診斷資訊</h3></div>
              <div style="font-size:.85rem;color:var(--color-text-sub);line-height:1.7">
                <div>使用者：${Components.escapeHtml(info.user?.email || '—')}</div>
                <div>角色：${Components.escapeHtml(info.user?.roleLabel || info.user?.role || '—')}</div>
                <div>試算表：${Components.escapeHtml(info.spreadsheet?.name || '—')}</div>
                <div>資料筆數：人員 ${info.counts?.personnel ?? '—'} / 組織 ${info.counts?.org ?? '—'} / 職務 ${info.counts?.assignment ?? '—'} / RACI ${info.counts?.raci ?? '—'}</div>
              </div>
            </div>`);
        })
        .catch(debugErr => {
          console.error('Dashboard debug info failed:', debugErr);
        });
    }
  },

  // ========================
  // 人員管理
  // ========================
  async loadPersonnel(container, user, pageCtx) {
    const canWrite  = user?.role === 'ROLE-APP-ADMIN' || user?.role === 'ROLE-APP-HR';
    const canDelete = user?.role === 'ROLE-APP-ADMIN';
    const statusOptions = ['全部', '在職', '育嬰', '休假', '留職停薪'];

    container.innerHTML = `
      <div class="page-header">
        <h1>👥 人員管理</h1>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap">
          <div class="search-bar">
            <input type="search" id="personnelSearch" class="search-bar__input" placeholder="搜尋姓名、信箱、狀態…">
            <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </div>
          ${canWrite ? '<button class="btn btn--primary" id="addPersonBtn">＋ 新增人員</button>' : ''}
        </div>
      </div>
      <div id="personnelStatusFilters" style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem">
        ${statusOptions.map(status => `<button class="btn btn--ghost btn--sm" data-status="${status}">${status}</button>`).join('')}
      </div>
      <div id="personnelTable">
        <div class="page-loading"><div class="spinner"></div><p>載入人員資料…</p></div>
      </div>
    `;

    try {
      let data = await API.getAllPersonnel();
      if (!pageCtx.isActive()) return;
      let filtered = data;
      let activeStatus = '全部';

      const statusBadgeClass = (status) => ({
        '在職': 'badge--success',
        '育嬰': 'badge--warning',
        '休假': 'badge--neutral',
        '留職停薪': 'badge--danger',
      }[status] || 'badge--neutral');

      const applyFilters = (searchQuery = '') => {
        const q = searchQuery.toLowerCase();
        filtered = data.filter(p => {
          const matchesStatus = activeStatus === '全部' || p.status === activeStatus;
          const matchesSearch = !q ||
            p.name.toLowerCase().includes(q) ||
            p.email.toLowerCase().includes(q) ||
            (p.status || '').toLowerCase().includes(q);
          return matchesStatus && matchesSearch;
        });
      };

      const renderTable = () => {
        Components.DataTable({
          columns: [
            { key: 'email', label: '信箱' },
            { key: 'name',  label: '姓名' },
            {
              key: 'status',
              label: '員工狀態',
              render: (value) => `<span class="badge ${statusBadgeClass(value)}">${Components.escapeHtml(value || '—')}</span>`,
            },
          ],
          actions: canWrite ? (row) => `
            <button class="btn btn--ghost btn--sm" onclick="Pages._editPerson('${row.email}')">編輯</button>
            ${canDelete ? `<button class="btn btn--danger btn--sm" style="margin-left:.25rem" onclick="Pages._deletePerson('${row.email}','${row.name}')">刪除</button>` : ''}
          ` : null,
          onRowClick: null,
        }, filtered, 'personnelTable');
      };
      renderTable();

      // 即時搜尋
      const searchInput = pageCtx.query('#personnelSearch');
      if (!searchInput) return;
      searchInput.addEventListener('input', e => {
        applyFilters(e.target.value);
        renderTable();
      });

      const filterBar = pageCtx.query('#personnelStatusFilters');
      if (filterBar) {
        const updateFilterButtons = () => {
          filterBar.querySelectorAll('[data-status]').forEach(btn => {
            const selected = btn.dataset.status === activeStatus;
            btn.className = `btn btn--sm ${selected ? 'btn--primary' : 'btn--ghost'}`;
          });
        };
        filterBar.querySelectorAll('[data-status]').forEach(btn => {
          btn.onclick = () => {
            activeStatus = btn.dataset.status;
            applyFilters(searchInput.value);
            updateFilterButtons();
            renderTable();
          };
        });
        updateFilterButtons();
      }

      if (canWrite) {
        const addBtn = pageCtx.query('#addPersonBtn');
        if (addBtn) {
          addBtn.onclick = () => Pages._showPersonForm(null, () => Router.navigateTo(pageCtx.hash));
        }
      }
    } catch (err) {
      if (!pageCtx.isActive()) return;
      console.error('loadPersonnel 失敗：', err);
      API.handleError(err);
      Components.renderLoadError('personnelTable', {
        title: '人員資料載入失敗',
        message: '無法取得人員清單。',
        details: err.message,
        actionLabel: '重試',
        onAction: () => Router.navigateTo(pageCtx.hash),
      });
    }
  },

  // 人員表單（新增/編輯）
  _showPersonForm(existingPerson, onSuccess) {
    const isEdit = !!existingPerson;
    const body = `
      <div class="form-group">
        <label class="form-label required">信箱</label>
        <input type="email" class="form-control" id="pEmail" value="${existingPerson?.email || ''}" ${isEdit ? 'readonly' : ''}>
      </div>
      <div class="form-group">
        <label class="form-label required">姓名</label>
        <input type="text" class="form-control" id="pName" value="${existingPerson?.name || ''}" maxlength="50">
      </div>
      <div class="form-group">
        <label class="form-label required">員工狀態</label>
        <select class="form-control" id="pStatus">
          ${['在職', '育嬰', '休假', '留職停薪'].map(status => `
            <option value="${status}" ${existingPerson?.status === status || (!existingPerson && status === '在職') ? 'selected' : ''}>${status}</option>
          `).join('')}
        </select>
      </div>`;

    Components.showModal(isEdit ? '編輯人員' : '新增人員', body, async () => {
      const obj = {
        email:  document.getElementById('pEmail').value.trim(),
        name:   document.getElementById('pName').value.trim(),
        status: document.getElementById('pStatus').value,
      };
      try {
        if (isEdit) { await API.updatePerson(existingPerson.email, obj); }
        else        { await API.addPerson(obj); }
        Components.showToast(isEdit ? '人員更新成功' : '人員新增成功', 'success');
        onSuccess();
      } catch (err) { API.handleError(err); }
    }, isEdit ? '儲存' : '新增');
  },

  _editPerson(email) {
    const pageCtx = Router.getActivePageContext();
    API.getAllPersonnel().then(data => {
      if (!pageCtx || !pageCtx.isActive()) return;
      const person = data.find(p => p.email === email);
      if (person) Pages._showPersonForm(person, () => location.reload());
    });
  },

  _deletePerson(email, name) {
    Components.showModal('確認刪除人員',
      `<p>確認要刪除 <strong>${Components.escapeHtml(name)}</strong>（${Components.escapeHtml(email)}）嗎？</p>
       <p style="color:var(--color-danger);margin-top:.5rem">⚠ 此操作無法復原，請確認此人員無任何職務配置。</p>`,
      async () => {
        try {
          await API.deletePerson(email);
          Components.showToast('人員刪除成功', 'success');
          location.reload();
        } catch (err) { API.handleError(err); }
      }, '確認刪除');
  },

  // ========================
  // 職務配置
  // ========================
  async loadAssignments(container, user, pageCtx) {
    const canWrite = user?.role === 'ROLE-APP-ADMIN' || user?.role === 'ROLE-APP-HR';
    container.innerHTML = `
      <div class="page-header">
        <h1>🗂️ 職務配置管理</h1>
        ${canWrite ? '<button class="btn btn--primary" id="addAssignmentBtn">＋ 新增職務配置</button>' : ''}
      </div>
      <div class="card filter-card">
        <div>
          <p style="color:var(--color-text-sub);font-size:.875rem">依人員、組織或職務快速查詢職務配置，列表採前端分頁每頁 50 筆。</p>
        </div>
        <div class="filter-grid">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">人員姓名 / Email</label>
            <input type="search" id="assignmentKeyword" class="form-control" placeholder="輸入姓名或 Email">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">組織單位</label>
            <input type="search" id="assignmentOrgQuery" class="form-control" placeholder="輸入組織名稱或代碼">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">職務名稱</label>
            <input type="search" id="assignmentTitleQuery" class="form-control" placeholder="輸入職務關鍵字">
          </div>
        </div>
        <div class="filter-actions">
          <div class="filter-actions__group">
            <button class="btn btn--primary" id="assignmentSearchBtn">搜尋</button>
            <button class="btn btn--ghost" id="assignmentClearBtn">清除條件</button>
          </div>
        </div>
      </div>
      <div id="assignmentTableSection">
        <div class="page-loading"><div class="spinner"></div><p>載入職務配置資料…</p></div>
      </div>`;

    try {
      const [allItems, options] = await Promise.all([
        API.getAssignmentList(),
        API.getAssignmentFormOptions(),
      ]);
      if (!pageCtx.isActive()) return;

      Pages._assignmentState = {
        pageCtx,
        canWrite,
        allItems,
        filteredItems: allItems,
        options,
        filters: { keyword: '', orgQuery: '', title: '' },
        currentPage: 1,
        pageSize: 50,
      };

      Pages._bindAssignmentFilters();
      Pages._applyAssignmentFilters(false);
    } catch (err) {
      if (!pageCtx.isActive()) return;
      console.error('loadAssignments 初始化失敗：', err);
      API.handleError(err);
      Components.renderLoadError('assignmentTableSection', {
        title: '職務配置載入失敗',
        message: '無法取得職務配置列表或表單選項。',
        details: err.message,
        actionLabel: '重試',
        onAction: () => Router.navigateTo(pageCtx.hash),
      });
    }
  },

  _bindAssignmentFilters() {
    const state = Pages._assignmentState;
    const pageCtx = state?.pageCtx;
    if (!state || !pageCtx || !pageCtx.isActive()) return;

    const keywordInput = pageCtx.query('#assignmentKeyword');
    const orgInput = pageCtx.query('#assignmentOrgQuery');
    const titleInput = pageCtx.query('#assignmentTitleQuery');
    const searchBtn = pageCtx.query('#assignmentSearchBtn');
    const clearBtn = pageCtx.query('#assignmentClearBtn');
    const addBtn = pageCtx.query('#addAssignmentBtn');

    if (keywordInput) {
      keywordInput.addEventListener('input', () => {
        clearTimeout(Pages._assignmentKeywordTimer);
        Pages._assignmentKeywordTimer = setTimeout(() => {
          Pages._applyAssignmentFilters();
        }, 300);
      });
    }

    [keywordInput, orgInput, titleInput].forEach(input => {
      if (!input) return;
      input.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        Pages._applyAssignmentFilters();
      });
    });

    if (searchBtn) searchBtn.onclick = () => Pages._applyAssignmentFilters();
    if (clearBtn) {
      clearBtn.onclick = () => {
        if (keywordInput) keywordInput.value = '';
        if (orgInput) orgInput.value = '';
        if (titleInput) titleInput.value = '';
        Pages._applyAssignmentFilters();
      };
    }
    if (addBtn) addBtn.onclick = () => Pages._showAssignmentForm();
  },

  _applyAssignmentFilters(resetPage = true) {
    const state = Pages._assignmentState;
    const pageCtx = state?.pageCtx;
    if (!state || !pageCtx || !pageCtx.isActive()) return;

    const keyword = String(pageCtx.query('#assignmentKeyword')?.value || '').trim();
    const orgQuery = String(pageCtx.query('#assignmentOrgQuery')?.value || '').trim();
    const title = String(pageCtx.query('#assignmentTitleQuery')?.value || '').trim();
    const keywordLower = keyword.toLowerCase();
    const orgLower = orgQuery.toLowerCase();
    const titleLower = title.toLowerCase();

    state.filters = { keyword, orgQuery, title };
    state.filteredItems = state.allItems.filter(item => {
      const matchesKeyword = !keywordLower ||
        String(item.name || '').toLowerCase().includes(keywordLower) ||
        String(item.email || '').toLowerCase().includes(keywordLower);
      const matchesOrg = !orgLower ||
        String(item.orgName || '').toLowerCase().includes(orgLower) ||
        String(item.orgCode || '').toLowerCase().includes(orgLower);
      const matchesTitle = !titleLower ||
        String(item.title || '').toLowerCase().includes(titleLower);
      return matchesKeyword && matchesOrg && matchesTitle;
    });

    if (resetPage) state.currentPage = 1;
    Pages._renderAssignmentTable();
  },

  _renderAssignmentTable() {
    const state = Pages._assignmentState;
    const pageCtx = state?.pageCtx;
    if (!state || !pageCtx || !pageCtx.isActive()) return;

    const section = pageCtx.query('#assignmentTableSection');
    if (!section) return;

    const total = state.filteredItems.length;
    const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
    if (state.currentPage > totalPages) state.currentPage = totalPages;

    if (total === 0) {
      section.innerHTML = `
        <div class="card">
          <div class="assignment-summary">
            <div class="assignment-summary__meta">共 0 筆 / 第 1 頁，共 1 頁</div>
          </div>
          <div class="empty-state">
            <div class="empty-state__icon">📭</div>
            <p>查無符合條件的職務配置</p>
          </div>
        </div>`;
      return;
    }

    const start = (state.currentPage - 1) * state.pageSize;
    const end = start + state.pageSize;
    const pageItems = state.filteredItems.slice(start, end);

    section.innerHTML = `
      <div class="card">
        <div class="assignment-summary">
          <div class="assignment-summary__meta">共 ${total} 筆 / 第 ${state.currentPage} 頁，共 ${totalPages} 頁</div>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>人員</th>
                <th>組織單位</th>
                <th>職務名稱</th>
                <th>直屬主管</th>
                <th>兼任類型</th>
                ${state.canWrite ? '<th>操作</th>' : ''}
              </tr>
            </thead>
            <tbody>
              ${pageItems.map(item => Pages._renderAssignmentRow(item, state.canWrite)).join('')}
            </tbody>
          </table>
        </div>
        ${Pages._renderAssignmentPagination(totalPages)}
      </div>`;

    section.querySelectorAll('[data-page]').forEach(btn => {
      btn.onclick = () => {
        const page = Number(btn.dataset.page);
        if (!page || page === state.currentPage) return;
        state.currentPage = page;
        Pages._renderAssignmentTable();
      };
    });
  },

  _renderAssignmentRow(item, canWrite) {
    const badgeClass = ({
      '主職': 'badge--primary',
      '兼任': 'badge--warning',
      '矩陣兼任': 'badge--danger',
      '垂直兼任': 'badge--success',
    }[item.assignmentType] || 'badge--neutral');
    const managerPrimary = item.managerName || '未設定';
    const managerSecondary = item.managerEmail || '—';

    return `
      <tr>
        <td>
          <div class="stacked-cell">
            <span class="stacked-cell__primary">${Components.escapeHtml(item.name || '—')}</span>
            <span class="stacked-cell__secondary">${Components.escapeHtml(item.email || '—')}</span>
          </div>
        </td>
        <td>
          <div class="stacked-cell">
            <span class="stacked-cell__primary">${Components.escapeHtml(item.orgName || '—')}</span>
            <span class="stacked-cell__secondary">${Components.escapeHtml(item.orgCode || '—')}</span>
          </div>
        </td>
        <td>${Components.escapeHtml(item.title || '—')}</td>
        <td>
          <div class="stacked-cell">
            <span class="stacked-cell__primary">${Components.escapeHtml(managerPrimary)}</span>
            <span class="stacked-cell__secondary">${Components.escapeHtml(managerSecondary)}</span>
          </div>
        </td>
        <td><span class="badge ${badgeClass}">${Components.escapeHtml(item.assignmentType || '主職')}</span></td>
        ${canWrite ? `<td><button class="btn btn--danger btn--sm" onclick="Pages._confirmDeleteAssignment(${item.rowIndex})">刪除</button></td>` : ''}
      </tr>`;
  },

  _renderAssignmentPagination(totalPages) {
    const state = Pages._assignmentState;
    if (!state || totalPages <= 1) return '';

    const prevDisabled = state.currentPage <= 1 ? 'disabled' : '';
    const nextDisabled = state.currentPage >= totalPages ? 'disabled' : '';
    return `
      <div class="pagination">
        <div class="pagination__info">每頁 ${state.pageSize} 筆</div>
        <button class="btn btn--ghost btn--sm" data-page="${state.currentPage - 1}" ${prevDisabled}>上一頁</button>
        <button class="btn btn--ghost btn--sm" data-page="${state.currentPage + 1}" ${nextDisabled}>下一頁</button>
      </div>`;
  },

  _showAssignmentForm() {
    const state = Pages._assignmentState;
    if (!state) return;

    const personnelList = state.options.personnelOptions.map(item =>
      `<option value="${Components.escapeHtml(item.label)}"></option>`
    ).join('');
    const orgList = state.options.orgOptions.map(item =>
      `<option value="${Components.escapeHtml(item.label)}"></option>`
    ).join('');

    const body = `
      <datalist id="assignmentPersonnelList">${personnelList}</datalist>
      <datalist id="assignmentOrgList">${orgList}</datalist>
      <div class="form-group">
        <label class="form-label required">人員 Email / 姓名</label>
        <input type="text" class="form-control" id="assignmentPersonInput" list="assignmentPersonnelList" placeholder="選擇姓名 (email)">
        <div class="form-error" id="assignmentPersonError"></div>
      </div>
      <div class="form-group">
        <label class="form-label required">組織單位</label>
        <input type="text" class="form-control" id="assignmentOrgInput" list="assignmentOrgList" placeholder="選擇組織名稱 (代碼)">
        <div class="form-error" id="assignmentOrgError"></div>
      </div>
      <div class="form-group">
        <label class="form-label required">職務名稱</label>
        <input type="text" class="form-control" id="assignmentTitleInput" maxlength="100" placeholder="輸入職務名稱">
        <div class="form-error" id="assignmentTitleError"></div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">直屬主管 Email</label>
        <input type="text" class="form-control" id="assignmentManagerInput" list="assignmentPersonnelList" placeholder="選擇主管姓名 (email)">
        <div class="form-error" id="assignmentManagerError"></div>
      </div>`;

    Components.showModal('新增職務配置', body, async () => {
      const confirmBtn = document.getElementById('modalConfirmBtn');
      const originalText = confirmBtn ? confirmBtn.textContent : '儲存';
      const payload = Pages._collectAssignmentFormPayload();
      if (!payload) return false;

      if (confirmBtn) confirmBtn.textContent = '儲存中...';
      try {
        const result = await API.addAssignment(payload);
        Components.showToast(result?.message || '職務配置已新增', 'success');
        if (result?.matrixConcurrencyWarning) {
          Components.showToast('此人員新增後形成矩陣兼任，請再確認主管配置。', 'warning');
        }
        await Pages._reloadAssignmentData(true);
        return true;
      } catch (err) {
        API.handleError(err);
        return false;
      } finally {
        if (confirmBtn) confirmBtn.textContent = originalText;
      }
    }, '儲存', { closeBeforeConfirm: false });

    const personInput = document.getElementById('assignmentPersonInput');
    const orgInput = document.getElementById('assignmentOrgInput');
    const titleInput = document.getElementById('assignmentTitleInput');
    const managerInput = document.getElementById('assignmentManagerInput');

    if (personInput) personInput.addEventListener('blur', () => Pages._validateAssignmentPersonField());
    if (orgInput) orgInput.addEventListener('blur', () => Pages._validateAssignmentOrgField());
    if (titleInput) titleInput.addEventListener('blur', () => Pages._validateAssignmentTitleField());
    if (managerInput) managerInput.addEventListener('blur', () => Pages._validateAssignmentManagerField());
  },

  _collectAssignmentFormPayload() {
    const person = Pages._validateAssignmentPersonField();
    const org = Pages._validateAssignmentOrgField();
    const title = Pages._validateAssignmentTitleField();
    const manager = Pages._validateAssignmentManagerField();

    if (!person || !org || !title || manager === false) return null;

    return {
      email: person.email,
      orgCode: org.code,
      title,
      managerEmail: manager ? manager.email : '',
    };
  },

  _validateAssignmentPersonField() {
    const value = String(document.getElementById('assignmentPersonInput')?.value || '').trim();
    if (!value) {
      Pages._setAssignmentFieldError('assignmentPersonInput', 'assignmentPersonError', '請選擇人員');
      return null;
    }
    const person = Pages._findPersonnelOption(value);
    if (!person) {
      Pages._setAssignmentFieldError('assignmentPersonInput', 'assignmentPersonError', '指定的人員不存在於人員主檔');
      return null;
    }
    Pages._setAssignmentFieldError('assignmentPersonInput', 'assignmentPersonError', '');
    return person;
  },

  _validateAssignmentOrgField() {
    const value = String(document.getElementById('assignmentOrgInput')?.value || '').trim();
    if (!value) {
      Pages._setAssignmentFieldError('assignmentOrgInput', 'assignmentOrgError', '請選擇組織單位');
      return null;
    }
    const org = Pages._findOrgOption(value);
    if (!org) {
      Pages._setAssignmentFieldError('assignmentOrgInput', 'assignmentOrgError', '指定的組織不存在於組織主檔');
      return null;
    }
    Pages._setAssignmentFieldError('assignmentOrgInput', 'assignmentOrgError', '');
    return org;
  },

  _validateAssignmentTitleField() {
    const value = String(document.getElementById('assignmentTitleInput')?.value || '').trim();
    if (!value) {
      Pages._setAssignmentFieldError('assignmentTitleInput', 'assignmentTitleError', '職務名稱為必填');
      return null;
    }
    Pages._setAssignmentFieldError('assignmentTitleInput', 'assignmentTitleError', '');
    return value;
  },

  _validateAssignmentManagerField() {
    const value = String(document.getElementById('assignmentManagerInput')?.value || '').trim();
    if (!value) {
      Pages._setAssignmentFieldError('assignmentManagerInput', 'assignmentManagerError', '');
      return null;
    }
    const manager = Pages._findPersonnelOption(value);
    if (!manager) {
      Pages._setAssignmentFieldError('assignmentManagerInput', 'assignmentManagerError', '指定的人員不存在於人員主檔');
      return false;
    }
    Pages._setAssignmentFieldError('assignmentManagerInput', 'assignmentManagerError', '');
    return manager;
  },

  _findPersonnelOption(rawValue) {
    const value = String(rawValue || '').trim().toLowerCase();
    if (!value) return null;
    return (Pages._assignmentState?.options?.personnelOptions || []).find(item =>
      item.label.toLowerCase() === value || item.email.toLowerCase() === value
    ) || null;
  },

  _findOrgOption(rawValue) {
    const value = String(rawValue || '').trim().toLowerCase();
    if (!value) return null;
    return (Pages._assignmentState?.options?.orgOptions || []).find(item =>
      item.label.toLowerCase() === value || item.code.toLowerCase() === value
    ) || null;
  },

  _setAssignmentFieldError(inputId, errorId, message) {
    const input = document.getElementById(inputId);
    const error = document.getElementById(errorId);
    if (input) input.classList.toggle('form-control--error', !!message);
    if (error) error.textContent = message || '';
  },

  _confirmDeleteAssignment(rowIndex) {
    const state = Pages._assignmentState;
    if (!state) return;
    const assignment = state.allItems.find(item => item.rowIndex === rowIndex);
    if (!assignment) return;

    Components.showModal(
      '確認刪除職務配置',
      `<p>確定要刪除 <strong>${Components.escapeHtml(assignment.name || assignment.email)} - ${Components.escapeHtml(assignment.title || '未命名職務')}</strong> 嗎？此操作無法復原。</p>`,
      async () => {
        try {
          await API.deleteAssignment(rowIndex);
          Components.showToast('職務配置刪除成功', 'success');
          await Pages._reloadAssignmentData(false);
        } catch (err) {
          API.handleError(err);
        }
      },
      '確認刪除'
    );
  },

  async _reloadAssignmentData(resetPage) {
    const state = Pages._assignmentState;
    if (!state) return;
    const latest = await API.getAssignmentList();
    state.allItems = latest;
    if (resetPage) state.currentPage = 1;
    Pages._applyAssignmentFilters(false);
  },

  // ========================
  // 組織架構樹
  // ========================
  async loadOrg(container, user, pageCtx) {
    container.innerHTML = `
      <div class="page-header"><h1>🌳 組織架構</h1></div>
      <div style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap" id="orgTypeTabs">
        ${['全部','ORG','TF','PARTNER','GOV'].map((t,i) =>
          `<button class="btn ${i===0?'btn--primary':'btn--ghost'} btn--sm" data-type="${i===0?'':t}">${{ORG:'行政組織',TF:'任務編組',PARTNER:'合作單位',GOV:'外部機關','全部':'全部'}[t]||t}</button>`
        ).join('')}
      </div>
      <div id="orgTreeContainer" class="card"></div>`;

    const renderTree = async (type) => {
      if (!pageCtx.isActive()) return;
      const treeDiv = pageCtx.query('#orgTreeContainer');
      if (!treeDiv) return;
      treeDiv.innerHTML = '<div class="page-loading"><div class="spinner"></div></div>';
      try {
        const tree = await API.getOrgTree(type || null);
        if (!pageCtx.isActive()) return;
        treeDiv.innerHTML = '';
        if (!tree || tree.length === 0) { treeDiv.innerHTML = '<div class="empty-state"><p>無組織資料</p></div>'; return; }
        tree.forEach(node => treeDiv.appendChild(Components.OrgNode(node, 0)));
      } catch (err) {
        if (!pageCtx.isActive()) return;
        console.error('loadOrg 失敗：', err);
        API.handleError(err);
        Components.renderLoadError('orgTreeContainer', {
          title: '組織架構載入失敗',
          message: '無法取得組織樹資料。',
          details: err.message,
          actionLabel: '重試',
          onAction: () => Router.navigateTo(pageCtx.hash),
        });
      }
    };

    await renderTree(null);

    const orgTabs = pageCtx.query('#orgTypeTabs');
    if (!orgTabs) return;
    orgTabs.addEventListener('click', async e => {
      if (!pageCtx.isActive()) return;
      const btn = e.target.closest('button');
      if (!btn) return;
      container.querySelectorAll('#orgTypeTabs button').forEach(b => b.className = 'btn btn--ghost btn--sm');
      btn.className = 'btn btn--primary btn--sm';
      await renderTree(btn.dataset.type || null);
    });
  },

  // ========================
  // 駐站管理員
  // ========================
  async loadStations(container, user, pageCtx) {
    container.innerHTML = `
      <div class="page-header"><h1>🏥 駐站管理員儀表板</h1></div>
      <div class="search-bar" style="margin-bottom:1rem">
        <input type="search" id="stationSearch" class="search-bar__input" placeholder="搜尋站長姓名…">
        <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <div id="stationList"><div class="page-loading"><div class="spinner"></div></div></div>`;

    try {
      const managers = await API.getStationManagers();
      if (!pageCtx.isActive()) return;
      let filtered = managers;

      const render = () => {
        const div = pageCtx.query('#stationList');
        if (!div) return;
        div.innerHTML = filtered.length === 0 ? '<div class="empty-state"><p>無符合站長</p></div>' :
          filtered.map(mgr => `
            <div class="card" style="margin-bottom:.75rem">
              <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem">
                <strong>${Components.escapeHtml(mgr.name)}</strong>
                ${mgr.isConcurrent ? '<span class="badge badge--warning">兼任</span>' : '<span class="badge badge--success">專任</span>'}
                <span style="color:var(--color-text-sub);font-size:.8rem">${Components.escapeHtml(mgr.email)}</span>
                <span style="color:var(--color-text-sub);font-size:.8rem;margin-left:auto">${Components.escapeHtml(mgr.title)}</span>
              </div>
              ${mgr.members.length > 0 ? `
                <details>
                  <summary style="cursor:pointer;font-size:.85rem;color:var(--color-text-sub)">展開 ${mgr.members.length} 位下屬</summary>
                  <ul style="margin-top:.5rem;padding-left:1rem">
                    ${mgr.members.map(m => `<li style="font-size:.85rem;padding:.2rem 0">${Components.escapeHtml(m.name)} — ${Components.escapeHtml(m.title)}</li>`).join('')}
                  </ul>
                </details>` : '<p style="font-size:.8rem;color:var(--color-text-sub)">暫無下屬</p>'}
            </div>`).join('');
      };
      render();

      const stationSearch = pageCtx.query('#stationSearch');
      if (!stationSearch) return;
      stationSearch.addEventListener('input', e => {
        if (!pageCtx.isActive()) return;
        const q = e.target.value.toLowerCase();
        filtered = managers.filter(m => m.name.toLowerCase().includes(q));
        render();
      });
    } catch (err) {
      if (!pageCtx.isActive()) return;
      console.error('loadStations 失敗：', err);
      API.handleError(err);
      Components.renderLoadError('stationList', {
        title: '駐站管理員載入失敗',
        message: '無法取得駐站管理員資料。',
        details: err.message,
        actionLabel: '重試',
        onAction: () => Router.navigateTo(pageCtx.hash),
      });
    }
  },

  // ========================
  // RACI 查詢
  // ========================
  async loadRaci(container, user, pageCtx) {
    const taskCodes = ['ISMS-DOC','ISMS-RISK','ISMS-SEC','ISMS-INC','ISMS-OPS','ISMS-AUDIT','ISMS-BCM','PIMS-OP'];
    container.innerHTML = `
      <div class="page-header">
        <h1>📋 RACI 矩陣查詢</h1>
        <a href="#/raci/me" class="btn btn--ghost btn--sm">🙋 我的責任</a>
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem">
        <button class="btn btn--primary btn--sm" data-task="">全部</button>
        ${taskCodes.map(t => `<button class="btn btn--ghost btn--sm" data-task="${t}">${t}</button>`).join('')}
      </div>
      <div id="raciTable"><div class="page-loading"><div class="spinner"></div></div></div>`;

    let roleMap = new Map();
    try {
      const roleData = await API.getRoleMap().catch(() => []);
      if (!pageCtx.isActive()) return;
      roleData.forEach(r => roleMap.set(r.roleCode, r.roleName));
    } catch (e) {}

    const renderRaciTable = async (taskCode) => {
      if (!pageCtx.isActive()) return;
      const div = pageCtx.query('#raciTable');
      if (!div) return;
      div.innerHTML = '<div class="page-loading"><div class="spinner"></div></div>';
      try {
        const data = await API.getRaciByTask(taskCode || null);
        if (!pageCtx.isActive()) return;
        div.innerHTML = `<div class="table-wrapper"><table class="data-table">
          <thead><tr><th>任務代碼</th><th>工作項目代碼</th><th>工作項目名稱</th><th>R 執行</th><th>A 當責</th><th>C 諮詢</th><th>I 告知</th><th>備註</th></tr></thead>
          <tbody>${data.length ? data.map(r => Components.RaciRow(r, roleMap)).join('') : '<tr><td colspan="8"><div class="empty-state"><p>無資料</p></div></td></tr>'}</tbody>
        </table></div>`;
      } catch (err) {
        if (!pageCtx.isActive()) return;
        console.error('loadRaci 失敗：', err);
        API.handleError(err);
        Components.renderLoadError('raciTable', {
          title: 'RACI 載入失敗',
          message: '無法取得 RACI 清單。',
          details: err.message,
          actionLabel: '重試',
          onAction: () => Router.navigateTo(pageCtx.hash),
        });
      }
    };

    await renderRaciTable(null);

    if (!pageCtx.isActive()) return;
    container.querySelectorAll('button[data-task]').forEach(btn => {
      btn.onclick = () => {
        if (!pageCtx.isActive()) return;
        container.querySelectorAll('button[data-task]').forEach(b => b.className = 'btn btn--ghost btn--sm');
        btn.className = 'btn btn--primary btn--sm';
        renderRaciTable(btn.dataset.task);
      };
    });
  },

  // ========================
  // 我的 RACI 責任
  // ========================
  async loadMyRaci(container, user, pageCtx) {
    container.innerHTML = `
      <div class="page-header">
        <h1>🙋 我的 RACI 責任</h1>
        <button class="btn btn--ghost btn--sm" onclick="window.print()">🖨 列印</button>
      </div>
      <div id="myRaciContent"><div class="page-loading"><div class="spinner"></div></div></div>`;

    try {
      const data = await API.getMyRaciTasks();
      if (!pageCtx.isActive()) return;
      const div = pageCtx.query('#myRaciContent');
      if (!div) return;
      const sections = [
        { key: 'R', label: '🔴 R — 執行者（Responsible）', desc: '您負責實際執行的工作項目' },
        { key: 'A', label: '🟠 A — 當責者（Accountable）', desc: '您具有最終核准責任的工作項目（ISO 稽核重點）' },
        { key: 'C', label: '🟡 C — 諮詢對象（Consulted）', desc: '需要您提供意見的工作項目' },
        { key: 'I', label: '🔵 I — 知會對象（Informed）', desc: '執行結果需告知您的工作項目' },
      ];
      div.innerHTML = sections.map(sec => `
        <div class="card" style="margin-bottom:1rem">
          <div class="card__header">
            <h3 class="card__title">${sec.label}</h3>
            <p style="font-size:.8rem;color:var(--color-text-sub);margin-top:.25rem">${sec.desc}</p>
          </div>
          ${data[sec.key] && data[sec.key].length > 0 ? `
            <div class="table-wrapper"><table class="data-table">
              <thead><tr><th>任務代碼</th><th>工作項目代碼</th><th>工作項目名稱</th><th>備註</th></tr></thead>
              <tbody>${data[sec.key].map(item => `
                <tr>
                  <td>${Components.escapeHtml(item.taskCode)}</td>
                  <td>${Components.escapeHtml(item.itemCode)}</td>
                  <td>${Components.escapeHtml(item.itemName)}</td>
                  <td style="color:var(--color-text-sub);font-size:.8rem">${Components.escapeHtml(item.note || '')}</td>
                </tr>`).join('')}
              </tbody>
            </table></div>` : '<div class="empty-state"><p>無相關工作項目</p></div>'}
        </div>`).join('');
    } catch (err) {
      if (!pageCtx.isActive()) return;
      console.error('loadMyRaci 失敗：', err);
      API.handleError(err);
      Components.renderLoadError('myRaciContent', {
        title: '我的責任載入失敗',
        message: '無法取得個人 RACI 資料。',
        details: err.message,
        actionLabel: '重試',
        onAction: () => Router.navigateTo(pageCtx.hash),
      });
    }
  },

  // ========================
  // 稽核驗證
  // ========================
  async loadAudit(container, user, pageCtx) {
    container.innerHTML = `
      <div class="page-header">
        <h1>🔍 稽核驗證報告</h1>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn--primary" id="runAuditBtn">▶ 執行驗證</button>
          <button class="btn btn--ghost" id="exportAuditBtn">⬇ 匯出 CSV</button>
        </div>
      </div>
      <div id="auditProgress" hidden>
        <div class="card" style="margin-bottom:1rem">
          <p style="margin-bottom:.5rem">驗證中，請稍候...</p>
          <div class="progress-bar"><div class="progress-bar__fill" id="auditProgressBar" style="width:0%"></div></div>
        </div>
      </div>
      <div id="auditResult">
        <div class="empty-state" style="min-height:300px">
          <div class="empty-state__icon">🔍</div>
          <p>點擊「執行驗證」開始資料完整性檢查</p>
        </div>
      </div>`;

    const runAuditBtn = pageCtx.query('#runAuditBtn');
    const exportAuditBtn = pageCtx.query('#exportAuditBtn');
    if (!runAuditBtn || !exportAuditBtn) return;

    runAuditBtn.onclick = async () => {
      if (!pageCtx.isActive()) return;
      const btn = pageCtx.query('#runAuditBtn');
      const progressDiv = pageCtx.query('#auditProgress');
      const progressBar = pageCtx.query('#auditProgressBar');
      if (!btn || !progressDiv || !progressBar) return;
      btn.disabled = true;
      progressDiv.hidden = false;

      // 模擬進度（GAS 不支援串流，以動畫替代）
      let prog = 0;
      const interval = setInterval(() => {
        prog = Math.min(prog + 8, 90);
        progressBar.style.width = prog + '%';
      }, 300);

      try {
        const results = await API.runFullAudit();
        if (!pageCtx.isActive()) {
          clearInterval(interval);
          return;
        }
        clearInterval(interval);
        progressBar.style.width = '100%';
        setTimeout(() => { progressDiv.hidden = true; }, 500);
        Components.AuditResultPanel(results, 'auditResult');
      } catch (err) {
        clearInterval(interval);
        if (!pageCtx.isActive()) return;
        API.handleError(err);
      } finally {
        if (pageCtx.isActive() && btn) btn.disabled = false;
      }
    };

    exportAuditBtn.onclick = async () => {
      if (!pageCtx.isActive()) return;
      try {
        const result = await API.exportAudit();
        if (!pageCtx.isActive()) return;
        const blob = new Blob(['\uFEFF' + result.csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `稽核報告_${new Date().toLocaleDateString('zh-TW')}.csv`;
        a.click(); URL.revokeObjectURL(url);
        Components.showToast('稽核報告匯出成功', 'success');
      } catch (err) {
        if (!pageCtx.isActive()) return;
        API.handleError(err);
      }
    };
  },
};

// =============================================
// 應用程式啟動
// =============================================
document.addEventListener('DOMContentLoaded', () => Router.init());
</script>
